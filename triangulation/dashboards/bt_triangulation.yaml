      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-template-card
            primary: "🔄 Location Cross-Reference Matrix"
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.generate_confusion_matrix
            card_mod:
              style: |
