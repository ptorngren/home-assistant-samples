# screensaver_settings.yaml
# BT Location Calibration and Screensaver Settings Dashboard
# DEPENDENCIES: button-card (via HACS)
#
# Access at: /lovelace/screensaver-settings
# Used for: BT fingerprint collection, advanced configuration

title: Screensaver Settings

# Style constants (YAML anchors)
_colors:
  severe: &color_severe "rgba(239, 54, 54, 0.2) !important"
  success: &color_success "rgba(76, 175, 80, 0.2) !important"
  warning: &color_warning "rgba(255, 152, 0, 0.2) !important"
  action_test: &color_action_test "rgba(100, 200, 100, 0.2) !important"
  info: &color_info rgba(54, 150, 239, 0.15)
  header_bg: &color_header_bg rgba(0, 0, 0, 0.1)

# Beacon state styling: Applied inline in template conditionals (see beacon_list_template filter)
# Anchors cannot be used here because styling must be conditionally combined with other states (weak_signal, etc.)
# in Jinja2 ternary expressions. The inline approach is more readable for conditional style chains.

# -------------------------------------------------------------------------------------
# DECLUTTERING TEMPLATES (for reusable card definitions with YAML anchor injection)
# -------------------------------------------------------------------------------------

decluttering_templates:
  beacon_list_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set locations_list = state_attr('sensor.bt_location_array', 'locations') | default([]) -%}
          {%- set global_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set weak_threshold = states('input_number.bt_location_detection_weak_signal_threshold') | int -%}
          {%- set rssi_match_tolerance = states('input_number.bt_location_detection_rssi_tolerance') | int -%}
          {%- set prev_location = '' -%}
          {# Color scheme (injected via decluttering variables from _colors anchors) #}
          {%- set color_beacon_rssi_match = "[[color_rssi_match]]" -%}
          {%- set color_beacon_in_scan = "[[color_in_scan]]" -%}
          {%- set color_location_header_bg = "[[location_header_bg]]" -%}
          {# Get latest scan data for matching against fingerprints #}
          {%- set scan_devices = state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) -%}
          {%- set ns_scan = namespace(scan_map={}) -%}
          {%- for scan_dev in scan_devices -%}
            {%- set ns_scan.scan_map = ns_scan.scan_map | combine({scan_dev.mac | upper: scan_dev.rssi}) -%}
          {%- endfor -%}
          {# Get device names mapping for displaying friendly names alongside MACs #}
          {%- set device_names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default({}) -%}
          {%- set device_names = device_names_raw | from_json if device_names_raw is string else device_names_raw -%}
          {# Build active scan map: beacons above threshold and not globally ignored #}
          {%- set ns_active = namespace(map={}) -%}
          {%- for dev in scan_devices -%}
            {%- set mac = dev.mac | upper -%}
            {%- set rssi = dev.rssi | int(0) -%}
            {%- if rssi != 0 and rssi >= weak_threshold and mac not in global_list -%}
              {%- set ns_active.map = ns_active.map | combine({mac: rssi}) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set active_scan_map = ns_active.map -%}
          {%- set active_scan_count = active_scan_map | length -%}
          {# Load location scores from event-triggered sensor (empty dict if not yet triggered) #}
          {%- set scores_raw = state_attr('sensor.bt_location_scores', 'location_scores') or {} -%}
          {%- set scores = scores_raw | from_json if scores_raw is string else scores_raw -%}

          {# Get known beacon count for context #}
          {%- set known_in_scan = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) -%}
          {# Extract fingerprints into named variable #}
          {%- set fingerprints_raw = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) -%}
          {# Build MAC → active-location-count map for overlap highlighting #}
          {%- set ns_overlap = namespace(mac_loc_count={}) -%}
          {%- for row in fingerprints_raw -%}
            {%- set parts = row.split('|') -%}
            {%- if parts | count == 2 -%}
              {%- for device in parts[1].split(',') -%}
                {%- if '=' in device -%}
                  {%- set pair_stripped = device.rstrip(':X') -%}
                  {%- set kv = pair_stripped.split('=') -%}
                  {%- if kv | count == 2 -%}
                    {%- set mac = kv[0] | trim | upper -%}
                    {%- set rssi_val = kv[1] | trim | int(0) -%}
                    {%- if not device.endswith(':X') and mac not in global_list and rssi_val != 0 and rssi_val >= weak_threshold -%}
                      {%- set cur = ns_overlap.mac_loc_count.get(mac, 0) -%}
                      {%- set ns_overlap.mac_loc_count = ns_overlap.mac_loc_count | combine({mac: cur + 1}) -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
          {# Loop over beacons #}
          {%- for row in fingerprints_raw -%}
            {%- set parts = row.split('|') -%}
            {%- if parts | count == 2 -%}
              {%- set location_index = parts[0] | trim | int(-1) -%}
              {%- set location_name = locations_list[location_index] if location_index >= 0 and location_index < locations_list | length else (location_index | string) -%}
              {%- set devices = parts[1].split(',') -%}
              {%- if location_name != prev_location -%}
                {%- set loc_metrics = scores[location_name] if location_name in scores else {} -%}
                {%- set loc_score = loc_metrics.total_score | default(-1) | float -%}
                {%- set confidence_pct = ((loc_score * 100) | round(0) | int) if loc_score >= 0 else -1 -%}
                {{
                  {
                    "type": "custom:button-card",
                    "layout": "vertical",
                    "show_icon": false,
                    "show_name": true,
                    "name": location_name | upper ~ " " ~ loc_metrics.matched ~ "/" ~ (loc_metrics.matched + loc_metrics.missing) ~ " [" ~ known_in_scan ~ "]" ~ (' • ' ~ confidence_pct ~ '%' if confidence_pct >= 0 else ''),
                    "tap_action": {
                      "action": "call-service",
                      "service": "script.merge_bt_fingerprint",
                      "data": {
                        "location_index": location_index
                      }
                    },
                    "hold_action": {
                      "action": "call-service",
                      "service": "script.capture_bt_fingerprint",
                      "data": {
                        "location_index": location_index
                      }
                    },
                    "styles": {
                      "card": [
                        {"height": "24px"},
                        {"padding": "8px"},
                        {"border": "none"},
                        {"box-shadow": "none"},
                        {"background": color_location_header_bg},
                        {"margin-top": "8px"},
                        {"align-items": "start"}
                      ],
                      "name": [
                        {"font-size": "12px"},
                        {"font-weight": "bold"},
                        {"color": "var(--primary-text-color)"},
                        {"justify-self": "start"}
                      ]
                    }
                  }
                }},
                {%- set prev_location = location_name -%}
              {%- endif -%}
              {# Build beacon list with match status for sorting #}
              {%- set ns_beacons = namespace(list=[]) -%}
              {%- for device in devices -%}
                {%- set device_stripped = device.rstrip(':X') -%}
                {%- set dev_parts = device_stripped.split('=') -%}
                {%- if dev_parts | count == 2 -%}
                  {%- set mac = dev_parts[0] | trim | upper -%}
                  {%- set rssi = dev_parts[1] | trim | int(-100) -%}
                  {%- set is_locally_ignored = device.endswith(':X') -%}
                  {%- set is_globally_ignored = mac in global_list -%}
                  {%- set is_weak_signal = rssi == 0 or rssi < weak_threshold -%}
                  {%- set is_in_scan = mac in ns_scan.scan_map -%}
                  {%- set scan_rssi = ns_scan.scan_map.get(mac, 0) if is_in_scan else 0 -%}
                  {%- set rssi_diff = (scan_rssi - rssi) | abs if is_in_scan else 999 -%}
                  {%- set is_rssi_match = is_in_scan and rssi_diff <= rssi_match_tolerance -%}
                  {# Determine match status: match=0, weak_match=1, no_match=2 #}
                  {%- if is_rssi_match -%}
                    {%- set match_status = 0 -%}
                  {%- elif is_in_scan -%}
                    {%- set match_status = 1 -%}
                  {%- else -%}
                    {%- set match_status = 2 -%}
                  {%- endif -%}
                  {# For sorting: ghost (0 dBm) sorts last within group, weak signals by RSSI #}
                  {%- set sort_rssi = -999 if rssi == 0 else rssi -%}
                  {%- set ns_beacons.list = ns_beacons.list + [{'device': device, 'rssi': rssi, 'sort_rssi': sort_rssi, 'match_status': match_status}] -%}
                {%- endif -%}
              {%- endfor -%}
              {# Sort by match_status groups, then by sort_rssi within each group (ghosts last) #}
              {%- set match = ns_beacons.list | selectattr('match_status', 'equalto', 0) | sort(attribute='sort_rssi', reverse=true) | list -%}
              {%- set weak_match = ns_beacons.list | selectattr('match_status', 'equalto', 1) | sort(attribute='sort_rssi', reverse=true) | list -%}
              {%- set no_match = ns_beacons.list | selectattr('match_status', 'equalto', 2) | sort(attribute='sort_rssi', reverse=true) | list -%}
              {%- set devices_sorted = match + weak_match + no_match -%}
              {%- for beacon_obj in devices_sorted -%}
          
              {%- set device = beacon_obj.device -%}
                {%- set device_stripped = device.rstrip(':X') -%}
                {%- set dev_parts = device_stripped.split('=') -%}
                {%- if dev_parts | count == 2 -%}
                  {%- set mac = dev_parts[0] | trim | upper -%}
                  {%- set rssi = dev_parts[1] | trim -%}
                  {%- set rssi_value = rssi | int(-100) -%}
                  {%- set is_locally_ignored = device.endswith(':X') -%}
                  {%- set is_globally_ignored = mac in global_list -%}
                  {%- set is_weak_signal = rssi_value == 0 or rssi_value < weak_threshold -%}

                  {# Check if beacon is in latest scan and if RSSI matches #}
                  {%- set is_in_scan = mac in ns_scan.scan_map -%}
                  {%- set scan_rssi = ns_scan.scan_map.get(mac, 0) if is_in_scan else 0 -%}
                  {%- set rssi_diff = (scan_rssi - rssi_value) | abs if is_in_scan else 999 -%}
                  {%- set is_rssi_match = is_in_scan and rssi_diff <= rssi_match_tolerance -%}
                  {%- set is_overlapping = ns_overlap.mac_loc_count.get(mac, 0) > 1 -%}
                  {{
                    {
                      "type": "custom:button-card",
                      "show_icon": false,
                      "show_name": false,
                      "styles": {
                        "card": [
                          {"height": "20px"},
                          {"padding": "0px 8px"},
                          {"border": "none"},
                          {"box-shadow": "none"},
                          {"background": color_beacon_rssi_match if is_rssi_match else (color_beacon_in_scan if is_in_scan else "none")}
                        ],
                        "grid": [
                          {"grid-template-columns": "120px 90px 1fr"},
                          {"grid-template-areas": "'mac rssi name'"}
                        ],
                        "custom_fields": {
                          "mac": [
                            {"font-size": "12px"},
                            {"justify-self": "start"},
                            {"align-self": "center"},
                            {"font-family": "monospace"}
                          ] + (
                            [{"font-weight": "bold"}] if is_overlapping else []
                          ) + (
                            [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                          ) + (
                            [{"text-decoration": "line-through"}] if is_locally_ignored else []
                          ) + (
                            [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                          ),
                          "rssi": [
                            {"font-size": "12px"},
                            {"justify-self": "start"},
                            {"align-self": "center"},
                            {"padding-left": "6px"},
                            {"font-family": "monospace"}
                          ] + (
                            [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                          ) + (
                            [{"text-decoration": "line-through"}] if is_locally_ignored else []
                          ) + (
                            [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                          ),
                          "name": [
                            {"font-size": "11px"},
                            {"justify-self": "start"},
                            {"align-self": "center"},
                            {"padding": "0 6px"},
                            {"overflow": "hidden"},
                            {"text-overflow": "ellipsis"}
                          ] + (
                            [{"font-weight": "bold"}] if is_overlapping else []
                          ) + (
                            [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                          ) + (
                            [{"text-decoration": "line-through"}] if is_locally_ignored else []
                          ) + (
                            [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                          )
                        }
                      },
                      "custom_fields": {
                        "mac": mac,
                        "rssi": rssi ~ " dBm",
                        "name": device_names[mac] | default('?')
                      },
                      "tap_action": {
                        "action": "call-service",
                        "service": "script.bt_beacon_toggle_location_ignored",
                        "data": {
                          "location_index": location_index,
                          "mac": mac
                        }
                      },
                      "hold_action": {
                        "action": "call-service",
                        "service": "script.bt_beacon_toggle_global_ignored",
                        "data": {
                          "mac": mac
                        }
                      },
                      "double_tap_action": {
                        "action": "call-service",
                        "service": "script.bt_beacon_remove_from_fingerprint",
                        "data": {
                          "location_index": location_index,
                          "mac": mac
                        }
                      }
                    }
                  }},
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}

  scan_list_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set scan_devices = state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) -%}
          {%- set global_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set weak_threshold = states('input_number.bt_location_detection_weak_signal_threshold') | int(-95) -%}

          {# Partition into valid and weak/ghost buckets #}
          {%- set ns = namespace(valid=[], weak=[]) -%}
          {%- for device in scan_devices -%}
            {%- set rssi_value = device.rssi | int(0) -%}
            {%- set sort_rssi = -999 if rssi_value == 0 else rssi_value -%}
            {%- if rssi_value == 0 or rssi_value < weak_threshold -%}
              {%- set ns.weak = ns.weak + [device | combine({'sort_rssi': sort_rssi})] -%}
            {%- else -%}
              {%- set ns.valid = ns.valid + [device | combine({'sort_rssi': rssi_value})] -%}
            {%- endif -%}
          {%- endfor -%}

          {%- set valid_sorted = ns.valid | sort(attribute='sort_rssi', reverse=true) -%}
          {%- set weak_sorted = ns.weak | sort(attribute='sort_rssi', reverse=true) -%}
          {%- set scan_sorted = valid_sorted + weak_sorted -%}

          {%- for device in scan_sorted -%}
            {%- set mac = device.mac | upper -%}
            {%- set rssi_value = device.rssi | int(0) -%}
            {%- set device_name = device.name | default('unknown') -%}
            {%- set is_globally_ignored = mac in global_list -%}
            {%- set is_weak_signal = rssi_value == 0 or rssi_value < weak_threshold -%}
            {%- set active_known_beacons = state_attr('sensor.bt_active_known_beacons', 'active_beacons') | default([]) -%}
            {%- set is_known = mac in active_known_beacons -%}
            {{
              {
                "type": "custom:button-card",
                "show_icon": false,
                "show_name": false,
                "styles": {
                  "card": [
                    {"height": "20px"},
                    {"padding": "0px 8px"},
                    {"border": "none"},
                    {"box-shadow": "none"},
                    {"background": "none"}
                  ],
                  "grid": [
                    {"grid-template-columns": "120px 90px 1fr"},
                    {"grid-template-areas": "'mac rssi name'"}
                  ],
                  "custom_fields": {
                    "mac": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"font-family": "monospace"}
                    ] + (
                      [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                    ) + (
                      [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                    ),
                    "rssi": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding-left": "6px"},
                      {"font-family": "monospace"}
                    ] + (
                      [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                    ) + (
                      [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                    ),
                    "name": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding-left": "6px"}
                    ] + (
                      [{"font-weight": "bold"}] if is_known else []
                    ) + (
                      [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                    ) + (
                      [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                    )
                  }
                },
                "custom_fields": {
                  "mac": mac,
                  "rssi": rssi_value | string ~ " dBm",
                  "name": device_name
                },
                "tap_action": {
                  "action": "none"
                },
                "hold_action": {
                  "action": "call-service",
                  "service": "script.bt_beacon_toggle_global_ignored",
                  "data": {"mac": mac}
                }
              }
            }},
          {%- endfor -%}

  ignored_list_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set ignored_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set device_names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default({}) -%}
          {%- set device_names = device_names_raw | from_json if device_names_raw is string else device_names_raw -%}
          {%- set ns = namespace(ignored_sorted=[]) -%}
          {%- for mac in ignored_list | sort -%}
            {%- set ns.ignored_sorted = ns.ignored_sorted + [mac] -%}
          {%- endfor -%}
          {%- for mac in ns.ignored_sorted -%}
            {{
              {
                "type": "custom:button-card",
                "show_icon": false,
                "show_name": false,
                "styles": {
                  "card": [
                    {"height": "20px"},
                    {"padding": "0px 8px"},
                    {"border": "none"},
                    {"box-shadow": "none"},
                    {"background": "none"}
                  ],
                  "grid": [
                    {"grid-template-columns": "120px 1fr"},
                    {"grid-template-areas": "'mac name'"}
                  ],
                  "custom_fields": {
                    "mac": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"font-family": "monospace"},
                      {"color": "var(--disabled-text-color)"},
                      {"text-decoration": "line-through"}
                    ],
                    "name": [
                      {"font-size": "11px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding": "0 6px"},
                      {"overflow": "hidden"},
                      {"text-overflow": "ellipsis"},
                      {"color": "var(--disabled-text-color)"},
                      {"text-decoration": "line-through"}
                    ]
                  }
                },
                "custom_fields": {
                  "mac": mac,
                  "name": device_names[mac] | default('?')
                },
                "tap_action": {
                  "action": "none"
                },
                "hold_action": {
                  "action": "call-service",
                  "service": "script.bt_beacon_toggle_global_ignored",
                  "data": {"mac": mac}
                }
              }
            }},
          {%- endfor -%}

  all_beacons_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set fingerprints_raw = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) -%}
          {%- set locations_list = state_attr('sensor.bt_location_array', 'locations') | default([]) -%}
          {%- set global_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set weak_threshold = states('input_number.bt_location_detection_weak_signal_threshold') | int -%}
          {%- set rssi_tolerance = states('input_number.bt_location_detection_rssi_tolerance') | int(5) -%}
          {%- set device_names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default({}) -%}
          {%- set device_names = device_names_raw | from_json if device_names_raw is string else device_names_raw -%}
          {# Color scheme (injected via decluttering variables from _colors anchors) #}
          {%- set color_beacon_overlap = "[[color_overlap]]" -%}
          {%- set color_beacon_discriminated = "[[color_discriminated]]" -%}
          {# Pass 1: Build MAC → {name, locs} dict for all active beacons #}
          {%- set ns_build = namespace(mac_locs={}) -%}
          {%- for row in fingerprints_raw -%}
            {%- set parts = row.split('|') -%}
            {%- if parts | count == 2 -%}
              {%- set location_index = parts[0] | trim | int(-1) -%}
              {%- set location_name = locations_list[location_index] if location_index >= 0 and location_index < locations_list | length else '' -%}
              {%- if location_name -%}
                {%- for device in parts[1].split(',') -%}
                  {%- if '=' in device -%}
                    {%- set pair_stripped = device.rstrip(':X') -%}
                    {%- set kv = pair_stripped.split('=') -%}
                    {%- if kv | count == 2 -%}
                      {%- set mac = kv[0] | trim | upper -%}
                      {%- set rssi_val = kv[1] | trim | int(0) -%}
                      {%- if not device.endswith(':X') and mac not in global_list and rssi_val != 0 and rssi_val >= weak_threshold -%}
                        {%- if mac not in ns_build.mac_locs -%}
                          {%- set ns_build.mac_locs = ns_build.mac_locs | combine({mac: {'name': device_names[mac] | default('?'), 'locs': [], 'rssi_list': []}}) -%}
                        {%- endif -%}
                        {%- set cur_locs = ns_build.mac_locs[mac].locs -%}
                        {%- set cur_rssi = ns_build.mac_locs[mac].rssi_list -%}
                        {%- if location_name not in cur_locs -%}
                          {%- set ns_build.mac_locs = ns_build.mac_locs | combine({mac: {'name': ns_build.mac_locs[mac].name, 'locs': cur_locs + [location_name], 'rssi_list': cur_rssi + [rssi_val]}}) -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {# Pass 1.5: Calculate RSSI consistency for each beacon #}
          {%- set total_locations = locations_list | length -%}
          {%- set ns_consistency = namespace(bg_colors={}) -%}
          {%- for mac in ns_build.mac_locs.keys() -%}
            {%- set rssi_list = ns_build.mac_locs[mac].rssi_list -%}
            {%- set n = rssi_list | length -%}
            {%- if n <= 1 -%}
              {%- set bg = "none" -%}
            {%- else -%}
              {%- set ns_c = namespace(pairs_within=0, pairs_total=0) -%}
              {%- for i in range(n) -%}
                {%- for j in range(i+1, n) -%}
                  {%- set ns_c.pairs_total = ns_c.pairs_total + 1 -%}
                  {%- if (rssi_list[i] - rssi_list[j]) | abs <= rssi_tolerance -%}
                    {%- set ns_c.pairs_within = ns_c.pairs_within + 1 -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endfor -%}
              {%- if n == total_locations and ns_c.pairs_within == ns_c.pairs_total -%}
                {%- set bg = color_beacon_overlap -%}
              {%- elif ns_c.pairs_within == 0 -%}
                {%- set bg = color_beacon_discriminated -%}
              {%- else -%}
                {%- set bg = "none" -%}
              {%- endif -%}
            {%- endif -%}
            {%- set ns_consistency.bg_colors = ns_consistency.bg_colors | combine({mac: bg}) -%}
          {%- endfor -%}
          {# Pass 2: Render button-cards sorted by MAC #}
          {%- for mac in ns_build.mac_locs.keys() | sort -%}
            {%- set entry = ns_build.mac_locs[mac] -%}
            {%- set bg = ns_consistency.bg_colors.get(mac, "none") -%}
            {{
              {
                "type": "custom:button-card",
                "show_icon": false,
                "show_name": false,
                "styles": {
                  "card": [
                    {"height": "20px"},
                    {"padding": "0px 8px"},
                    {"border": "none"},
                    {"box-shadow": "none"},
                    {"background": bg}
                  ],
                  "grid": [
                    {"grid-template-columns": "120px 1fr 1fr"},
                    {"grid-template-areas": "'mac name locs'"}
                  ],
                  "custom_fields": {
                    "mac": [
                      {"font-size": "12px"},
                      {"font-family": "monospace"},
                      {"justify-self": "start"},
                      {"align-self": "center"}
                    ],
                    "name": [
                      {"font-size": "11px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding": "0 6px"},
                      {"overflow": "hidden"},
                      {"text-overflow": "ellipsis"}
                    ],
                    "locs": [
                      {"font-size": "11px"},
                      {"font-style": "italic"},
                      {"opacity": "0.8"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding": "0 6px"},
                      {"overflow": "hidden"},
                      {"text-overflow": "ellipsis"}
                    ]
                  }
                },
                "custom_fields": {
                  "mac": mac,
                  "name": entry.name,
                  "locs": entry.locs | join(', ')
                },
                "tap_action": {
                  "action": "call-service",
                  "service": "script.bt_beacon_toggle_all_locations_ignored",
                  "data": {"mac": mac}
                },
                "double_tap_action": {
                  "action": "call-service",
                  "service": "script.bt_beacon_remove_from_all_fingerprints",
                  "data": {"mac": mac}
                },
                "hold_action": {
                  "action": "call-service",
                  "service": "script.bt_beacon_toggle_global_ignored",
                  "data": {"mac": mac}
                }
              }
            }},
          {%- endfor -%}

  location_matrix_template:
    card:
      type: custom:button-card
      entity: sensor.bt_location_confusion_matrix
      show_name: false
      show_state: false
      show_label: false
      show_icon: false
      variables:
        color_destructive: *color_severe
        color_warning: *color_warning
        color_success: *color_success
        color_header: *color_header_bg
      styles:
        card:
          - padding: 0px
          - display: block
        grid:
          - grid-template-areas: '"matrix_table"'
          - grid-template-columns: 100%
        custom_fields:
          matrix_table:
            - width: 100%
            - display: block
      custom_fields:
        matrix_table: |
          [[[
            const data = states['sensor.bt_location_confusion_matrix']?.attributes?.matrix || [];
            const locs = states['sensor.bt_location_array']?.attributes?.locations || [];
            if (data.length === 0) return "No data";

            const sortedLocs = [...locs].sort();
            const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

            let table = "<table class='matrix-table'><thead><tr><th class='sticky-col'></th>";
            sortedLocs.forEach(l => table += `<th>${cap(l)}</th>`);
            table += "</tr></thead><tbody>";

            data.forEach(row => {
              table += "<tr>";
              table += `<td class='sticky-col'>${cap(row.src)}</td>`;
              sortedLocs.forEach(loc => {
                const s = row.scores[loc] || 0;
                let bg = "transparent";
                if (row.src === loc) { if (s !== 1.0) bg = variables.color_destructive; }
                else {
                  if (s > 0.6) bg = variables.color_destructive;
                  else if (s > 0.3) bg = variables.color_warning;
                  else bg = variables.color_success;
                }
                table += `<td style='background-color:${bg}'>${s.toFixed(2)}</td>`;
              });
              table += "</tr>";
            });

            return `<div class='scroll-wrapper'>${table}</tbody></table></div>`;
          ]]]
      card_mod:
        style: |
          /* 1. Target the button-card internal container */
          .card-content {
            display: block !important;
            width: 100% !important;
            overflow: hidden !important;
          }
          /* 2. Target the specific custom field container ID */
          #matrix_table {
            display: block !important;
            width: 100% !important;
            max-width: 100% !important;
            overflow: hidden !important;
          }
          /* 3. The actual scrollable div we created in JS */
          .scroll-wrapper {
            overflow-x: auto !important;
            display: block !important;
            width: 100% !important;
            -webkit-overflow-scrolling: touch;
          }
          /* 4. The table MUST be allowed to be wider than the wrapper */
          .matrix-table {
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--divider-color);
            font-size: 0.9rem;
            white-space: nowrap;
            width: auto !important;
            min-width: 100%;
          }
          /* Common cell styling */
          .matrix-table th,
          .matrix-table td {
            padding: 8px 12px;
            border-right: 1px solid var(--divider-color);
            border-bottom: 1px solid var(--divider-color);
            text-align: center;
          }
          /* Header-specific styling */
          /* Note: Matrix data table headers use opaque white (card background) for readability.
             The semi-transparent header bg is not usable with a sticky header when scrolling. */
          .matrix-table th {
            font-weight: bold;
            background-color: var(--card-background-color) !important;
          }
          .sticky-col {
            position: sticky;
            left: 0;
            z-index: 4;
            text-align: left;
            font-weight: bold;
            background-color: var(--card-background-color) !important;
            opacity: 1 !important;
            border-right: 2px solid var(--divider-color) !important;
          }

# -------------------------------------------------------------------------------------
# VIEWS
# -------------------------------------------------------------------------------------

views:
  - path: home
    title: "Triangulation"
    icon: mdi:crosshairs-gps
    cards:
      # Latest BT scan - interactive beacon list with tap-to-ignore
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-template-card
            primary: |
              {%- set known = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) -%}
              {%- set unknown = state_attr('sensor.bt_location_scores', 'unknown_beacons_in_scan') | int(0) -%}
              Latest BT Scan ({{ known }}+{{ unknown }})
            secondary: "{{ state_attr('sensor.bt_latest_scan_full', 'timestamp') | default('No scan yet') }}"
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                }

          - type: custom:decluttering-card
            template: scan_list_template


      # Fingerprint Details (auto-entities with button-cards)
