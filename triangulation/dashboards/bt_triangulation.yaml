# bt_triangulation.yaml
# BT Location Calibration amd Settings Dashboard
# DEPENDENCIES: button-card (via HACS)
#
# Access at: /lovelace/screensaver-settings
# Used for: BT fingerprint collection, advanced configuration

title: Screensaver Settings

# Style constants (YAML anchors)
_colors:
  severe: &color_severe "rgba(239, 54, 54, 0.2) !important"
  success: &color_success "rgba(76, 175, 80, 0.2) !important"
  warning: &color_warning "rgba(255, 152, 0, 0.2) !important"
  action_test: &color_action_test "rgba(100, 200, 100, 0.2) !important"
  info: &color_info rgba(54, 150, 239, 0.15)
  header_bg: &color_header_bg rgba(0, 0, 0, 0.1)

# Confusion matrix color thresholds (scores are discrete: 0.04 / 0.16 / 0.36 / 0.64 / 1.0 for 5-beacon setups)
# 0.3 sits between 0.16 (green) and 0.36 (amber); 0.6 sits between 0.36 (amber) and 0.64 (red)
_matrix:
  threshold_warning: &matrix_threshold_warning 0.3
  threshold_severe: &matrix_threshold_severe 0.6

# Beacon state styling: Applied inline in template conditionals (see beacon_list_template filter)
# Anchors cannot be used here because styling must be conditionally combined with other states (weak_signal, etc.)
# in Jinja2 ternary expressions. The inline approach is more readable for conditional style chains.

# -------------------------------------------------------------------------------------
# DECLUTTERING TEMPLATES (for reusable card definitions with YAML anchor injection)
# -------------------------------------------------------------------------------------

decluttering_templates:
  beacon_list_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set locations_list = state_attr('sensor.bt_location_array', 'locations') | default([]) -%}
          {%- set global_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set weak_threshold = states('input_number.bt_location_detection_weak_signal_threshold') | int -%}
          {%- set rssi_match_tolerance = states('input_number.bt_location_detection_rssi_tolerance') | int -%}
          {# Color scheme (injected via decluttering variables from _colors anchors) #}
          {%- set color_beacon_rssi_match = "[[color_rssi_match]]" -%}
          {%- set color_beacon_in_scan = "[[color_in_scan]]" -%}
          {%- set color_location_header_bg = "[[location_header_bg]]" -%}
          {# Get latest scan data for matching against fingerprints #}
          {%- set scan_devices = state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) -%}
          {%- set ns_scan = namespace(scan_map={}) -%}
          {%- for scan_dev in scan_devices -%}
            {%- set ns_scan.scan_map = ns_scan.scan_map | combine({scan_dev.mac | upper: scan_dev.rssi}) -%}
          {%- endfor -%}
          {# Get device names mapping for displaying friendly names alongside MACs #}
          {%- set device_names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default({}) -%}
          {%- set device_names = device_names_raw | from_json if device_names_raw is string else device_names_raw -%}
          {# Build active scan map: beacons above threshold and not globally ignored #}
          {%- set ns_active = namespace(map={}) -%}
          {%- for dev in scan_devices -%}
            {%- set mac = dev.mac | upper -%}
            {%- set rssi = dev.rssi | int(0) -%}
            {%- if rssi != 0 and rssi >= weak_threshold and mac not in global_list -%}
              {%- set ns_active.map = ns_active.map | combine({mac: rssi}) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set active_scan_map = ns_active.map -%}
          {%- set active_scan_count = active_scan_map | length -%}
          {# Load location scores from event-triggered sensor (empty dict if not yet triggered) #}
          {%- set scores_raw = state_attr('sensor.bt_location_scores', 'location_scores') or {} -%}
          {%- set scores = scores_raw | from_json if scores_raw is string else scores_raw -%}

          {# Get known beacon count for context #}
          {%- set known_in_scan = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) -%}
          {# Extract fingerprints into named variable #}
          {%- set fingerprints_raw = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) -%}
          {# Build MAC → active-location-count map for overlap highlighting (from sensor) #}
          {%- set mac_locs_raw = state_attr('sensor.bt_active_known_beacons', 'mac_locs') | default('{}') -%}
          {%- set mac_locs_data = mac_locs_raw | from_json if mac_locs_raw is string else mac_locs_raw -%}
          {%- set ns_overlap = namespace(mac_loc_count={}) -%}
          {%- for mac, data in mac_locs_data.items() -%}
            {%- set ns_overlap.mac_loc_count = ns_overlap.mac_loc_count | combine({mac: data.locs | length}) -%}
          {%- endfor -%}
          {# Pre-pass 1: collect unique locations with scores #}
          {%- set ns_locs = namespace(list=[], seen=[]) -%}
          {%- for fp in fingerprints_raw -%}
            {%- set location_index = fp.loc -%}
            {%- set location_name = locations_list[location_index] if location_index >= 0 and location_index < locations_list | length else (location_index | string) -%}
            {%- if location_index >= 0 and location_index not in ns_locs.seen -%}
              {%- set ns_locs.seen = ns_locs.seen + [location_index] -%}
              {%- set loc_data = scores.get(location_name, {}) -%}
              {%- set loc_score = loc_data.get('total_score', -1) | float -%}
              {%- set ns_locs.list = ns_locs.list + [{'index': location_index, 'name': location_name, 'score': loc_score}] -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set sorted_locs = ns_locs.list | sort(attribute='score', reverse=true) -%}
          {# Pre-pass 2: reorder fingerprint rows by score (best match first) #}
          {%- set ns_sorted = namespace(rows=[]) -%}
          {%- for loc in sorted_locs -%}
            {%- for fp in fingerprints_raw -%}
              {%- if fp.loc == loc.index -%}
                {%- set ns_sorted.rows = ns_sorted.rows + [fp] -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endfor -%}

          {# Loop over beacons (sorted by best match) #}
          {%- set prev_location = '' -%}
          {%- for fp in ns_sorted.rows -%}
            {%- set location_index = fp.loc -%}
            {%- set location_name = locations_list[location_index] if location_index >= 0 and location_index < locations_list | length else (location_index | string) -%}
            {%- if location_name != prev_location -%}
                {%- set loc_metrics = scores.get(location_name, {}) -%}
                {%- set matched = loc_metrics.get('matched', 0) | int -%}
                {%- set missing = loc_metrics.get('missing', 0) | int -%}
                {%- set total = matched + missing -%}
                {%- set loc_score = loc_metrics.get('total_score', -1) | float -%}
                {%- set confidence_pct = ((loc_score * 100) | round(0) | int) if loc_score >= 0 else -1 -%}
                {{
                  {
                    "type": "custom:button-card",
                    "layout": "vertical",
                    "show_icon": false,
                    "show_name": true,
                    "name": location_name ~ " " ~ matched ~ "/" ~ total ~ " [" ~ known_in_scan ~ "]" ~ (' • ' ~ confidence_pct ~ '%' if confidence_pct >= 0 else ''),
                    "tap_action": {
                      "action": "perform-action",
                      "perform_action": "script.merge_bt_fingerprint",
                      "data": {
                        "location_index": location_index,
                        "rssi_only": true,
                        "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"
                      }
                    },
                    "double_tap_action": {
                      "action": "perform-action",
                      "perform_action": "script.merge_bt_fingerprint",
                      "data": {
                        "location_index": location_index,
                        "rssi_only": false,
                        "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"
                      }
                    },
                    "hold_action": {
                      "action": "perform-action",
                      "perform_action": "script.capture_bt_fingerprint",
                      "data": {
                        "location_index": location_index,
                        "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"
                      }
                    },
                    "styles": {
                      "card": [
                        {"height": "24px"},
                        {"padding": "8px"},
                        {"border": "none"},
                        {"box-shadow": "none"},
                        {"background": color_location_header_bg},
                        {"margin-top": "8px"},
                        {"align-items": "start"}
                      ],
                      "name": [
                        {"font-size": "12px"},
                        {"font-weight": "bold"},
                        {"color": "var(--primary-text-color)"},
                        {"justify-self": "start"}
                      ]
                    }
                  }
                }},
                {%- set prev_location = location_name -%}
              {%- endif -%}
              {# Build beacon list with match status for sorting #}
              {%- set ns_beacons = namespace(list=[]) -%}
              {%- if fp.beacons is not none -%}
                {%- for mac, beacon in fp.beacons.items() -%}
                  {%- set mac_upper = mac | upper -%}
                  {%- set rssi = ((beacon.min + beacon.max) / 2) | int if 'min' in beacon else beacon.rssi -%}
                  {%- set is_locally_ignored = beacon.get('ignored', false) -%}
                  {%- set is_globally_ignored = mac_upper in global_list -%}
                  {%- set is_weak_signal = rssi == 0 or rssi < weak_threshold -%}
                  {%- set is_in_scan = mac_upper in ns_scan.scan_map -%}
                  {%- set scan_rssi = ns_scan.scan_map.get(mac_upper, 0) if is_in_scan else 0 -%}
                  {%- if is_in_scan and 'min' in beacon -%}
                    {%- set is_rssi_match = scan_rssi >= beacon.min and scan_rssi <= beacon.max -%}
                  {%- elif is_in_scan -%}
                    {%- set is_rssi_match = (scan_rssi - rssi) | abs <= rssi_match_tolerance -%}
                  {%- else -%}
                    {%- set is_rssi_match = false -%}
                  {%- endif -%}
                  {# Determine match status: match=0, weak_match=1, no_match=2 #}
                  {%- if is_rssi_match -%}
                    {%- set match_status = 0 -%}
                  {%- elif is_in_scan -%}
                    {%- set match_status = 1 -%}
                  {%- else -%}
                    {%- set match_status = 2 -%}
                  {%- endif -%}
                  {# For sorting: ghost (0 dBm) sorts last within group, weak signals by RSSI #}
                  {%- set sort_rssi = -999 if rssi == 0 else rssi -%}
                  {%- set ns_beacons.list = ns_beacons.list + [{'mac': mac_upper, 'rssi': rssi, 'sort_rssi': sort_rssi, 'match_status': match_status, 'is_locally_ignored': is_locally_ignored, 'is_globally_ignored': is_globally_ignored, 'is_weak_signal': is_weak_signal, 'is_in_scan': is_in_scan, 'is_rssi_match': is_rssi_match}] -%}
                {%- endfor -%}
              {%- endif -%}
              {# Sort by match_status groups, then by sort_rssi within each group (ghosts last) #}
              {%- set match = ns_beacons.list | selectattr('match_status', 'equalto', 0) | sort(attribute='sort_rssi', reverse=true) | list -%}
              {%- set weak_match = ns_beacons.list | selectattr('match_status', 'equalto', 1) | sort(attribute='sort_rssi', reverse=true) | list -%}
              {%- set no_match = ns_beacons.list | selectattr('match_status', 'equalto', 2) | sort(attribute='sort_rssi', reverse=true) | list -%}
              {%- set devices_sorted = match + weak_match + no_match -%}
              {%- for beacon_obj in devices_sorted -%}
                {%- set mac = beacon_obj.mac -%}
                {%- set rssi = beacon_obj.rssi -%}
                {%- set is_locally_ignored = beacon_obj.is_locally_ignored -%}
                {%- set is_globally_ignored = beacon_obj.is_globally_ignored -%}
                {%- set is_weak_signal = beacon_obj.is_weak_signal -%}
                {%- set is_in_scan = beacon_obj.is_in_scan -%}
                {%- set is_rssi_match = beacon_obj.is_rssi_match -%}
                {%- set is_overlapping = ns_overlap.mac_loc_count.get(mac, 0) > 1 -%}
                {{
                  {
                    "type": "custom:button-card",
                    "show_icon": false,
                    "show_name": false,
                    "styles": {
                      "card": [
                        {"height": "20px"},
                        {"padding": "0px 8px"},
                        {"border": "none"},
                        {"box-shadow": "none"},
                        {"background": color_beacon_rssi_match if is_rssi_match else (color_beacon_in_scan if is_in_scan else "none")}
                      ],
                      "grid": [
                        {"grid-template-columns": "120px 90px 1fr"},
                        {"grid-template-areas": "'mac rssi name'"}
                      ],
                      "custom_fields": {
                        "mac": [
                          {"font-size": "12px"},
                          {"justify-self": "start"},
                          {"align-self": "center"},
                          {"font-family": "monospace"}
                        ] + (
                          [{"font-weight": "bold"}] if is_overlapping else []
                        ) + (
                          [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                        ) + (
                          [{"text-decoration": "line-through"}] if is_locally_ignored else []
                        ) + (
                          [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                        ),
                        "rssi": [
                          {"font-size": "12px"},
                          {"justify-self": "start"},
                          {"align-self": "center"},
                          {"padding-left": "6px"},
                          {"font-family": "monospace"}
                        ] + (
                          [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                        ) + (
                          [{"text-decoration": "line-through"}] if is_locally_ignored else []
                        ) + (
                          [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                        ),
                        "name": [
                          {"font-size": "11px"},
                          {"justify-self": "start"},
                          {"align-self": "center"},
                          {"padding": "0 6px"},
                          {"overflow": "hidden"},
                          {"text-overflow": "ellipsis"}
                        ] + (
                          [{"font-weight": "bold"}] if is_overlapping else []
                        ) + (
                          [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                        ) + (
                          [{"text-decoration": "line-through"}] if is_locally_ignored else []
                        ) + (
                          [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                        )
                      }
                    },
                    "custom_fields": {
                      "mac": mac,
                      "rssi": rssi ~ " dBm",
                      "name": device_names[mac] | default('?')
                    },
                    "tap_action": {
                      "action": "perform-action",
                      "perform_action": "script.bt_beacon_toggle_location_ignored",
                      "data": {
                        "location_index": location_index,
                        "mac": mac
                      }
                    },
                    "hold_action": {
                      "action": "perform-action",
                      "perform_action": "script.bt_beacon_toggle_global_ignored",
                      "data": {
                        "mac": mac
                      }
                    },
                    "double_tap_action": {
                      "action": "perform-action",
                      "perform_action": "script.bt_beacon_remove_from_fingerprint",
                      "data": {
                        "location_index": location_index,
                        "mac": mac
                      }
                    }
                  }
                }},
              {%- endfor -%}
          {%- endfor -%}

  scan_list_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set scan_devices = state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) -%}
          {%- set global_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set weak_threshold = states('input_number.bt_location_detection_weak_signal_threshold') | int(-95) -%}

          {# Partition into valid and weak/ghost buckets #}
          {%- set ns = namespace(valid=[], weak=[]) -%}
          {%- for device in scan_devices -%}
            {%- set rssi_value = device.rssi | int(0) -%}
            {%- set sort_rssi = -999 if rssi_value == 0 else rssi_value -%}
            {%- if rssi_value == 0 or rssi_value < weak_threshold -%}
              {%- set ns.weak = ns.weak + [device | combine({'sort_rssi': sort_rssi})] -%}
            {%- else -%}
              {%- set ns.valid = ns.valid + [device | combine({'sort_rssi': rssi_value})] -%}
            {%- endif -%}
          {%- endfor -%}

          {%- set valid_sorted = ns.valid | sort(attribute='sort_rssi', reverse=true) -%}
          {%- set weak_sorted = ns.weak | sort(attribute='sort_rssi', reverse=true) -%}
          {%- set scan_sorted = valid_sorted + weak_sorted -%}

          {%- for device in scan_sorted -%}
            {%- set mac = device.mac | upper -%}
            {%- set rssi_value = device.rssi | int(0) -%}
            {%- set device_name = device.name | default('unknown') -%}
            {%- set is_globally_ignored = mac in global_list -%}
            {%- set is_weak_signal = rssi_value == 0 or rssi_value < weak_threshold -%}
            {%- set mac_locs_raw = state_attr('sensor.bt_active_known_beacons', 'mac_locs') | default('{}') -%}
            {%- set active_known_beacons = (mac_locs_raw | from_json if mac_locs_raw is string else mac_locs_raw).keys() | list -%}
            {%- set is_known = mac in active_known_beacons -%}
            {%- set first_octet = mac.split(':')[0] | int(base=16) -%}
            {%- set is_local = (first_octet | bitwise_and(2)) != 0 -%}
            {%- set is_static_random = (first_octet | bitwise_and(192)) == 192 -%}
            {%- set is_random = is_local and not is_static_random -%}
            {{
              {
                "type": "custom:button-card",
                "show_icon": false,
                "show_name": false,
                "styles": {
                  "card": [
                    {"height": "20px"},
                    {"padding": "0px 8px"},
                    {"border": "none"},
                    {"box-shadow": "none"},
                    {"background": "none"}
                  ],
                  "grid": [
                    {"grid-template-columns": "120px 90px 1fr"},
                    {"grid-template-areas": "'mac rssi name'"}
                  ],
                  "custom_fields": {
                    "mac": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"font-family": "monospace"}
                    ] + (
                      [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                    ) + (
                      [{"font-style": "italic"}, {"color": "var(--warning-color)"}] if is_random else []
                    ) + (
                      [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                    ),
                    "rssi": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding-left": "6px"},
                      {"font-family": "monospace"}
                    ] + (
                      [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                    ) + (
                      [{"font-style": "italic"}, {"color": "var(--warning-color)"}] if is_random else []
                    ) + (
                      [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                    ),
                    "name": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding-left": "6px"}
                    ] + (
                      [{"font-weight": "bold"}] if is_known else []
                    ) + (
                      [{"font-style": "italic"}, {"opacity": "0.6"}] if is_weak_signal else []
                    ) + (
                      [{"font-style": "italic"}, {"color": "var(--warning-color)"}] if is_random else []
                    ) + (
                      [{"color": "var(--disabled-text-color)"}, {"text-decoration": "line-through"}] if is_globally_ignored else []
                    )
                  }
                },
                "custom_fields": {
                  "mac": mac,
                  "rssi": rssi_value | string ~ " dBm",
                  "name": device_name
                },
                "tap_action": {
                  "action": "none"
                },
                "hold_action": {
                  "action": "perform-action",
                  "perform_action": "script.bt_beacon_toggle_global_ignored",
                  "data": {"mac": mac}
                }
              }
            }},
          {%- endfor -%}

  ignored_list_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set ignored_list = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) -%}
          {%- set device_names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default({}) -%}
          {%- set device_names = device_names_raw | from_json if device_names_raw is string else device_names_raw -%}
          {%- for mac in ignored_list | sort -%}
            {{
              {
                "type": "custom:button-card",
                "show_icon": false,
                "show_name": false,
                "styles": {
                  "card": [
                    {"height": "20px"},
                    {"padding": "0px 8px"},
                    {"border": "none"},
                    {"box-shadow": "none"},
                    {"background": "none"}
                  ],
                  "grid": [
                    {"grid-template-columns": "120px 1fr"},
                    {"grid-template-areas": "'mac name'"}
                  ],
                  "custom_fields": {
                    "mac": [
                      {"font-size": "12px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"font-family": "monospace"},
                      {"color": "var(--disabled-text-color)"},
                      {"text-decoration": "line-through"}
                    ],
                    "name": [
                      {"font-size": "11px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding": "0 6px"},
                      {"overflow": "hidden"},
                      {"text-overflow": "ellipsis"},
                      {"color": "var(--disabled-text-color)"},
                      {"text-decoration": "line-through"}
                    ]
                  }
                },
                "custom_fields": {
                  "mac": mac,
                  "name": device_names[mac] | default('?')
                },
                "tap_action": {
                  "action": "none"
                },
                "hold_action": {
                  "action": "perform-action",
                  "perform_action": "script.bt_beacon_toggle_global_ignored",
                  "data": {"mac": mac}
                }
              }
            }},
          {%- endfor -%}

  all_beacons_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set device_names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default({}) -%}
          {%- set device_names = device_names_raw | from_json if device_names_raw is string else device_names_raw -%}
          {# Color scheme (injected via decluttering variables from _colors anchors) #}
          {%- set color_beacon_overlap = "[[color_overlap]]" -%}
          {%- set color_beacon_discriminated = "[[color_discriminated]]" -%}
          {# Load active beacons with discriminator from sensor (single source of truth) #}
          {%- set mac_locs_raw = state_attr('sensor.bt_active_known_beacons', 'mac_locs') | default('{}') -%}
          {%- set mac_locs = mac_locs_raw | from_json if mac_locs_raw is string else mac_locs_raw -%}
          {# Render button-cards sorted by MAC #}
          {%- for mac in mac_locs.keys() | sort -%}
            {%- set entry = mac_locs[mac] -%}
            {%- set bg = color_beacon_overlap if entry.discriminator < 0 else (color_beacon_discriminated if entry.discriminator > 0 else 'none') -%}
            {{
              {
                "type": "custom:button-card",
                "show_icon": false,
                "show_name": false,
                "styles": {
                  "card": [
                    {"height": "20px"},
                    {"padding": "0px 8px"},
                    {"border": "none"},
                    {"box-shadow": "none"},
                    {"background": bg}
                  ],
                  "grid": [
                    {"grid-template-columns": "120px 1fr 1fr"},
                    {"grid-template-areas": "'mac name locs'"}
                  ],
                  "custom_fields": {
                    "mac": [
                      {"font-size": "12px"},
                      {"font-family": "monospace"},
                      {"justify-self": "start"},
                      {"align-self": "center"}
                    ],
                    "name": [
                      {"font-size": "11px"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding": "0 6px"},
                      {"overflow": "hidden"},
                      {"text-overflow": "ellipsis"}
                    ],
                    "locs": [
                      {"font-size": "11px"},
                      {"font-style": "italic"},
                      {"opacity": "0.8"},
                      {"justify-self": "start"},
                      {"align-self": "center"},
                      {"padding": "0 6px"},
                      {"overflow": "hidden"},
                      {"text-overflow": "ellipsis"}
                    ]
                  }
                },
                "custom_fields": {
                  "mac": mac,
                  "name": device_names.get(mac, '?'),
                  "locs": entry.locs | join(', ')
                },
                "tap_action": {
                  "action": "perform-action",
                  "perform_action": "script.bt_beacon_toggle_all_locations_ignored",
                  "data": {"mac": mac}
                },
                "double_tap_action": {
                  "action": "perform-action",
                  "perform_action": "script.bt_beacon_remove_from_all_fingerprints",
                  "data": {"mac": mac}
                },
                "hold_action": {
                  "action": "perform-action",
                  "perform_action": "script.bt_beacon_toggle_global_ignored",
                  "data": {"mac": mac}
                }
              }
            }},
          {%- endfor -%}

  location_matrix_template:
    card:
      type: custom:button-card
      entity: sensor.bt_location_confusion_matrix
      show_name: false
      show_state: false
      show_label: false
      show_icon: false
      variables:
        color_destructive: *color_severe
        color_warning: *color_warning
        color_success: *color_success
        color_header: *color_header_bg
        threshold_warning: *matrix_threshold_warning
        threshold_severe: *matrix_threshold_severe
      styles:
        card:
          - padding: 0px
          - display: block
        grid:
          - grid-template-areas: '"matrix_table"'
          - grid-template-columns: 100%
        custom_fields:
          matrix_table:
            - width: 100%
            - display: block
      custom_fields:
        matrix_table: |
          [[[
            const data = states['sensor.bt_location_confusion_matrix']?.attributes?.matrix || [];
            const locs = states['sensor.bt_location_array']?.attributes?.locations || [];
            if (data.length === 0) return "No data";

            const sortedLocs = [...locs].sort();

            let table = "<table class='matrix-table'><thead><tr><th class='sticky-col'></th>";
            sortedLocs.forEach(loc => table += `<th>${loc}</th>`);
            table += "</tr></thead><tbody>";

            const callSvc = (val) => hass?.callService('input_text', 'set_value', {entity_id: 'input_text.bt_matrix_selected_pair', value: val});

            data.forEach(row => {
              table += "<tr>";
              table += `<td class='sticky-col'>${row.src}</td>`;
              sortedLocs.forEach(loc => {
                const s = row.scores[loc] || 0;
                const isDiag = row.src === loc;
                let bg = "transparent";
                if (isDiag) { if (s !== 1.0) bg = variables.color_destructive; }
                else {
                  if (s > variables.threshold_severe) bg = variables.color_destructive;
                  else if (s > variables.threshold_warning) bg = variables.color_warning;
                  else bg = variables.color_success;
                }
                const isClickable = !isDiag;
                const cursor = isClickable ? 'pointer' : 'default';
                const pairVal = isClickable ? `${row.src}|${loc}` : '';
                table += `<td style='background-color:${bg};cursor:${cursor}' data-pair='${pairVal}'>${s.toFixed(2)}</td>`;
              });
              table += "</tr>";
            });

            const output = `<div class='scroll-wrapper'>${table}</tbody></table></div>`;
            setTimeout(() => {
              const root = this.shadowRoot || this.getRootNode();
              root?.querySelectorAll('td[data-pair]').forEach(td => {
                const pair = td.getAttribute('data-pair');
                td.addEventListener('pointerdown', (e) => {
                  e.stopPropagation();
                });
                td.addEventListener('click', (e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  callSvc(pair);
                });
              });
            }, 0);
            return output;
          ]]]
      card_mod:
        style: |
          /* 1. Target the button-card internal container */
          .card-content {
            display: block !important;
            width: 100% !important;
            overflow: hidden !important;
          }
          /* 2. Target the specific custom field container ID */
          #matrix_table {
            display: block !important;
            width: 100% !important;
            max-width: 100% !important;
            overflow: hidden !important;
          }
          /* 3. The actual scrollable div we created in JS */
          .scroll-wrapper {
            overflow-x: auto !important;
            display: block !important;
            width: 100% !important;
            -webkit-overflow-scrolling: touch;
          }
          /* 4. The table MUST be allowed to be wider than the wrapper */
          .matrix-table {
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--divider-color);
            font-size: 0.9rem;
            white-space: nowrap;
            width: auto !important;
            min-width: 100%;
          }
          /* Common cell styling */
          .matrix-table th,
          .matrix-table td {
            padding: 8px 12px;
            border-right: 1px solid var(--divider-color);
            border-bottom: 1px solid var(--divider-color);
            text-align: center;
          }
          /* Header-specific styling */
          /* Note: Matrix data table headers use opaque white (card background) for readability.
             The semi-transparent header bg is not usable with a sticky header when scrolling. */
          .matrix-table th {
            font-weight: bold;
            background-color: var(--card-background-color) !important;
          }
          .sticky-col {
            position: sticky;
            left: 0;
            z-index: 4;
            text-align: left;
            font-weight: bold;
            background-color: var(--card-background-color) !important;
            opacity: 1 !important;
            border-right: 2px solid var(--divider-color) !important;
          }

  matrix_drilldown_template:
    card:
      type: conditional
      conditions:
        - condition: state
          entity: input_text.bt_matrix_selected_pair
          state_not: ""
      card:
        type: custom:button-card
        entity: sensor.bt_location_confusion_matrix
        show_name: false
        show_state: false
        show_label: false
        show_icon: false
        styles:
          card:
            - padding: 8px
            - display: block
          grid:
            - grid-template-areas: '"drilldown"'
            - grid-template-columns: 100%
          custom_fields:
            drilldown:
              - width: 100%
              - display: block
        custom_fields:
          drilldown: |
            [[[
              const pair = states['input_text.bt_matrix_selected_pair']?.state || '';
              if (!pair || !pair.includes('|')) return '';

              const [rowLoc, colLoc] = pair.split('|');
              const matrixData = states['sensor.bt_location_confusion_matrix']?.attributes?.matrix || [];
              const namesRaw = states['sensor.bt_device_names']?.attributes?.devices_by_mac;
              const names = (typeof namesRaw === 'string') ? JSON.parse(namesRaw) : (namesRaw || {});

              const rowEntry = matrixData.find(r => r.src === rowLoc);
              if (!rowEntry) return `<div style='padding:8px'>No data for ${rowLoc}</div>`;

              const overlaps = rowEntry.overlaps?.[colLoc] || [];
              const score = rowEntry.scores?.[colLoc] || 0;
              if (overlaps.length === 0) return `<div style='padding:8px'>No overlapping beacons between ${rowLoc} and ${colLoc}</div>`;

              let out = `<div style='margin-bottom:8px;font-weight:bold'>${rowLoc} → ${colLoc} — score ${score.toFixed(2)} — ${overlaps.length} overlapping beacon${overlaps.length > 1 ? 's' : ''}</div>`;
              out += `<table class='drilldown-table'><thead><tr><th>Beacon</th><th>${rowLoc}</th><th>${colLoc}</th><th>Overlap</th></tr></thead><tbody>`;

              const cv = (v, lo, hi) => (v >= lo && v <= hi)
                ? `<code style='color:var(--warning-color)'>${v}</code>`
                : `<code>${v}</code>`;

              overlaps.forEach(b => {
                const name = names[(b.mac || '').toUpperCase()] || names[b.mac] || b.mac;
                const ovlLo = Math.max(b.r_lo, b.c_lo);
                const ovlHi = Math.min(b.r_hi, b.c_hi);
                out += `<tr>`;
                out += `<td title='${b.mac}'>${name}</td>`;
                out += `<td>${cv(b.r_lo, ovlLo, ovlHi)}/${cv(b.r_hi, ovlLo, ovlHi)}</td>`;
                out += `<td>${cv(b.c_lo, ovlLo, ovlHi)}/${cv(b.c_hi, ovlLo, ovlHi)}</td>`;
                out += `<td><code style='color:var(--warning-color)'>${ovlLo}/${ovlHi}</code></td>`;
                out += `</tr>`;
              });

              out += `</tbody></table>`;
              return out;
            ]]]
        card_mod:
          style: |
            .drilldown-table {
              width: 100%;
              border-collapse: collapse;
              font-size: 0.85rem;
            }
            .drilldown-table th,
            .drilldown-table td {
              padding: 6px 10px;
              border-bottom: 1px solid var(--divider-color);
              text-align: left;
            }
            .drilldown-table th {
              font-weight: bold;
              color: var(--secondary-text-color);
            }

  beacon_breakdown_template:
    card:
      type: custom:auto-entities
      card:
        type: entities
        card_mod:
          style: |
            .card-content { padding: 0 !important; }
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      filter:
        template: |
          {%- set scores_raw = state_attr('sensor.bt_location_scores', 'location_scores') or {} -%}
          {%- set scores = scores_raw | from_json if scores_raw is string else scores_raw -%}
          {%- set top_n = states('input_number.bt_diagnostic_location_count') | int(2) -%}
          {%- set tolerance = states('input_number.bt_location_detection_rssi_tolerance') | int(5) -%}
          {%- set fp_raw = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') or [] -%}
          {%- set scan_devices = state_attr('sensor.bt_latest_scan_full', 'devices') or [] -%}
          {%- set global_ignored = (state_attr('sensor.bt_ignored_beacons', 'ignored') or []) | map('upper') | list -%}
          {%- set known_in_scan = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) -%}
          {%- set locations_map = state_attr('sensor.bt_location_array', 'locations') or [] -%}
          {%- set names_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') or '{}' -%}
          {%- set names_map = names_raw | from_json if names_raw is string else names_raw -%}
          {%- set all_stats = state_attr('sensor.bt_merge_statistics', 'statistics') or [] -%}
          {%- set color_location_header_bg = "[[location_header_bg]]" -%}
          {%- set color_beacon_rssi_match = "[[color_rssi_match]]" -%}
          {%- set color_beacon_in_scan = "[[color_in_scan]]" -%}

          {# Build scan map and initialize cards accumulator #}
          {%- set ns = namespace(scan_map={}, loc_list=[], cards=[]) -%}
          {%- for d in scan_devices -%}
            {%- set ns.scan_map = ns.scan_map | combine({d.mac | upper: d.rssi | int(0)}) -%}
          {%- endfor -%}

          {# Build sorted location list from scores #}
          {%- for location, metrics in scores.items() -%}
            {%- set ns.loc_list = ns.loc_list + [{'name': location, 'score': metrics.total_score | float, 'matched': metrics.matched | int, 'total': metrics.total | int}] -%}
          {%- endfor -%}
          {%- set sorted_locs = ns.loc_list | sort(attribute='score', reverse=true) -%}

          {%- set ns_idx = namespace(m={}) -%}
          {%- for i in range(locations_map | length) -%}
            {%- set ns_idx.m = ns_idx.m | combine({locations_map[i]: i}) -%}
          {%- endfor -%}
          {%- set name_to_idx = ns_idx.m -%}

          {%- for loc in sorted_locs[:top_n] -%}
            {%- set loc_header_idx = name_to_idx.get(loc.name, -1) -%}
            {%- set header_tap = {"action": "perform-action", "perform_action": "script.merge_bt_fingerprint", "data": {"location_index": loc_header_idx, "rssi_only": true, "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"}} -%}
            {%- set header_hold = {"action": "perform-action", "perform_action": "script.bt_beacon_reset_all", "data": {"location_index": loc_header_idx, "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"}} -%}
            {# Add location header card #}
            {%- set ns.cards = ns.cards + [{
              "type": "custom:button-card",
              "layout": "vertical",
              "show_icon": false,
              "show_name": true,
              "name": loc.name ~ " " ~ loc.matched ~ "/" ~ loc.total ~ " [" ~ known_in_scan ~ "] • " ~ (loc.score | round(3) | string),
              "tap_action": header_tap,
              "hold_action": header_hold,
              "styles": {
                "card": [
                  {"height": "24px"},
                  {"padding": "8px"},
                  {"border": "none"},
                  {"box-shadow": "none"},
                  {"background": color_location_header_bg},
                  {"margin-top": "8px"},
                  {"align-items": "start"}
                ],
                "name": [
                  {"font-size": "12px"},
                  {"font-weight": "bold"},
                  {"color": "var(--primary-text-color)"},
                  {"justify-self": "start"}
                ]
              }
            }] -%}

            {# Add column header row #}
            {%- set ns.cards = ns.cards + [{
              "type": "custom:button-card",
              "show_icon": false,
              "show_name": false,
              "tap_action": {"action": "none"},
              "styles": {
                "card": [{"height": "20px"}, {"padding": "4px 8px"}, {"border": "none"}, {"border-radius": "0px"}, {"border-bottom": "1px solid var(--divider-color)"}, {"box-shadow": "none"}, {"background": "none"}],
                "grid": [{"grid-template-columns": "125px 52px 36px 28px 44px 1fr"}, {"grid-template-areas": "'mac fp scan diff stats name'"}],
                "custom_fields": {
                  "mac":    [{"font-size": "11px"}, {"font-weight": "bold"}, {"justify-self": "start"},  {"align-self": "center"}, {"color": "var(--secondary-text-color)"}],
                  "fp":     [{"font-size": "11px"}, {"font-weight": "bold"}, {"justify-self": "end"},    {"align-self": "center"}, {"color": "var(--secondary-text-color)"}],
                  "scan":   [{"font-size": "11px"}, {"font-weight": "bold"}, {"justify-self": "end"},    {"align-self": "center"}, {"color": "var(--secondary-text-color)"}],
                  "diff":   [{"font-size": "11px"}, {"font-weight": "bold"}, {"justify-self": "end"},    {"align-self": "center"}, {"color": "var(--secondary-text-color)"}],
                  "stats": [{"font-size": "11px"}, {"font-weight": "bold"}, {"justify-self": "end"}, {"align-self": "center"}, {"color": "var(--secondary-text-color)"}],
                  "name":   [{"font-size": "11px"}, {"font-weight": "bold"}, {"justify-self": "start"},  {"align-self": "center"}, {"padding": "0 6px"}, {"color": "var(--secondary-text-color)"}]
                }
              },
              "custom_fields": {"mac": "Beacon", "fp": "FP", "scan": "Scan", "diff": "Δ", "stats": "nσ", "name": "Name"}
            }] -%}

            {# Find fingerprint and add beacon rows #}
            {%- for fp in fp_raw -%}
              {%- set loc_idx = fp.loc -%}
              {%- set loc_name = locations_map[loc_idx] if loc_idx >= 0 and loc_idx < locations_map | length else (loc_idx | string) -%}
              {%- if loc_name == loc.name and fp.beacons is not none -%}
                {%- set ns_stats = namespace(beacons={}) -%}
                {%- for stat_entry in all_stats -%}
                  {%- if stat_entry.loc | int == loc_idx | int -%}
                    {%- set ns_stats.beacons = stat_entry.beacons -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- for mac, beacon in fp.beacons.items() -%}
                  {%- set mac_upper = mac | upper -%}
                  {%- if mac_upper not in global_ignored -%}
                    {%- set is_locally_ignored = beacon.get('ignored', false) -%}
                    {%- set fp_rssi = ((beacon.min + beacon.max) / 2) | int if 'min' in beacon else beacon.rssi -%}
                    {%- set fp_display = (beacon.min | string ~ "/" ~ beacon.max | string) if 'min' in beacon else (fp_rssi | string) -%}
                    {%- set is_high_span = ('min' in beacon) and (((beacon.max | int(0)) - (beacon.min | int(0))) | abs) > (2 * tolerance) -%}
                    {%- set is_in_scan = mac_upper in ns.scan_map -%}
                    {%- set scan_rssi = ns.scan_map[mac_upper] if is_in_scan else none -%}
                    {%- set bname = names_map.get(mac_upper, '?') -%}
                    {%- set merge_tap = {"action": "perform-action", "perform_action": "script.bt_beacon_merge", "data": {"location_index": loc_idx, "mac": mac_upper, "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"}} -%}
                    {%- set reset_tap = {"action": "perform-action", "perform_action": "script.bt_beacon_reset_minmax", "data": {"location_index": loc_idx, "mac": mac_upper, "browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]"}} -%}
                    {%- set fp_min = beacon.min if 'min' in beacon else (fp_rssi - tolerance) -%}
                    {%- set fp_max = beacon.max if 'max' in beacon else (fp_rssi + tolerance) -%}
                    {%- set range_edit_tap = {"action": "perform-action", "perform_action": "script.bt_beacon_range_editor_open", "data": {"browser_id": "[[[ return window.browser_mod?.browserID || ''; ]]]", "location_index": loc_idx, "mac": mac_upper, "beacon_name": bname, "current_min": fp_min, "current_max": fp_max, "tolerance": tolerance}} -%}
                    {%- set s_readings = ns_stats.beacons.get(mac_upper, []) -%}
                    {%- set ns_sv = namespace(vals=[]) -%}
                    {%- for r in s_readings -%}{%- if r[0] is not none -%}{%- set ns_sv.vals = ns_sv.vals + [r[0]] -%}{%- endif -%}{%- endfor -%}
                    {%- set s_vals = ns_sv.vals -%}
                    {%- set s_count = s_vals | length -%}
                    {%- if s_count > 0 -%}
                      {%- set s_mean = (s_vals | sum) / s_count -%}
                      {%- set ns_std = namespace(sq=0) -%}
                      {%- for v in s_vals -%}{%- set ns_std.sq = ns_std.sq + (v - s_mean) ** 2 -%}{%- endfor -%}
                      {%- set s_stddev = ((ns_std.sq / s_count) ** 0.5) | round | int -%}
                      {%- set stats_val = s_count | string ~ 'σ' ~ s_stddev | string -%}
                    {%- else -%}
                      {%- set stats_val = '' -%}
                    {%- endif -%}
                    {%- set is_match = (scan_rssi >= beacon.min and scan_rssi <= beacon.max) if ('min' in beacon and is_in_scan) else ((scan_rssi - fp_rssi) | abs <= tolerance) if is_in_scan else false -%}
                    {%- set diff = ([0, beacon.min - scan_rssi, scan_rssi - beacon.max] | max) if ('min' in beacon and is_in_scan) else ((scan_rssi - fp_rssi) | abs) if is_in_scan else 0 -%}
                    {%- set lt = [{"text-decoration": "line-through"}] -%}
                    {%- set card_bg = (color_beacon_rssi_match if is_match else color_beacon_in_scan) if is_in_scan else "none" -%}
                    {%- set card_tap = merge_tap if is_in_scan else {"action": "none"} -%}
                    {%- set fp_cell = ("<span style='text-decoration:line-through'>" ~ fp_display ~ "</span>") if is_locally_ignored else fp_display -%}
                    {%- set stats_cell = ("<span style='text-decoration:line-through'>" ~ stats_val ~ "</span>") if is_locally_ignored else stats_val -%}
                    {%- set ns.cards = ns.cards + [{
                      "type": "custom:button-card",
                      "show_icon": false,
                      "show_name": false,
                      "tap_action": card_tap,
                      "double_tap_action": range_edit_tap,
                      "hold_action": reset_tap,
                      "styles": {
                        "card": [{"height": "20px"}, {"padding": "0px 8px"}, {"border": "none"}, {"box-shadow": "none"}, {"background": card_bg}],
                        "grid": [{"grid-template-columns": "125px 52px 36px 28px 44px 1fr"}, {"grid-template-areas": "'mac fp scan diff stats name'"}],
                        "custom_fields": {
                          "mac":   [{"font-size": "12px"}, {"justify-self": "start"}, {"align-self": "center"}, {"font-family": "monospace"}] + (lt if is_locally_ignored else []),
                          "fp":    [{"font-size": "12px"}, {"justify-self": "end"},   {"align-self": "center"}, {"font-family": "monospace"}, {"overflow": "visible"}] + ([{"text-decoration": "underline wavy var(--warning-color)"}] if is_high_span else []),
                          "scan":  [{"font-size": "12px"}, {"justify-self": "end"},   {"align-self": "center"}, {"font-family": "monospace"}] + (lt if is_locally_ignored else []),
                          "diff":  [{"font-size": "12px"}, {"justify-self": "end"},   {"align-self": "center"}, {"font-family": "monospace"}] + (lt if is_locally_ignored else []),
                          "stats": [{"font-size": "12px"}, {"justify-self": "end"},   {"align-self": "center"}, {"font-family": "monospace"}, {"overflow": "visible"}] + ([{"text-decoration": "underline wavy var(--warning-color)"}] if s_count > 0 and s_stddev > (tolerance / 2) else []),
                          "name":  [{"font-size": "11px"}, {"justify-self": "start"}, {"align-self": "center"}, {"padding": "0 10px"}, {"overflow": "hidden"}, {"text-overflow": "ellipsis"}, {"color": "var(--secondary-text-color)"}] + (lt if is_locally_ignored else [])
                        }
                      },
                      "custom_fields": {"mac": mac_upper, "fp": fp_cell, "scan": scan_rssi | string if is_in_scan else "", "diff": diff | string if is_in_scan else "—", "stats": stats_cell, "name": bname}
                    }] -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endfor -%}

          {%- for card in ns.cards -%}{{ card }},
          {%- endfor -%}

# -------------------------------------------------------------------------------------
# VIEWS
# -------------------------------------------------------------------------------------

views:
  - path: home
    title: "Triangulation"
    icon: mdi:crosshairs-gps
    cards:
      # Latest BT scan - interactive beacon list with tap-to-ignore
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-template-card
            primary: |
              {%- set known = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) -%}
              {%- set unknown = state_attr('sensor.bt_location_scores', 'unknown_beacons_in_scan') | int(0) -%}
              Latest BT Scan ({{ known }}+{{ unknown }})
            secondary: "{{ state_attr('sensor.bt_latest_scan_full', 'timestamp') | default('No scan yet') }}"
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                }

          - type: custom:decluttering-card
            template: scan_list_template


      # Fingerprint Details (auto-entities with button-cards)
