  # Algorithm Settings View
  - path: algorithm
    title: "Settings"
    icon: mdi:tune-variant
    cards:
      # Location Configuration and Management Buttons
      - type: vertical-stack
        cards:
          - type: entities
            title: "Location & Calibration Setup"
            entities:
              - entity: input_text.bt_calibration_locations
                name: "Location Names"
                icon: mdi:map-marker-multiple

          - type: horizontal-stack
            cards:
              # Report beacon status button (lowest risk)
              - type: custom:button-card
                name: "Beacon Status"
                tap_action:
                  action: call-service
                  service: script.report_beacon_status
                styles:
                  card:
                    - background-color: *color_success
                  name:
                    - font-size: 12px

              # Load from file button (medium risk)
              - type: custom:button-card
                name: "Load Fingerprints"
                tap_action:
                  action: call-service
                  service: script.load_bt_fingerprints_from_file
                styles:
                  card:
                    - background-color: *color_info
                  name:
                    - font-size: 12px

              # Clear database button (highest risk)
              - type: custom:button-card
                name: "Clear Fingerprints"
                tap_action:
                  action: call-service
                  service: script.clear_bt_fingerprints
                styles:
                  card:
                    - background-color: *color_severe
                  name:
                    - font-size: 12px

      # Algorithm Settings
      - type: entities
        title: "Algorithm Settings"
        entities:
          - input_number.bt_location_detection_weak_signal_threshold
          - input_number.bt_location_detection_rssi_tolerance
          - input_boolean.bt_filter_zero_rssi_signals

      # Scores for Latest Scan - Location Scoring
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-template-card
            primary: "🔄 Scores for Latest Scan"
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.calculate_location_scores
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                }

          - type: markdown
            content: |
              {%- set scores_raw = state_attr('sensor.bt_location_scores', 'location_scores') or {} %}
              {%- set scores = scores_raw | from_json if scores_raw is string else scores_raw %}
              {%- set ns = namespace(max_val=-1) %}
              {%- for location, metrics in scores | dictsort %}
                {%- if metrics.total_score | float(-1) > ns.max_val %}
                  {%- set ns.max_val = metrics.total_score | float(-1) %}
                {%- endif %}
              {%- endfor %}
              Matched beacons and score per location — higher score is better.

              | Location | Matched | Score |
              |:---|---:|---:|
              {%- if scores and scores | length > 0 %}
                {%- set known_in_scan = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) %}
                {%- for location, metrics in scores | dictsort %}
              | {{ '🎯 **' if (metrics.total_score | float | round(3)) >= ns.max_val }}{{ location | capitalize }}{{ '**' if (metrics.total_score | float | round(3)) >= ns.max_val }} | `{{ metrics.matched | int }}/{{ metrics.matched | int + metrics.missing | int }} [{{ known_in_scan }}]` | `{{ metrics.total_score | float | round(3) }}` |
                {%- endfor %}
              {%- else %}
              | _No data_ | _-_ | _-_ |
              {%- endif %}
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                  padding-top: 0px !important;
                }
                markdown-table-row th {
                  font-size: 0.9em;
                }
                ha-markdown {
                  padding: 0px 16px 16px 16px !important;
                }
                table {
                  width: 100%;
                  border-collapse: collapse;
                }
                td, th {
                  padding: 8px 0;
                  border-bottom: 1px solid var(--divider-color);
                }

      # Per-Beacon Diagnostic Breakdown
      - type: custom:stack-in-card
        cards:
          - type: custom:mushroom-template-card
            primary: "🔍 Beacon Breakdown"
            secondary: "Per-beacon match detail for top N locations"
            layout: horizontal
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                }

          - type: entities
            entities:
              - entity: input_number.bt_diagnostic_location_count
                name: "Locations to show"
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                }

          - type: markdown
            content: |
              {%- set scores_raw = state_attr('sensor.bt_location_scores', 'location_scores') or {} %}
              {%- set scores = scores_raw | from_json if scores_raw is string else scores_raw %}
              {%- set top_n = states('input_number.bt_diagnostic_location_count') | int(2) %}
              {%- set tolerance = states('input_number.bt_location_detection_rssi_tolerance') | int(5) %}
              {%- set fp_raw = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) %}
              {%- set scan_devices = state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) %}
              {%- set global_ignored = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list %}
              {%- set known_in_scan = state_attr('sensor.bt_location_scores', 'known_beacons_in_scan') | int(0) %}
              {%- set locations_map = state_attr('sensor.bt_location_array', 'locations') | default([]) %}
              {%- set ns = namespace(scan_map={}, loc_list=[], fp_beacons={}) %}
              {%- for d in scan_devices %}
                {%- set ns.scan_map = ns.scan_map | combine({d.mac | upper: d.rssi}) %}
              {%- endfor %}
              {%- for location, metrics in scores.items() %}
                {%- set ns.loc_list = ns.loc_list + [{'name': location, 'score': metrics.total_score | float, 'matched': metrics.matched | int, 'total': (metrics.matched | int) + (metrics.missing | int)}] %}
              {%- endfor %}
              {%- set sorted_locs = ns.loc_list | sort(attribute='score', reverse=true) %}
              {%- if sorted_locs | length == 0 %}
              _No score data. Run a scan first._
              {%- else %}
              {%- for loc in sorted_locs[:top_n] %}
              ---
              **{{ loc.name | capitalize }}** `{{ loc.matched }}/{{ loc.total }} [{{ known_in_scan }}]` `{{ loc.score | round(3) }}`

              | Beacon | FP | Scan | Δ | |
              |:---|---:|---:|---:|:---:|
              {%- set ns.fp_beacons = {} %}
              {%- for entry in fp_raw %}
                {%- if '|' in entry %}
                  {%- set parts = entry.split('|') %}
                  {%- if parts | length == 2 %}
                    {%- set loc_idx = parts[0] | int(-1) %}
                    {%- if loc_idx >= 0 and loc_idx < locations_map | length and locations_map[loc_idx] == loc.name %}
                      {%- for pair in parts[1].split(',') %}
                        {%- if '=' in pair %}
                          {%- set pair_base = pair.rstrip(':X') %}
                          {%- set kv = pair_base.split('=') %}
                          {%- if kv | length == 2 %}
                            {%- set mac = kv[0] | trim | upper %}
                            {%- set rssi = kv[1] | trim | int(0) %}
                            {%- set is_x = pair.endswith(':X') %}
                            {%- set ns.fp_beacons = ns.fp_beacons | combine({mac: {'rssi': rssi, 'x': is_x}}) %}
                          {%- endif %}
                        {%- endif %}
                      {%- endfor %}
                    {%- endif %}
                  {%- endif %}
                {%- endif %}
              {%- endfor %}
              {%- for mac, fp in ns.fp_beacons.items() %}
                {%- if fp.x or mac in global_ignored %}
                {%- elif mac in ns.scan_map %}
                  {%- set diff = (ns.scan_map[mac] - fp.rssi) | abs %}
              | `{{ mac }}` | `{{ fp.rssi }}` | `{{ ns.scan_map[mac] }}` | `{{ diff }}` | {{ '✅' if diff <= tolerance else '⚠️' }} |
                {%- else %}
              | `{{ mac }}` | `{{ fp.rssi }}` | `-` | `-` | ❌ |
                {%- endif %}
              {%- endfor %}
              {%- endfor %}
              {%- endif %}
            card_mod:
              style: |
                ha-card {
                  border: none;
                  box-shadow: none;
                  background: none;
                  padding-top: 0px !important;
                }
                ha-markdown {
                  padding: 0px 16px 16px 16px !important;
                }
                table {
                  width: 100%;
                  border-collapse: collapse;
                }
                td, th {
                  padding: 4px 0;
                  border-bottom: 1px solid var(--divider-color);
                }

  # Review View
