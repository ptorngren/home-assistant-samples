  - path: guide
    title: "Guide"
    icon: mdi:help-circle-outline
    cards:
      # 1. Intro and Quick Start
      - type: markdown
        content: |
          ## Bluetooth Beacon Triangulation

          **What it does:** Captures Bluetooth beacon signals at each charger location to detect phone position. These are stored as "fingerprints" representing the unique combination of beacon signals at each location.

          **Real-world challenges:** In the ideal case this should be automatic. In practice, you will likely pick up irrelevant (alien/volatile) beacons such as neighbor devices, and also find that beacons overlap in several locations, making them hard to distinguish.

          **Quick Start:**
          1. Configure your location names
          2. Place phone on charger at target location
          3. Wait for Tasker BT scan to finish
          4. Open the **Triangulation** view
             - In "Latest BT Scan" table: View RSSI values
               - (Optional) Long-press any irrelevant beacons to mark them as globally ignored — these will be automatically filtered out in future captures
             - In "Fingerprint Details":
               - **Tap location heading** to update RSSI values for existing beacons
               - **Double-tap location heading** to merge (add new beacons + update RSSI)
               - **Hold location heading** to capture from scratch (replace entire fingerprint)
          5. Repeat for all locations
          6. Over time, revisit locations and refine fingerprints

          **💡 Tip:** Beacon triangulation and curation are best done on a computer — the views become rather crowded on small phone screens.

          Detailed instructions for each view are on the cards below.

      # 2. Triangulation Guide
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:crosshairs-gps"></ha-icon> Triangulation

          **What it does:** The main working view for capturing and curating location fingerprints. Place your phone at a location, run a BT scan, then capture or update the fingerprint here. Revisit over time to refine as beacon signals change.

          **Automatic Filtering During Capture:**

          When capturing or updating fingerprints, the system automatically ignores:
          - Beacons below the weak signal threshold (prevents volatile weak signals from being stored)
          - Beacons in the global ignored list (prevents known irrelevant devices from being stored)

          This keeps fingerprints clean and focused on stable, useful signals without requiring manual cleanup.

          **Capturing and Updating Fingerprints:**

          In **Fingerprint Details**, the location name heading is interactive:
          - **Tap location heading**: Update RSSI only — refreshes existing beacons only, no new beacons added (locally ignored beacons are skipped). Mode-driven: converts any entries in the old format. Use when signals have drifted but the beacon set is still correct.
          - **Double-tap location heading**: Merge — adds new beacons from the current scan and updates existing ones (locally ignored beacons are skipped). Mode-driven: all entries are written in the format defined by the Min/Max mode toggle, converting any entries in the old format. Use to expand a fingerprint or to bring an existing location into the current mode.
          - **Hold/long-press location heading**: Capture from scratch — replaces the entire fingerprint with the current scan. Use for a fresh start when the existing fingerprint is stale or you want a clean baseline.

          **Refining Fingerprints:**

          Use the "Review" section to identify overlapping beacons (the "All Active Beacons" table shows which locations each beacon appears in and color-codes their discriminator quality). Once overlaps are identified, improve triangulation by managing beacons using these tools:

          **In Fingerprint Details (location heading):**
          - **Tap**: Update RSSI only (see above)
          - **Double-tap**: Merge (see above)
          - **Hold**: Capture from scratch (see above)

          **In Fingerprint Details (beacon rows):**
          - **Tap a beacon**: Ignore in this location only - block overlapping beacons from affecting this location (e.g. strong beacon in adjacent rooms). The beacon stays in the fingerprint but is ignored in scoring. Easy to toggle on/off while experimenting.
          - **Double-tap a beacon**: Remove permanently from this location's fingerprint - use when a beacon no longer belongs here. Gone from the fingerprint - recapture or merge to add it back if needed.
          - **Hold/long-press a beacon**: Ignore globally - remove irrelevant/volatile devices (e.g. neighbor's bluetooth party speaker). Removed from all fingerprints and on global ignore list, filtered out from future captures.

          **In Latest BT Scan:**
          - **Hold/long-press a beacon**: Ignore globally - quick way to mark irrelevant devices as globally ignored.

          **Hint**: Since BT beacons are inherently volatile, they will most likely change over time. By opening the settings and checking the fingerprints every now and then, you can gradually refine them by managing overlapping beacons.

          **Visual Indicators:**

          **Latest BT Scan table:**
          - Weak signals: Italic and faded (below threshold - ignored in capture)
          - Globally ignored: Grey text and strikethrough (ignored in capture and future scans)

          **Fingerprint Details table:**
          - **Bold text**: Overlapping beacon (appears in 2+ locations - potential confusion risk)
          - **Locally ignored**: Strikethrough (ignored in this location only)
          - **Strong match**: Green background (current scan RSSI within RSSI Match Tolerance of fingerprint)
          - **Match**: Blue background (current scan RSSI differs by more than RSSI Match Tolerance from fingerprint)
          - **Mismatch**: White background (beacon not found in current scan)
          - **?**: Indicates an unresolved device name (loaded in BT scans)

      # 3. Settings Guide
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:tune-variant"></ha-icon> Settings

          **What it does:** Define your locations and tune the detection algorithm. Configure location names, adjust algorithm parameters, and review how well each location's fingerprint matches the current scan.

          **How to use:**
          - **Location Names**: Enter comma-separated names (`office, kitchen, garage` etc). ⚠️ **Maintain order** — fingerprints are calculated from location indices. Changing the order will corrupt captured fingerprints. Once defined, keep the order fixed (renaming is OK); if you must reorder, recapture all fingerprints from scratch.
          - **Action Buttons**: **Beacon Status** logs a per-location report to the HA log (Developer Tools → Logs) showing active beacons with fingerprint values, signal statistics, and any warnings. **Load Fingerprints** reloads fingerprint data from file. **Clear Fingerprints** and **Clear Statistics** reset the respective data.
          - Adjust **Weak Signal Threshold** to ignore weak beacons when capturing fingerprints (used to keep anchors stable; not used during matching)
          - Adjust **RSSI Match Tolerance** (dBm). **Mean mode:** scan RSSI must be within ±tolerance of the fingerprint value to count as a match. **Min/Max mode:** matching uses stored bounds (tolerance not applied to matching); tolerance sets the initial range on reset (`[scan ± tolerance]`) and triggers the wavy-underline warning when the stored range exceeds 2× tolerance.
          - Toggle **Min/Max Fingerprint Mode** to switch between two fingerprint strategies:
            - **OFF (default):** Each beacon stores a single running-mean RSSI. Capture overwrites; merge averages the new scan into the stored value. Matching uses ±RSSI Match Tolerance.
            - **ON:** Each beacon stores a `[min, max]` range. Capture starts as a collapsed point; each merge expands the range if the new scan falls outside. Matching is strict — scan RSSI must fall within `[min, max]`, no tolerance applied. Produces per-beacon adaptive tolerance (stable beacons stay narrow; volatile ones widen naturally). Mode is data-driven: existing `rssi` entries continue to use tolerance matching until recaptured.
          - Toggle **Distance-Weighted Scoring** to switch between two scoring modes:
            - **OFF (default):** Binary matching — a beacon either matches or doesn't.
            - **ON:** Continuous quality score per beacon based on how centered the scan RSSI is within the fingerprint range. Adds resolution and breaks ties between similar locations.
          - Toggle **Ignore Ghost Signals (0 dBm)** to control whether 0 dBm signals are captured in fingerprints (does NOT affect matching):
            - **ON:** Ignore 0 dBm signals during fingerprint capture (recommended for most users)
            - **OFF:** Capture 0 dBm signals in fingerprints (useful if you have legitimate 0 dBm beacons)
          - Review the **Scores for Latest Scan** table to see how locations match and what scores they get. E.g. `5/8 [6]: 0.5`:
            - **`5/8`** — 5 of this location's 8 fingerprint beacons were found in the scan
            - **`[6]`** — 6 known beacons (across all locations) were present in the scan
            - **`0.5`** = Score `(matched/fingerprint) × (matched/known)` — higher is better (1 is perfect)
          - Use **Beacon Breakdown** (below Scores) to see per-beacon match detail for the top N scoring locations. Use the slider to choose how many locations to compare. Columns: MAC · FP · Scan · Δ · nσ · Name
            - FP column shows `min/max` for min/max entries, or a single value for mean entries; **underlined with a wavy warning-color line** when the min/max range exceeds 2 × RSSI tolerance — indicates high signal variance, beacon may reduce detection accuracy
            - Δ column: for mean entries, absolute deviation from stored RSSI; for min/max entries, distance outside the bounds (0 when matched)
            - nσ column: sample count and standard deviation from captured merge/reset history (e.g. `14σ3` = 14 samples, stddev 3 dBm). Empty until data is collected. **Wavy underline** when σ > tolerance/2 — the 95% confidence interval of the signal exceeds the full matching window; beacon may cause missed detections.
            - Globally ignored beacons are excluded; locally ignored beacons are shown only if present in the current scan
            - **Tap location header** to merge all beacons for that location from the current scan (same as Merge in the fingerprints card). Locally ignored beacons are updated too — their ignored flag is preserved.
            - **Hold location header** to reset all beacons in the location (including locally ignored ones). In **min/max mode**: applies P10/P90 from scan history if ≥ 10 samples exist, otherwise resets to [midpoint − tolerance, midpoint + tolerance]. In **mean mode**: resets to current scan RSSI if present, otherwise leaves unchanged.
            - **Tap a beacon row** to merge that beacon from the current scan (expands min/max bounds, or updates running mean). Works for ignored beacons too. No-op if beacon not in current scan.
            - **Double-tap a beacon row** to open the Range Editor popup — directly edit the min/max bounds for that beacon. Pre-filled from the stored fingerprint. An "Apply midpoint X dBm:" button trims the range to a symmetrical window around the current centre (no scan needed). An "Apply P10/P90" button sets the range to the 10th/90th percentile of accumulated scan history (enabled when ≥ 10 samples exist). Tap Save to write back. Min/max are auto-swapped if entered inverted. Converts mean entries to min/max format on save.
            - **Hold a beacon row** to reset that beacon from the current scan:
              - **Mean mode:** collapses to the current scan RSSI. No-op if beacon not in current scan.
              - **Min/Max mode:** resets range to `[scan − tolerance, scan + tolerance]`. No-op if beacon not in current scan.

          **Matching Logic:**
          - All known beacons (registered in any location's fingerprint) are considered during matching, regardless of signal strength
          - Per-beacon matching depends on fingerprint format: `rssi` entries use ±RSSI Match Tolerance; `min/max` entries use strict bounds (no tolerance)
          - Weak threshold only filters beacons during fingerprint capture; it does NOT filter during live detection

          **Note on Updates:** Beacon coloring in Fingerprint Details updates immediately when you change slider settings. The Scores table requires manual refresh - press the refresh button in the table heading to recalculate with new parameters.

      # 4. Review Guide
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:magnify"></ha-icon> Review

          **What it does:** Integrated analysis tools for understanding beacon quality and location overlap. Use these views to diagnose detection issues and decide which beacons to keep, ignore, or remove.

          **Contents:**

          1. **Location Cross-Reference Matrix** — Diagnoses location confusion at a glance:
             - Each row = source location fingerprint being tested
             - Each column = reference location to score against
             - Score (0.0–1.0): how likely the source fingerprint would be confused with the reference location
             - 🟢 Green (< 0.3): good separation — locations are distinct
             - 🟡 Amber (0.3–0.6): caution — some overlap, potential for confusion
             - 🔴 Red (> 0.6): high confusion risk — fingerprints are too similar
             - **Diagonal cells:** should all be 1.0 (each location detects itself)
               - White background (1.0): normal, location fingerprint healthy
               - 🔴 Red background (≠ 1.0): alarm! — location's fingerprint doesn't detect itself, indicates a serious problem
             - **Scores are directional** — A→B and B→A will typically differ. This is expected: A→B means "if I'm at A, could the system think I'm at B?", B→A means the reverse. Asymmetry reflects differences in fingerprint size and beacon signal ranges.
             - **Scores are worst-case** — each beacon's effective range ([min,max] or [rssi±tolerance]) is compared against the column's range; a match is counted if the ranges overlap at all
             - **Tap any non-diagonal cell** to open the drill-down detail below the matrix — shows each overlapping beacon with row range, col range, and overlap extent. Tap a diagonal cell to close. Note: green cells can still have overlapping beacons (low score means few overlaps relative to total, not zero)
             - Adjust **RSSI Match Tolerance** in Settings view to see how sensitivity affects overlap

          2. **All Active Beacons** — Master reference of all beacons across locations:
             - Shows every beacon currently in use (active, non-weak, non-ignored)
             - Columns: MAC address | Device name | Which locations it appears in
             - Background color indicates beacon discriminator quality:
               - 🔴 Red: beacon appears in ALL locations with similar RSSI → poor discriminator (ambiguous everywhere)
               - 🟢 Green: beacon has unique RSSI in every location where it appears → excellent discriminator (helps distinguish locations)
               - White: beacon RSSI similar in some locations but unique in others → medium discriminator (can help in some pairs)
             - **Tap any beacon** to locally ignore it in all locations simultaneously (beacon stays in fingerprints but ignored in scoring)
             - **Double-tap any beacon** to permanently remove it from all location fingerprints where it appears (beacon disappears from this list)
             - **Hold any beacon** to mark it globally ignored (removed from all fingerprints and future captures)
             - Useful for bulk management of overlapping beacons or quickly cleaning up beacon distribution

          3. **Globally Ignored** — Management of globally ignored beacons:
             - Lists all beacons you've marked as globally ignored
             - Styled in grey with strikethrough to indicate ignored status
             - **Hold any beacon** to restore it (remove from global ignore list)
             - These beacons are ignored in all detection and filtered out during future fingerprint captures
