# Bluetooth Triangulation Package
# Reusable Bluetooth beacon triangulation system for device location detection
# Provides fingerprint collection, RSSI matching, location scoring, and ambiguity diagnostics
# Can be used standalone or integrated with screensaver (via screensaver_local.yaml bridge)
# ------------------------------------------------------------------

input_text:
  bt_calibration_locations:
    name: "BT Calibration Locations"
    icon: mdi:text-box-edit-outline
    max: 255
    # User-editable location list (e.g., "office, kitchen, garage, bedroom, ...")
    # Template sensor bt_location_array parses this once and stores as indexable array
    # Accessible via: state_attr('sensor.bt_location_array', 'locations')[index]

  bt_matrix_selected_pair:
    name: "BT Matrix Selected Pair"
    icon: mdi:table-eye
    max: 255
    initial: ""
    # Stores selected confusion matrix cell as "row_loc|col_loc" (pipe-separated location names)
    # Empty string = no selection. Written by matrix cell tap actions in the dashboard.

  bt_range_editor_context:
    name: "BT Range Editor Context"
    max: 50
    initial: ""
    # Temporary storage for range editor popup. Format: "location_index|mac|scan_rssi|tolerance"
    # scan_rssi field is empty string when beacon is not present in the current scan.

  device_charger_locations:
    name: "Device Charger Locations"
    max: 255
    initial: "{}"
    # Stores JSON mapping of device_ids to charger locations: {"peers_mobil": "peer", "device_id_2": "kök", ...}
    # NOTE: 'initial' resets this on HA restart, but that's acceptable because:
    # 1. Mapping is only valid while phone is on charger (cleared on power disconnect)
    # 2. Mapping is repopulated by every webhook (BT scan), so brief reset on restart doesn't matter
    # 3. Edge case (HA restart with phone on charger) is rare and self-corrects on next BT scan

input_button:
  capture_bt_fingerprint:
    name: "Capture BT Fingerprint"
    # Manual trigger to capture current RSSI values to fingerprint database

input_number:
  bt_location_detection_weak_signal_threshold:
    name: "Weak Signal Threshold"
    unit_of_measurement: "dBm"
    min: -105
    max: -60
    step: 1
    mode: slider
    # Signals weaker than this are treated as missing/unreliable
    # Prevents volatile weak signals from affecting location detection
    # NOTE: No 'initial:' to prevent forced resets on HA restart
    # Helper starts empty, so user must set this value manually in the UI unless the algorithm uses a default value

  bt_location_detection_rssi_tolerance:
    name: "RSSI Match Tolerance"
    unit_of_measurement: "dBm"
    min: 0
    max: 20
    step: 1
    mode: slider
    # Tolerance for matching beacon RSSI in scan against fingerprint RSSI
    # Beacon counts as match only if scan RSSI is within ±N dBm of fingerprint RSSI
    # Higher values = more lenient matching, lower values = stricter RSSI matching

  bt_diagnostic_location_count:
    name: "Diagnostic Location Count"
    min: 1
    max: 5
    step: 1
    mode: slider
    # Number of top-scoring locations to show in the per-beacon breakdown card
    # Useful for diagnosing why one location wins over another

  bt_range_editor_min:
    name: "BT Range Editor Min"
    unit_of_measurement: "dBm"
    min: -120
    max: 0
    step: 1
    mode: box
    # Temporary storage for range editor popup — min bound being edited

  bt_range_editor_max:
    name: "BT Range Editor Max"
    unit_of_measurement: "dBm"
    min: -120
    max: 0
    step: 1
    mode: box
    # Temporary storage for range editor popup — max bound being edited

input_boolean:
  bt_filter_zero_rssi_signals:
    name: "Ignore Ghost Signals (0 dBm)"
    icon: mdi:ghost-off
    # When ON: exclude RSSI=0 beacons (zero-strength signals with no measurable distance)
    # When OFF: include RSSI=0 beacons in scan processing
  bt_include_random_macs:
    name: "Include Random MACs"
    icon: mdi:shuffle-variant
    # When OFF (default): exclude randomly generated / locally administered MACs from scan processing
    # These are privacy-mode devices (iPhones, Android privacy mode) whose MACs rotate over time
    # and are never reliable fingerprint anchors. Detected by bit 1 of first octet being set.
    # When ON: include all MACs regardless of type (e.g. for debugging)
  bt_fingerprint_minmax_mode:
    name: "Min/Max Fingerprint Mode"
    icon: mdi:arrow-expand-horizontal
    # When ON: capture/merge writes min/max bounds instead of running-mean RSSI
    # When OFF (default): existing running-mean behavior
    # Mode detection is data-driven: presence of 'min' key in beacon dict determines matching
    # Mixed fingerprints work per-entry — switching OFF does not revert existing min/max entries

# Shell commands for file-based persistence (fingerprint database and BT scan data)
# Note: Using | base64_encode filter to safely preserve multiline content and special characters in device names
shell_command:
  bt_fingerprint_database_write: /config/packages/triangulation/bt_fingerprints_persistor.sh write fingerprints {{ json_content | to_json | base64_encode }}
  bt_fingerprint_database_read: '/config/packages/triangulation/bt_fingerprints_persistor.sh read fingerprints'
  bt_ignored_write: /config/packages/triangulation/bt_fingerprints_persistor.sh write ignored {{ json_content | to_json | base64_encode }}
  bt_ignored_read: '/config/packages/triangulation/bt_fingerprints_persistor.sh read ignored'
  bt_statistics_write: /config/packages/triangulation/bt_fingerprints_persistor.sh write statistics {{ json_content | to_json | base64_encode }}
  bt_statistics_clear: "echo '{\"statistics\":[]}' > /config/packages/triangulation/data/bt_statistics.json"

# ------------------------------------------------------------------
# BT SENSORS (Command-line integration)
# ------------------------------------------------------------------
# BT Latest Scan Full sensor is now webhook-triggered template sensor (see template section)
# Other sensors read from file (fingerprints, location scores, ignored beacons)
# ------------------------------------------------------------------
command_line:
  - sensor:
      name: "BT Fingerprint Database File"
      unique_id: bt_fingerprint_database_file
      command: 'bash /config/packages/triangulation/bt_fingerprints_persistor.sh read fingerprints'
      json_attributes:
        - fingerprints
      value_template: "{% if value_json.fingerprints %}ready{% else %}empty{% endif %}"
      # Reads fingerprints from file and wraps in JSON object for attributes extraction
      # Runs at HA startup and on YAML reload (no scan_interval to avoid unnecessary polling)
      # Dashboard/scripts access via: state_attr('sensor.bt_fingerprint_database_file', 'fingerprints')
      # Pattern: File + Sensor Attributes (unlimited data, no 255-char limit)

  - sensor:
      name: "BT Ignored Beacons"
      unique_id: bt_ignored
      command: 'bash /config/packages/triangulation/bt_fingerprints_persistor.sh read ignored'
      json_attributes:
        - ignored
      value_template: "{% if value_json.ignored %}{{ value_json.ignored | length }}{% else %}0{% endif %}"
      # Reads globally excluded beacon MACs from file (supports 100+ beacons)
      # Stores as JSON array in attributes: state_attr('sensor.bt_ignored_beacons', 'ignored')
      # Pattern: File + Sensor Attributes (unlimited data, no 255-char limit)

  - sensor:
      name: "BT Merge Statistics"
      unique_id: bt_merge_statistics
      command: 'bash /config/packages/triangulation/bt_fingerprints_persistor.sh read statistics'
      json_attributes:
        - statistics
      value_template: "{% if value_json.statistics %}{{ value_json.statistics | length }}{% else %}0{% endif %}"
      # Per-beacon RSSI sample history from capture/merge operations (file-backed, unlimited size)
      # Format: statistics[].loc + beacons{MAC: [[rssi, timestamp], ...]}
      # Dashboard access: state_attr('sensor.bt_merge_statistics', 'statistics')

# Computed sensors (Template integration)
template:
  - sensor:
      # Configuration for dashboard transformation logic (regex-based device ID mapping)
      - name: "Dashboard Logic Config"
        unique_id: dashboard_logic_config
        state: "ready"
        attributes:
          browser_id_transform_pattern: "^(.+?)(?:_fkb)?$"
          alarm_id_replacement: "sensor.$1_next_alarm"

      # Active Known Beacons - single source of truth for which beacons are active
      # A beacon is active if it appears non-ignored in at least one location fingerprint
      # Auto-updates when fingerprints or ignore list change
      - name: "BT Active Known Beacons"
        unique_id: bt_active_known_beacons
        icon: mdi:bluetooth
        state: >
          {%- set ns = namespace(macs=[]) -%}
          {%- set global_ignored = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list -%}
          {%- set fingerprints = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') or [] -%}
          {%- for fp in fingerprints -%}
            {%- if fp.beacons is not none -%}
              {%- for mac, beacon in fp.beacons.items() -%}
                {%- if not beacon.get('ignored', false) -%}
                  {%- set mac_upper = mac | upper -%}
                  {%- if mac_upper not in global_ignored and mac_upper not in ns.macs -%}
                    {%- set ns.macs = ns.macs + [mac_upper] -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.macs | length }}
        attributes:
          mac_locs: >
            {%- set ns = namespace(mac_locs={}) -%}
            {%- set global_ignored = state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list -%}
            {%- set fingerprints = state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') or [] -%}
            {%- set locations_list = state_attr('sensor.bt_location_array', 'locations') or [] -%}
            {%- set rssi_tolerance = states('input_number.bt_location_detection_rssi_tolerance') | int(5) -%}
            {%- set total_locations = locations_list | length -%}
            {# Pass 1: Build mac_locs with locs, rssi_list, and high_span per beacon #}
            {# high_span: true if any fingerprint entry for this MAC has max-min > 2*tolerance (unstable range) #}
            {%- for fp in fingerprints -%}
              {%- set loc_idx = fp.loc -%}
              {%- set loc_name = locations_list[loc_idx] if loc_idx >= 0 and loc_idx < locations_list | length else '' -%}
              {%- if loc_name and fp.beacons is not none -%}
                {%- for mac, beacon in fp.beacons.items() -%}
                  {%- if not beacon.get('ignored', false) -%}
                    {%- set mac_upper = mac | upper -%}
                    {%- set rssi_val = ((beacon.min + beacon.max) / 2) | int if 'min' in beacon else beacon.rssi -%}
                    {%- set span = (beacon.max - beacon.min) if 'min' in beacon else 0 -%}
                    {%- set is_high_span = span > 2 * rssi_tolerance -%}
                    {%- if mac_upper not in global_ignored -%}
                      {%- if mac_upper not in ns.mac_locs -%}
                        {%- set ns.mac_locs = ns.mac_locs | combine({mac_upper: {'locs': [], 'rssi_list': [], 'high_span': false}}) -%}
                      {%- endif -%}
                      {%- if loc_name not in ns.mac_locs[mac_upper].locs -%}
                        {%- set ns.mac_locs = ns.mac_locs | combine({mac_upper: {'locs': ns.mac_locs[mac_upper].locs + [loc_name], 'rssi_list': ns.mac_locs[mac_upper].rssi_list + [rssi_val], 'high_span': ns.mac_locs[mac_upper].high_span or is_high_span}}) -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endif -%}
            {%- endfor -%}
            {# Pass 2: Compute discriminator strength, drop rssi_list from output #}
            {%- set ns2 = namespace(result={}) -%}
            {%- for mac, data in ns.mac_locs.items() -%}
              {%- set rssi_list = data.rssi_list -%}
              {%- set n = rssi_list | length -%}
              {%- if n <= 1 -%}
                {%- set discriminator = 0 -%}
              {%- else -%}
                {%- set ns_c = namespace(pairs_within=0, pairs_total=0) -%}
                {%- for i in range(n) -%}
                  {%- for j in range(i+1, n) -%}
                    {%- set ns_c.pairs_total = ns_c.pairs_total + 1 -%}
                    {%- if (rssi_list[i] - rssi_list[j]) | abs <= rssi_tolerance -%}
                      {%- set ns_c.pairs_within = ns_c.pairs_within + 1 -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endfor -%}
                {%- if n == total_locations and ns_c.pairs_within == ns_c.pairs_total -%}
                  {%- set discriminator = -1 -%}
                {%- elif ns_c.pairs_within == 0 -%}
                  {%- set discriminator = 1 -%}
                {%- else -%}
                  {%- set discriminator = 0 -%}
                {%- endif -%}
              {%- endif -%}
              {%- set ns2.result = ns2.result | combine({mac: {'locs': data.locs, 'discriminator': discriminator, 'high_span': data.high_span}}) -%}
            {%- endfor -%}
            {{ ns2.result | to_json }}

      # BT Location Array - Parses input_text.bt_calibration_locations into indexable array
      # User edits comma-separated locations in input_text, this sensor stores as array in attributes
      # Access via: state_attr('sensor.bt_location_array', 'locations')[index]
      # State is count of locations, attributes contain the actual list
      - name: "BT Location Array"
        unique_id: bt_location_array
        icon: mdi:format-list-numbered
        state: >
          {%- set locations_text = states('input_text.bt_calibration_locations') -%}
          {%- if locations_text and locations_text != 'unavailable' -%}
            {{ locations_text.split(',')
               | map('trim')
               | reject('eq', '')
               | list
               | length }}
          {%- else -%}
            0
          {%- endif -%}
        attributes:
          locations: >
            {%- set locations_text = states('input_text.bt_calibration_locations') -%}
            {%- if locations_text and locations_text != 'unavailable' -%}
              {{ locations_text.split(',')
                 | map('trim')
                 | reject('eq', '')
                 | list }}
            {%- else -%}
              []
            {%- endif -%}

  # Webhook-triggered sensor for latest BT scan (replaces file-based storage)
  # Stores complete scan data in memory via attributes (16KB+ capacity, no disk I/O)
  # Triggered directly by Tasker webhook - data flows: webhook → template sensor attributes → dashboard
  - trigger:
      - platform: webhook
        webhook_id: phone_charger_bt
        allowed_methods:
          - POST
          - PUT
    sensor:
      - name: "BT Latest Scan Full"
        unique_id: bt_latest_scan_full
        state: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        attributes:
          # Random MAC filtering applied at webhook time (bit 1 of first octet set = locally administered / privacy-mode device)
          # bt_include_random_macs OFF (default): random MACs excluded from all downstream processing (display, capture, detection)
          # bt_include_random_macs ON: all MACs included regardless of type
          devices: |
            {%- set raw = trigger.json.devices | default([]) -%}
            {%- if states('input_boolean.bt_include_random_macs') | bool(false) -%}
              {{ raw }}
            {%- else -%}
              {%- set ns = namespace(result=[]) -%}
              {%- for device in raw -%}
                {%- set first_octet = device.mac.split(':')[0] | int(base=16) -%}
                {%- set is_local = (first_octet | bitwise_and(2)) != 0 -%}
                {%- set is_static_random = (first_octet | bitwise_and(192)) == 192 -%}
                {%- if not is_local or is_static_random -%}
                  {%- set ns.result = ns.result + [device] -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.result }}
            {%- endif -%}


          # Count beacons in current scan that exist in active known beacons list
          # Uses dynamically calculated list from sensor.bt_active_known_beacons (auto-updates on fingerprint/ignore changes)
          # Counts all captured devices including RSSI=0; filtering is applied at usage level by toggle
          known_beacons_in_scan: |
            {%- set ns = namespace(count=0) -%}
            {%- set mac_locs_raw = state_attr('sensor.bt_active_known_beacons', 'mac_locs') | default('{}') -%}
            {%- set active_beacons = (mac_locs_raw | from_json if mac_locs_raw is string else mac_locs_raw).keys() | list -%}
            {%- set devices = state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) -%}
            {%- for device in devices -%}
              {%- set mac = device.mac | upper -%}
              {%- if mac in active_beacons -%}
                {%- set ns.count = ns.count + 1 -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.count }}

          browser_id: "{{ trigger.json.browser_id | default('unknown') }}"
          timestamp: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # Webhook-triggered sensor for BT device names mapping
      # Accumulates MAC→name pairs from each scan in memory (no persistence across HA restart, acceptable for lookup data)
      # Triggered by same webhook as BT Latest Scan Full - data flows: webhook → template sensor attributes → dashboard
      - name: "BT Device Names"
        unique_id: bt_device_names
        state: "ready"
        attributes:
          devices_by_mac: |
            {%- set current_map_raw = state_attr('sensor.bt_device_names', 'devices_by_mac') | default('{}') -%}
            {%- set current_map = current_map_raw | from_json if current_map_raw is string else current_map_raw -%}
            {%- set ns = namespace(new_map=current_map | default({}) | combine({}) ) -%}
            {%- for device in trigger.json.devices | default([]) -%}
              {%- set mac = device.mac | upper -%}
              {%- set incoming = device.name | default('') -%}
              {%- set cached = current_map.get(mac, '') -%}
              {%- set name = incoming if incoming not in ['', 'unknown', 'undefined'] else cached -%}
              {%- if name -%}
                {%- set ns.new_map = ns.new_map | combine({mac: name}) -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.new_map | to_json }}

  # Event-triggered sensor for BT location detection scores (transient, in-memory only)
  # Triggered by bt_location_scores_updated event fired from detect_location_from_signals script
  # No file I/O - scores kept in memory only (real-time detection data via event bus)
  - triggers:
      - trigger: event
        event_type: bt_location_scores_updated
    sensor:
      - name: "BT Location Scores"
        unique_id: bt_location_scores
        state: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        attributes:
          location_scores: "{{ trigger.event.data.scores }}"
          active_beacons_in_scan: "{{ trigger.event.data.active_beacons_in_scan | int(0) }}"
          known_beacons_in_scan: "{{ trigger.event.data.known_beacons_in_scan | int(0) }}"
          unknown_beacons_in_scan: "{{ trigger.event.data.unknown_beacons_in_scan | int(0) }}"

  # BT Location Confusion Matrix - Stores pre-calculated similarity scores
  # Updated by script.generate_confusion_matrix when fingerprints/locations/tolerance change
  - triggers:
      - trigger: event
        event_type: bt_matrix_calculation_complete
    sensor:
      - name: "BT Location Confusion Matrix"
        unique_id: bt_location_confusion_matrix
        icon: mdi:matrix
        state: "{{ now().isoformat() }}"
        attributes:
          matrix: "{{ trigger.event.data.matrix }}"

# ------------------------------------------------------------------
# SCRIPTS
# ------------------------------------------------------------------
script:
  get_active_fingerprint_beacons:
    alias: "Get Active Fingerprint Beacons"
    description: "Extract active beacons from fingerprint string. Filters out locally-ignored (:X marked) beacons."
    fields:
      mac_rssi_str:
        description: "Fingerprint beacon string (e.g. 'AA:BB:CC:DD:EE:FF=-52,11:22:33:44:55:66=-65:X')"
        example: "AA:BB:CC:DD:EE:FF=-52,11:22:33:44:55:66=-65:X"
    sequence:
      - variables:
          # Filter out :X-marked (locally-ignored) beacons
          active_beacons_str: |
            {%- set ns = namespace(pairs=[]) -%}
            {%- if mac_rssi_str and mac_rssi_str | length > 0 -%}
              {%- for pair in (mac_rssi_str | string).split(',') -%}
                {%- if '=' in pair and not pair.endswith(':X') -%}
                  {%- set ns.pairs = ns.pairs + [pair.rstrip(':X')] -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.pairs | join(',') }}
          result:
            fingerprint: "{{ active_beacons_str }}"
      - stop: "Active beacons extracted"
        response_variable: result

  generate_confusion_matrix:
    alias: "Generate BT Confusion Matrix"
    description: "Calculate location confusion scores using worst-case range overlap (no midpoint approximation)"
    mode: restart
    sequence:
      - variables:
          fingerprints_raw: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          locations_list: "{{ state_attr('sensor.bt_location_array', 'locations') | default([]) }}"
          rssi_tolerance: "{{ states('input_number.bt_location_detection_rssi_tolerance') | int }}"
          global_ignored_list: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list }}"

      # Build map: location_name → beacons dict
      - variables:
          fp_map: >
            {%- set ns = namespace(data={}) -%}
            {%- for fp in fingerprints_raw -%}
              {%- set loc_idx = fp.loc -%}
              {%- if loc_idx >= 0 and loc_idx < locations_list | length -%}
                {%- set loc_name = locations_list[loc_idx] -%}
                {%- set ns.data = ns.data | combine({loc_name: fp.beacons}) -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.data }}

      # Compute full matrix in one pass.
      # Score formula mirrors the detection algorithm: (matched/col_total) × (matched/row_active)
      # where row_active = scan_valid (all row beacons are known in matrix context).
      # Match condition: row beacon midpoint falls within col beacon range (point-in-range).
      # Midpoint for min/max beacon: (min+max)/2. Midpoint for mean beacon: rssi.
      # Col range for min/max beacon: [min, max]. Col range for mean beacon: [rssi-tol, rssi+tol].
      # This mirrors real detection: simulates a "typical" scan from the row location.
      - variables:
          matrix_rows: >
            {%- set tol = rssi_tolerance | int -%}
            {%- set ns = namespace(rows=[]) -%}
            {%- for row_loc in fp_map.keys() | sort -%}
              {%- set row_beacons = fp_map[row_loc] -%}
              {%- set ns_scores = namespace(scores={}) -%}

              {# Count active row beacons (scan_valid equivalent) #}
              {%- set ns_row = namespace(active=0) -%}
              {%- for mac, rb in row_beacons.items() -%}
                {%- if not rb.get('ignored', false) and mac | upper not in global_ignored_list -%}
                  {%- set ns_row.active = ns_row.active + 1 -%}
                {%- endif -%}
              {%- endfor -%}

              {%- set ns_overlaps = namespace(data={}) -%}
              {%- for col_loc in fp_map.keys() | sort -%}
                {%- set col_beacons = fp_map[col_loc] -%}
                {%- set ns_col = namespace(matched=0, total=0) -%}
                {%- set ns_ovl = namespace(beacons=[]) -%}

                {%- for mac, cb in col_beacons.items() -%}
                  {%- set mac_upper = mac | upper -%}
                  {%- if not cb.get('ignored', false) and mac_upper not in global_ignored_list -%}
                    {%- set ns_col.total = ns_col.total + 1 -%}
                    {%- if mac in row_beacons -%}
                      {%- set rb = row_beacons[mac] -%}
                      {%- if not rb.get('ignored', false) and mac_upper not in global_ignored_list -%}
                        {%- set r_lo = rb.min if 'min' in rb else rb.rssi - tol -%}
                        {%- set r_hi = rb.max if 'max' in rb else rb.rssi + tol -%}
                        {%- set r_mid = ((r_lo + r_hi) / 2) | int -%}
                        {%- set c_lo = cb.min if 'min' in cb else cb.rssi - tol -%}
                        {%- set c_hi = cb.max if 'max' in cb else cb.rssi + tol -%}
                        {%- if r_mid >= c_lo and r_mid <= c_hi -%}
                          {%- set ns_col.matched = ns_col.matched + 1 -%}
                          {%- if row_loc != col_loc -%}
                            {%- set ns_ovl.beacons = ns_ovl.beacons + [{'mac': mac_upper, 'r_lo': r_lo, 'r_hi': r_hi, 'c_lo': c_lo, 'c_hi': c_hi}] -%}
                          {%- endif -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}

                {%- if ns_col.total > 0 and ns_row.active > 0 -%}
                  {%- set score = ((ns_col.matched / ns_col.total) * (ns_col.matched / ns_row.active)) | round(2) -%}
                {%- else -%}
                  {%- set score = 0 -%}
                {%- endif -%}
                {%- set ns_scores.scores = ns_scores.scores | combine({col_loc: score}) -%}
                {%- if row_loc != col_loc and ns_ovl.beacons | length > 0 -%}
                  {%- set ns_overlaps.data = ns_overlaps.data | combine({col_loc: ns_ovl.beacons}) -%}
                {%- endif -%}
              {%- endfor -%}

              {%- set ns.rows = ns.rows + [{'src': row_loc, 'scores': ns_scores.scores, 'overlaps': ns_overlaps.data}] -%}
            {%- endfor -%}
            {{ ns.rows }}

      # Fire event with complete matrix
      - event: bt_matrix_calculation_complete
        event_data:
          matrix: "{{ matrix_rows | to_json }}"

      # Log completion
      - action: system_log.write
        data:
          message: "BT Confusion Matrix calculated: {{ matrix_rows | length }} locations"
          level: info

  detect_charger_location:
    description: "Analyze BT signals from Tasker scan and detect phone charger location"
    mode: queued
    fields:
      browser_id:
        description: "Device browser_id (e.g., peers_mobil, kitchen_tablet)"
        example: "peers_mobil"
      devices:
        description: "Array of BT devices with MAC, name, and RSSI from Tasker scan"
        example: "[{'mac': 'AA:BB:CC:DD:EE:FF', 'name': 'Device Name', 'rssi': -65}]"
    sequence:
      # Call location-specific detection logic (user-customizable in screensaver_local.yaml)
      - action: script.detect_location_from_signals
        data:
          devices: "{{ devices }}"
        response_variable: detection_result

      # Transform browser_id to device_id by stripping FKB suffix
      - variables:
          transform_pattern: "{{ state_attr('sensor.dashboard_logic_config', 'browser_id_transform_pattern') }}"
          current_mapping: "{{ states('input_text.device_charger_locations') | default('{}') | from_json({}) }}"

      - variables:
          regex_matches: "{{ browser_id | regex_findall(transform_pattern) }}"

      - variables:
          device_id: "{{ regex_matches[0] if regex_matches | length > 0 else browser_id }}"

      - variables:
          detected_location: "{{ detection_result.detected_location }}"
          updated_mapping: "{{ current_mapping | combine({device_id: detected_location}) }}"

      - variables:
          updated_mapping_json: "{{ updated_mapping | to_json }}"

      # Update generic device-to-location JSON mapping
      - action: input_text.set_value
        target:
          entity_id: input_text.device_charger_locations
        data:
          value: "{{ updated_mapping_json }}"

      # Log location detection result
      - action: system_log.write
        data:
          message: "Charger location detected: {{ detected_location | upper }} (Score: {{ detection_result.score }}, Confidence: {{ \"%.1f\" | format(detection_result.confidence * 100) }}%)"
          level: info

# ------------------------------------------------------------------
# AUTOMATIONS
# ------------------------------------------------------------------
  bt_beacon_toggle_location_ignored:
    description: "Toggle beacon ignored status for a specific location (tap action)"
    fields:
      location_index:
        description: "Location index"
        example: "0"
      mac:
        description: "Beacon MAC address to toggle"
        example: "AA:BB:CC:DD:EE:FF"
    sequence:
      - variables:
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          locations_list: "{{ state_attr('sensor.bt_location_array', 'locations') | default([]) }}"
          location_idx: "{{ location_index | int(-1) }}"
          beacon_mac: "{{ mac | upper }}"
          location_name: "{{ locations_list[location_idx] if location_idx >= 0 and location_idx < locations_list | length else 'unknown' }}"

      - if: "{{ location_idx >= 0 }}"
        then:
          # Process fingerprints and toggle ignored status for this beacon at this location
          - variables:
              updated_fingerprints: |
                {%- set ns = namespace(fp_list=[]) -%}
                {%- for fp in current_fingerprints -%}
                  {%- set ns2 = namespace(beacons={}) -%}
                  {%- for mac, beacon in fp.beacons.items() -%}
                    {%- set was_ignored = beacon.get('ignored', false) -%}
                    {%- if fp.loc | int == location_idx and mac | upper == beacon_mac -%}
                      {%- if 'min' in beacon -%}
                        {%- set toggled = {'min': beacon.min, 'max': beacon.max} if was_ignored else {'min': beacon.min, 'max': beacon.max, 'ignored': true} -%}
                      {%- else -%}
                        {%- set toggled = {'rssi': beacon.rssi} if was_ignored else {'rssi': beacon.rssi, 'ignored': true} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({mac: toggled}) -%}
                    {%- else -%}
                      {%- if 'min' in beacon -%}
                        {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if was_ignored else {'min': beacon.min, 'max': beacon.max} -%}
                      {%- else -%}
                        {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if was_ignored else {'rssi': beacon.rssi} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                {%- endfor -%}
                {{ {'fingerprints': ns.fp_list} }}

          # Write updated fingerprints
          - action: script.write_bt_fingerprints
            data:
              fingerprints_json: "{{ updated_fingerprints }}"

          # Log the action
          - action: system_log.write
            data:
              message: "Toggled beacon {{ beacon_mac }} ignored status for location {{ location_name | upper }}"
              level: debug

  bt_beacon_toggle_all_locations_ignored:
    description: "Toggle beacon locally ignored across ALL locations (tap action in all-beacons table)"
    fields:
      mac:
        description: "Beacon MAC address"
        example: "AA:BB:CC:DD:EE:FF"
    sequence:
      - variables:
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          beacon_mac: "{{ mac | upper }}"

      - variables:
          updated_fingerprints: |
            {%- set ns = namespace(fp_list=[], has_any_active=false) -%}
            {# Phase A: determine toggle direction #}
            {%- for fp in current_fingerprints -%}
              {%- for mac, beacon in fp.beacons.items() -%}
                {%- if mac | upper == beacon_mac and not beacon.get('ignored', false) -%}
                  {%- set ns.has_any_active = true -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endfor -%}
            {# Phase B: apply transformation #}
            {%- for fp in current_fingerprints -%}
              {%- set ns2 = namespace(beacons={}) -%}
              {%- for mac, beacon in fp.beacons.items() -%}
                {%- set was_ignored = beacon.get('ignored', false) -%}
                {%- if mac | upper == beacon_mac -%}
                  {%- if 'min' in beacon -%}
                    {%- set toggled = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if ns.has_any_active else {'min': beacon.min, 'max': beacon.max} -%}
                  {%- else -%}
                    {%- set toggled = {'rssi': beacon.rssi, 'ignored': true} if ns.has_any_active else {'rssi': beacon.rssi} -%}
                  {%- endif -%}
                  {%- set ns2.beacons = ns2.beacons | combine({mac: toggled}) -%}
                {%- else -%}
                  {%- if 'min' in beacon -%}
                    {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if was_ignored else {'min': beacon.min, 'max': beacon.max} -%}
                  {%- else -%}
                    {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if was_ignored else {'rssi': beacon.rssi} -%}
                  {%- endif -%}
                  {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                {%- endif -%}
              {%- endfor -%}
              {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
            {%- endfor -%}
            {{ {'fingerprints': ns.fp_list} }}

      - action: script.write_bt_fingerprints
        data:
          fingerprints_json: "{{ updated_fingerprints }}"

      - action: system_log.write
        data:
          message: "Toggled beacon {{ beacon_mac }} locally ignored across ALL locations"
          level: debug

  bt_beacon_remove_from_fingerprint:
    description: "Remove beacon from fingerprint for a specific location (double-tap action)"
    fields:
      location_index:
        description: "Location index"
        example: "0"
      mac:
        description: "Beacon MAC address to remove"
        example: "AA:BB:CC:DD:EE:FF"
    sequence:
      - variables:
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          locations_list: "{{ state_attr('sensor.bt_location_array', 'locations') | default([]) }}"
          location_idx: "{{ location_index | int(-1) }}"
          beacon_mac: "{{ mac | upper }}"
          location_name: "{{ locations_list[location_idx] if location_idx >= 0 and location_idx < locations_list | length else 'unknown' }}"

      - if: "{{ location_idx >= 0 }}"
        then:
          # Process fingerprints and remove beacon from this location
          - variables:
              updated_fingerprints: |
                {%- set ns = namespace(fp_list=[]) -%}
                {%- for fp in current_fingerprints -%}
                  {%- set ns2 = namespace(beacons={}) -%}
                  {%- for mac, beacon in fp.beacons.items() -%}
                    {%- if not (fp.loc | int == location_idx and mac | upper == beacon_mac) -%}
                      {%- if 'min' in beacon -%}
                        {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                      {%- else -%}
                        {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                {%- endfor -%}
                {{ {'fingerprints': ns.fp_list} }}

          # Write updated fingerprints
          - action: script.write_bt_fingerprints
            data:
              fingerprints_json: "{{ updated_fingerprints }}"

          # Log the action
          - action: system_log.write
            data:
              message: "Removed beacon {{ beacon_mac }} from fingerprint for location {{ location_name | upper }}"
              level: debug

  bt_beacon_remove_from_all_fingerprints:
    description: "Remove beacon from ALL location fingerprints (double-tap action in all-beacons table)"
    fields:
      mac:
        description: "Beacon MAC address to remove"
        example: "AA:BB:CC:DD:EE:FF"
    sequence:
      - variables:
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          beacon_mac: "{{ mac | upper }}"

      - variables:
          updated_fingerprints: |
            {%- set ns = namespace(fp_list=[]) -%}
            {%- for fp in current_fingerprints -%}
              {%- set ns2 = namespace(beacons={}) -%}
              {%- for mac, beacon in fp.beacons.items() -%}
                {%- if mac | upper != beacon_mac -%}
                  {%- if 'min' in beacon -%}
                    {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                  {%- else -%}
                    {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                  {%- endif -%}
                  {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                {%- endif -%}
              {%- endfor -%}
              {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
            {%- endfor -%}
            {{ {'fingerprints': ns.fp_list} }}

      - action: script.write_bt_fingerprints
        data:
          fingerprints_json: "{{ updated_fingerprints }}"

      - action: system_log.write
        data:
          message: "Removed beacon {{ beacon_mac }} from all location fingerprints"
          level: debug

  bt_beacon_toggle_global_ignored:
    description: "Toggle beacon in global ignored list (hold/double-tap action)"
    fields:
      mac:
        description: "Beacon MAC address to toggle globally"
        example: "AA:BB:CC:DD:EE:FF"
    sequence:
      - variables:
          beacon_mac: "{{ mac | upper }}"
          # Read current ignored list from sensor attribute (file-backed)
          current_list: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) }}"

      # Check if MAC is already in the list
      - variables:
          is_ignored: "{{ beacon_mac in current_list }}"

      - variables:
          updated_list:
            ignored: "{{ current_list | reject('equalto', beacon_mac) | list if is_ignored else current_list + [beacon_mac] }}"

      # Write updated list to file
      - action: shell_command.bt_ignored_write
        data:
          json_content: "{{ updated_list }}"

      # Refresh sensor to pick up changes
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.bt_ignored_beacons

      # Log the action
      - action: system_log.write
        data:
          message: "{{ 'Removed' if is_ignored else 'Added' }} beacon {{ beacon_mac }} to global ignored list"
          level: debug

      # When adding to global ignore, also remove from all fingerprints
      - if: "{{ not is_ignored }}"
        then:
          - variables:
              current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          - variables:
              cleaned_fingerprints: |
                {%- set ns = namespace(fp_list=[]) -%}
                {%- for fp in current_fingerprints -%}
                  {%- set ns2 = namespace(beacons={}) -%}
                  {%- for mac, beacon in fp.beacons.items() -%}
                    {%- if mac | upper != beacon_mac -%}
                      {%- if 'min' in beacon -%}
                        {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                      {%- else -%}
                        {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                {%- endfor -%}
                {{ {'fingerprints': ns.fp_list} }}
          - action: script.write_bt_fingerprints
            data:
              fingerprints_json: "{{ cleaned_fingerprints }}"

  calculate_location_scores:
    description: "Calculate location scores against latest BT scan and update location metrics"
    sequence:
      # Load latest scan from sensor
      - variables:
          scan_devices: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"

      # Call location detection with loaded scan data
      - action: script.detect_location_from_signals
        data:
          devices: "{{ scan_devices }}"

  detect_location_from_signals:
    description: "Apply location detection rules to BT signal data (user-customizable)"
    fields:
      devices:
        description: "Array of BT devices with MAC, name, and RSSI from Tasker scan"
        example: "[{'mac': 'AA:BB:CC:DD:EE:FF', 'name': 'Device Name', 'rssi': -65}]"
      persist_scores:
        description: "Whether to update dashboard sensor with location scores (default: true)"
        example: "true"
      scan_context:
        description: "Context for logging (e.g., 'Latest scan' or 'Fingerprint #2 (KÖK)') (default: 'Latest scan')"
        example: "Latest scan"
    variables:
      # Control whether to update dashboard sensor with location scores
      persist_scores: "{{ persist_scores | default(true) }}"
      # Context for logging (latest scan or fingerprint number)
      scan_context: "{{ scan_context | default('Latest scan') }}"
      locations_map: "{{ state_attr('sensor.bt_location_array', 'locations') | default(none) }}"
      raw_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
      fingerprints_parsed: |
        {%- set ns = namespace(data=[]) -%}
        {%- for fp in raw_fingerprints -%}
          {%- set location_idx = fp.loc -%}
          {%- if location_idx >= 0 -%}
            {%- if locations_map and location_idx < locations_map | length -%}
              {%- set location_name = locations_map[location_idx] -%}
            {%- else -%}
              {%- set location_name = location_idx | string -%}
            {%- endif -%}
            {%- set ns.data = ns.data + [{"location": location_name, "location_idx": location_idx, "beacons": fp.beacons}] -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.data }}

    sequence:
      # Call location detection algorithm (Symmetric Ratio)
      - action: script.bt_location_symmetric_ratio
        data:
          devices: "{{ devices }}"
          fingerprints_parsed: "{{ fingerprints_parsed }}"
          scan_context: "{{ scan_context }}"
        response_variable: algorithm_result

      # Build result with all scoring details and beacon counts
      - variables:
          result:
            detected_location: "{{ algorithm_result.detected_location }}"
            confidence: "{{ algorithm_result.confidence }}"
            score: "{{ algorithm_result.score }}"
            scores_detail: "{{ algorithm_result.scores_detail }}"
            active_beacons_in_scan: "{{ algorithm_result.active_beacons_in_scan }}"
            known_beacons_in_scan: "{{ algorithm_result.known_beacons_in_scan }}"
            unknown_beacons_in_scan: "{{ algorithm_result.unknown_beacons_in_scan }}"
            algorithm: "match_ratio"

      # Fire event to update in-memory sensor with scores and beacon counts (no disk I/O)
      - if: "{{ persist_scores }}"
        then:
          - event: bt_location_scores_updated
            event_data:
              scores: "{{ result.scores_detail }}"
              active_beacons_in_scan: "{{ result.active_beacons_in_scan }}"
              known_beacons_in_scan: "{{ result.known_beacons_in_scan }}"
              unknown_beacons_in_scan: "{{ result.unknown_beacons_in_scan }}"

      - stop: "Location detected"
        response_variable: result

  capture_bt_fingerprint:
    description: "Capture current RSSI values as fingerprint for location"
    fields:
      location_index:
        description: "Location index (0-based, required)"
        example: "0"
    sequence:
      - variables:
          # Get all detected beacons from latest scan (full device list from file sensor)
          raw_scan: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"
          # Get weak signal threshold, global ignored list, and ghost signal toggle
          weak_signal_threshold: "{{ states('input_number.bt_location_detection_weak_signal_threshold') | int(-95) }}"
          global_ignored_raw: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) }}"
          global_ignored_list: "{{ global_ignored_raw | map('upper') | list if global_ignored_raw is iterable else [] }}"
          filter_zero_rssi: "{{ states('input_boolean.bt_filter_zero_rssi_signals') | bool(false) }}"
          minmax_mode: "{{ states('input_boolean.bt_fingerprint_minmax_mode') | bool(false) }}"
          location: "{{ state_attr('sensor.bt_location_array', 'locations')[location_index | int] | default('unknown') }}"

      - variables:
          # Filter scan: exclude weak signals, globally ignored beacons, and ghost beacons (if toggle is ON)
          scan: |
            {%- set ns = namespace(filtered=[]) -%}
            {%- for device in raw_scan -%}
              {%- set mac_upper = device.mac | upper -%}
              {%- set is_globally_ignored = mac_upper in global_ignored_list -%}
              {%- set is_weak = device.rssi < weak_signal_threshold -%}
              {%- set is_ghost = filter_zero_rssi and device.rssi == 0 -%}
              {%- if not is_globally_ignored and not is_weak and not is_ghost -%}
                {%- set ns.filtered = ns.filtered + [device] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.filtered }}

      # Validate that at least one anchor device was detected
      - if:
          - condition: template
            value_template: "{{ scan | length > 0 }}"
        then:
          - variables:
              # Build device details with names for display (MAC=RSSI (Device Name))
              device_details: |
                {%- set ns = namespace(pairs=[]) -%}
                {%- for device in scan -%}
                  {%- set ns.pairs = ns.pairs + [device.mac ~ '=' ~ device.rssi ~ ' (' ~ (device.name | default('unknown')) ~ ')'] -%}
                {%- endfor -%}
                {{ ns.pairs | join('\n') }}
              # Build beacons dict for new fingerprint entry
              new_fp_beacons: |
                {%- set ns = namespace(beacons={}) -%}
                {%- for device in scan -%}
                  {%- set ns.beacons = ns.beacons | combine({device.mac | upper: {"rssi": device.rssi}}) -%}
                {%- endfor -%}
                {{ ns.beacons }}

          - variables:
              # Read current fingerprints from sensor attribute (file-backed, no 255-char limit)
              current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
              # Filter out any existing entry for this location and append new one
              updated_fingerprints: |
                {%- set ns = namespace(fp_list=[]) -%}
                {%- for fp in current_fingerprints -%}
                  {%- if fp.loc | int != location_index | int -%}
                    {%- set ns2 = namespace(beacons={}) -%}
                    {%- for mac, beacon in fp.beacons.items() -%}
                      {%- if 'min' in beacon -%}
                        {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                      {%- else -%}
                        {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                    {%- endfor -%}
                    {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for device in scan -%}
                  {%- if minmax_mode -%}
                    {%- set ns2.beacons = ns2.beacons | combine({device.mac | upper: {'min': device.rssi, 'max': device.rssi}}) -%}
                  {%- else -%}
                    {%- set ns2.beacons = ns2.beacons | combine({device.mac | upper: {'rssi': device.rssi}}) -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': location_index | int, 'beacons': ns2.beacons}] -%}
                {{ {'fingerprints': ns.fp_list} }}

          # Write updated fingerprints
          - action: script.write_bt_fingerprints
            data:
              fingerprints_json: "{{ updated_fingerprints }}"

          - action: persistent_notification.create
            data:
              title: "BT Fingerprint Captured"
              message: "Location: {{ location | upper }}\nBeacons: {{ scan | length }}\nDevices:\n{{ device_details | trim }}"
              notification_id: "bt_fingerprint_{{ location }}"

          - action: system_log.write
            data:
              message: "Captured BT fingerprint for index {{ location_index }}: {{ new_fp_beacons | length }} beacons"
              level: debug

          - action: script.bt_record_merge_statistics
            data:
              location_index: "{{ location_index }}"
        else:
          - action: persistent_notification.create
            data:
              title: "BT Scan Required"
              message: "No BT devices detected. Place phone on charger and wait for Tasker scan, then try again."
              notification_id: "bt_no_scan"

          - action: system_log.write
            data:
              message: "Fingerprint capture failed: No BT scan data available for location {{ location | upper }}"
              level: warning

  merge_bt_fingerprint:
    description: "Merge or update the fingerprint for a location from the latest BT scan"
    fields:
      location_index:
        description: "Location index (0-based, required)"
        example: "0"
      rssi_only:
        description: "If true, only update RSSI for existing beacons (no new beacons added). Default: false (merge mode)"
        example: "false"
    sequence:
      - variables:
          raw_scan: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"
          # Get weak signal threshold, global ignored list, and ghost signal toggle
          weak_signal_threshold: "{{ states('input_number.bt_location_detection_weak_signal_threshold') | int(-95) }}"
          global_ignored_raw: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) }}"
          global_ignored_list: "{{ global_ignored_raw | map('upper') | list if global_ignored_raw is iterable else [] }}"
          filter_zero_rssi: "{{ states('input_boolean.bt_filter_zero_rssi_signals') | bool(false) }}"
          rssi_only: "{{ rssi_only | default(false) | bool }}"
          minmax_mode: "{{ states('input_boolean.bt_fingerprint_minmax_mode') | bool(false) }}"

      - variables:
          # Filter scan: exclude weak signals, globally ignored beacons, and ghost beacons (if toggle is ON)
          scan: |
            {%- set ns = namespace(filtered=[]) -%}
            {%- for device in raw_scan -%}
              {%- set mac_upper = device.mac | upper -%}
              {%- set is_globally_ignored = mac_upper in global_ignored_list -%}
              {%- set is_weak = device.rssi < weak_signal_threshold -%}
              {%- set is_ghost = filter_zero_rssi and device.rssi == 0 -%}
              {%- if not is_globally_ignored and not is_weak and not is_ghost -%}
                {%- set ns.filtered = ns.filtered + [device] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.filtered }}

      - if:
          - condition: template
            value_template: "{{ scan | length > 0 }}"
        then:
          - variables:
              # Build scan data map: MAC -> RSSI for quick lookup
              scan_map: |
                {%- set ns = namespace(map={}) -%}
                {%- for device in scan -%}
                  {%- set ns.map = ns.map | combine({device.mac | upper: device.rssi}) -%}
                {%- endfor -%}
                {{ ns.map }}
              # Read current fingerprints
              current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"

          - variables:
              # Extract existing beacons dict for this location
              existing_beacons: |
                {%- set ns = namespace(beacons={}) -%}
                {%- for fp in current_fingerprints -%}
                  {%- if fp.loc | int == location_index | int -%}
                    {%- for mac, beacon in fp.beacons.items() -%}
                      {%- set ns.beacons = ns.beacons | combine({mac: beacon}) -%}
                    {%- endfor -%}
                  {%- endif -%}
                {%- endfor -%}
                {{ ns.beacons }}

          - variables:
              # Merge/update: mode-driven — all entries written in current mode format
              # rssi_only=true: existing beacons only (no new beacons added)
              # rssi_only=false (default): also adds new beacons from scan
              merged_beacons: |
                {%- set ns = namespace(merged=existing_beacons) -%}
                {%- for scan_mac, scan_rssi in scan_map.items() -%}
                  {%- if scan_mac in ns.merged or not rssi_only -%}
                    {%- set existing_beacon = ns.merged.get(scan_mac, {}) -%}
                    {%- set was_ignored = existing_beacon.get('ignored', false) -%}
                    {%- if minmax_mode -%}
                      {# Min/max mode: all entries written as min/max #}
                      {%- if 'min' in existing_beacon -%}
                        {%- set new_min = [existing_beacon.min, scan_rssi] | min -%}
                        {%- set new_max = [existing_beacon.max, scan_rssi] | max -%}
                      {%- else -%}
                        {%- set new_min = scan_rssi -%}
                        {%- set new_max = scan_rssi -%}
                      {%- endif -%}
                      {%- set beacon_data = {'min': new_min, 'max': new_max} -%}
                    {%- else -%}
                      {# Mean mode: all entries written as mean RSSI #}
                      {%- if rssi_only and 'min' not in existing_beacon and scan_mac in ns.merged -%}
                        {# tap on existing mean entry: running mean (gentle incremental update) #}
                        {%- set avg_rssi = ((existing_beacon.rssi + scan_rssi) / 2) | round | int -%}
                        {%- set beacon_data = {'rssi': avg_rssi} -%}
                      {%- else -%}
                        {# full merge, new beacon, or conversion from min/max: use scan value #}
                        {%- set beacon_data = {'rssi': scan_rssi} -%}
                      {%- endif -%}
                    {%- endif -%}
                    {%- if was_ignored -%}
                      {%- set ns.merged = ns.merged | combine({scan_mac: beacon_data | combine({'ignored': true})}) -%}
                    {%- else -%}
                      {%- set ns.merged = ns.merged | combine({scan_mac: beacon_data}) -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
                {{ ns.merged }}

          - variables:
              # Update fingerprints: remove old entry for this location, add merged entry
              updated_fingerprints: |
                {%- set ns = namespace(fp_list=[]) -%}
                {%- for fp in current_fingerprints -%}
                  {%- if fp.loc | int != location_index | int -%}
                    {%- set ns2 = namespace(beacons={}) -%}
                    {%- for mac, beacon in fp.beacons.items() -%}
                      {%- if 'min' in beacon -%}
                        {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                      {%- else -%}
                        {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                    {%- endfor -%}
                    {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': location_index | int, 'beacons': merged_beacons}] -%}
                {{ {'fingerprints': ns.fp_list} }}

          - action: script.write_bt_fingerprints
            data:
              fingerprints_json: "{{ updated_fingerprints }}"

          - variables:
              locations_list: "{{ state_attr('sensor.bt_location_array', 'locations') | default([]) }}"
              location_name: "{{ locations_list[location_index] if location_index >= 0 and location_index < locations_list | length else 'unknown' }}"

          - action: persistent_notification.create
            data:
              title: "BT Fingerprint Updated ({{ 'RSSI' if rssi_only else 'Merged' }})"
              message: "Location: {{ location_name | upper }}\n{% if rssi_only %}Beacons updated: {{ merged_beacons | length }} (RSSI refreshed, no new beacons added){% else %}Beacons added: {{ (merged_beacons | length) - (existing_beacons | length) }} new\nBeacons existing: {{ existing_beacons | length }}\nTotal: {{ merged_beacons | length }} beacons{% endif %}"
              notification_id: "bt_fingerprint_merged"

          - action: system_log.write
            data:
              message: "{{ 'RSSI-updated' if rssi_only else 'Merged' }} BT fingerprint for location {{ location_index }}: {{ merged_beacons | length }} beacons"
              level: debug

          - action: script.bt_record_merge_statistics
            data:
              location_index: "{{ location_index }}"
        else:
          - action: persistent_notification.create
            data:
              title: "BT Scan Required"
              message: "No BT devices detected. Place phone on charger and wait for Tasker scan, then try again."
              notification_id: "bt_no_scan"

  bt_beacon_reset_minmax:
    description: "Reset a single beacon entry from current scan: mean mode writes scan RSSI; min/max mode writes [scan−tol, scan+tol]. No-op if beacon absent from scan."
    fields:
      location_index:
        description: "Location index (0-based, required)"
        example: "0"
      mac:
        description: "Beacon MAC address (uppercase)"
        example: "DE:E3:0B:7D:6B:0B"
    sequence:
      - variables:
          minmax_mode: "{{ states('input_boolean.bt_fingerprint_minmax_mode') | bool(false) }}"
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          mac_upper: "{{ mac | upper }}"
          tolerance: "{{ states('input_number.bt_location_detection_rssi_tolerance') | int(10) }}"
          scan_devices: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"

      - variables:
          updated_fingerprints: |
            {%- set ns_scan = namespace(rssi=none) -%}
            {%- for device in scan_devices -%}
              {%- if device.mac | upper == mac_upper -%}
                {%- set ns_scan.rssi = device.rssi -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set scan_rssi = ns_scan.rssi -%}
            {%- set ns = namespace(fp_list=[]) -%}
            {%- for fp in current_fingerprints -%}
              {%- if fp.loc | int != location_index | int -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for mac, beacon in fp.beacons.items() -%}
                  {%- if 'min' in beacon -%}
                    {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                  {%- else -%}
                    {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                  {%- endif -%}
                  {%- set ns2.beacons = ns2.beacons | combine({mac: beacon_dict}) -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
              {%- else -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for m, beacon in fp.beacons.items() -%}
                  {%- if m | upper != mac_upper -%}
                    {%- if 'min' in beacon -%}
                      {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                    {%- else -%}
                      {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                    {%- endif -%}
                    {%- set ns2.beacons = ns2.beacons | combine({m: beacon_dict}) -%}
                  {%- else -%}
                    {%- set was_ignored = beacon.get('ignored', false) -%}
                    {%- if scan_rssi is not none -%}
                      {%- if minmax_mode -%}
                        {# Min/max mode, beacon in scan: set range to scan ± tolerance #}
                        {%- set reset_beacon = {'min': scan_rssi | int - tolerance, 'max': scan_rssi | int + tolerance} -%}
                      {%- else -%}
                        {# Mean mode, beacon in scan: collapse to current scan RSSI #}
                        {%- set reset_beacon = {'rssi': scan_rssi | int} -%}
                      {%- endif -%}
                    {%- else -%}
                      {# Beacon absent from scan: no-op #}
                      {%- set reset_beacon = beacon -%}
                    {%- endif -%}
                    {%- if was_ignored -%}
                      {%- set reset_beacon = reset_beacon | combine({'ignored': true}) -%}
                    {%- endif -%}
                    {%- set ns2.beacons = ns2.beacons | combine({m: reset_beacon}) -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ {'fingerprints': ns.fp_list} }}

      - action: script.write_bt_fingerprints
        data:
          fingerprints_json: "{{ updated_fingerprints }}"

      - action: system_log.write
        data:
          message: "Reset beacon {{ mac_upper }} in location {{ location_index }}, minmax_mode={{ minmax_mode }}, tolerance={{ tolerance }}"
          level: debug

  bt_beacon_range_editor_open:
    alias: "BT: Open beacon range editor popup"
    description: "Pre-fill range editor helpers and open browser_mod popup for direct min/max editing of a fingerprint beacon"
    mode: restart
    fields:
      browser_id:
        description: "ID of the calling browser (targets popup to that browser only)"
        default: ""
      location_index:
        description: "Location index (0-based)"
        example: "0"
      mac:
        description: "Beacon MAC address (uppercase)"
        example: "8C:BF:EA:A1:3A:66"
      current_min:
        description: "Current fingerprint min value"
        example: "-70"
      current_max:
        description: "Current fingerprint max value"
        example: "-50"
      beacon_name:
        description: "Human-readable beacon name (for popup title)"
        default: ""
      scan_rssi:
        description: "Current scan RSSI for this beacon (empty string if not in scan)"
        default: ""
      tolerance:
        description: "Current RSSI tolerance setting"
        example: "10"
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.bt_range_editor_min
        data:
          value: "{{ current_min | int }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.bt_range_editor_max
        data:
          value: "{{ current_max | int }}"
      - variables:
          stats_p10_p90: |
            {%- set all_stats = state_attr('sensor.bt_merge_statistics', 'statistics') | default([]) -%}
            {%- set ns_s = namespace(beacons={}) -%}
            {%- for entry in all_stats -%}
              {%- if entry.loc | int == location_index | int -%}
                {%- set ns_s.beacons = entry.beacons -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set readings = ns_s.beacons.get(mac | upper, []) -%}
            {%- set s_count = readings | length -%}
            {%- if s_count >= 10 -%}
              {%- set rssi_vals = readings | map(attribute=0) | list | sort -%}
              {%- set p10 = rssi_vals[(s_count * 0.1) | int] -%}
              {%- set p90 = rssi_vals[(s_count * 0.9) | int] -%}
              {{ p10 | string ~ '|' ~ p90 | string ~ '|' ~ s_count | string }}
            {%- else -%}
              {{ '||' ~ s_count | string }}
            {%- endif -%}
      - action: input_text.set_value
        target:
          entity_id: input_text.bt_range_editor_context
        data:
          value: "{{ location_index }}|{{ mac | upper }}|{{ scan_rssi }}|{{ tolerance }}|{{ current_min }}|{{ current_max }}|{{ stats_p10_p90 | trim }}"
      - action: browser_mod.popup
        data:
          browser_id: "{{ browser_id }}"
          title: "Edit range: {{ beacon_name if beacon_name else mac | upper }}"
          content:
            type: entities
            entities:
              - entity: input_number.bt_range_editor_min
                name: Min (dBm)
              - entity: input_number.bt_range_editor_max
                name: Max (dBm)
              - type: custom:button-card
                entity: input_text.bt_range_editor_context
                show_icon: false
                show_state: false
                name: |
                  [[[
                    const ctx = states['input_text.bt_range_editor_context']?.state?.split('|') || [];
                    const tol = parseInt(ctx[3]);
                    const cMin = parseFloat(ctx[4]);
                    const cMax = parseFloat(ctx[5]);
                    if (isNaN(cMin) || isNaN(cMax)) return 'Apply midpoint ± tolerance';
                    const mid = Math.round((cMin + cMax) / 2);
                    return `Apply midpoint ${mid} dBm:  ${mid - tol} / ${mid + tol}`;
                  ]]]
                tap_action:
                  action: perform-action
                  perform_action: script.bt_beacon_range_editor_apply_suggested
                styles:
                  card:
                    - background-color: var(--primary-color)
                    - color: var(--text-primary-color)
                    - border-radius: 6px
                    - height: 40px
                    - font-size: 13px
                    - opacity: |
                        [[[
                          const ctx = states['input_text.bt_range_editor_context']?.state?.split('|') || [];
                          const tol = parseInt(ctx[3]);
                          const mid = Math.round((parseFloat(ctx[4]) + parseFloat(ctx[5])) / 2);
                          const curMin = parseInt(states['input_number.bt_range_editor_min']?.state);
                          const curMax = parseInt(states['input_number.bt_range_editor_max']?.state);
                          return (curMin === mid - tol && curMax === mid + tol) ? '0.3' : '1';
                        ]]]
              - type: custom:button-card
                entity: input_text.bt_range_editor_context
                show_icon: false
                show_state: false
                name: |
                  [[[
                    const ctx = states['input_text.bt_range_editor_context']?.state?.split('|') || [];
                    const p10 = parseFloat(ctx[6]);
                    const p90 = parseFloat(ctx[7]);
                    const n = parseInt(ctx[8]) || 0;
                    if (isNaN(p10) || isNaN(p90)) return `Apply P10/P90  (n=${n}, need ≥10)`;
                    return `Apply P10/P90:  ${p10} / ${p90}  (n=${n})`;
                  ]]]
                tap_action:
                  action: perform-action
                  perform_action: script.bt_beacon_range_editor_apply_percentile
                styles:
                  card:
                    - background-color: var(--primary-color)
                    - color: var(--text-primary-color)
                    - border-radius: 6px
                    - height: 40px
                    - font-size: 13px
                    - opacity: |
                        [[[
                          const ctx = states['input_text.bt_range_editor_context']?.state?.split('|') || [];
                          const p10 = parseFloat(ctx[6]);
                          const p90 = parseFloat(ctx[7]);
                          const curMin = parseInt(states['input_number.bt_range_editor_min']?.state);
                          const curMax = parseInt(states['input_number.bt_range_editor_max']?.state);
                          if (isNaN(p10) || isNaN(p90)) return '0.3';
                          return (curMin === p10 && curMax === p90) ? '0.3' : '1';
                        ]]]
              - type: custom:button-card
                name: Save
                show_icon: false
                tap_action:
                  action: perform-action
                  perform_action: script.bt_beacon_range_editor_save
                  data:
                    browser_id: '[[[ return window.browser_mod?.browserID || ""; ]]]'
                styles:
                  card:
                    - background-color: var(--primary-color)
                    - color: var(--text-primary-color)
                    - border-radius: 6px
                    - height: 40px
                    - opacity: |
                        [[[
                          const ctx = states['input_text.bt_range_editor_context']?.state?.split('|') || [];
                          const fpMin = parseFloat(ctx[4]);
                          const fpMax = parseFloat(ctx[5]);
                          const curMin = parseInt(states['input_number.bt_range_editor_min']?.state);
                          const curMax = parseInt(states['input_number.bt_range_editor_max']?.state);
                          return (curMin === fpMin && curMax === fpMax) ? '0.3' : '1';
                        ]]]

  bt_beacon_range_editor_apply_suggested:
    alias: "BT: Apply suggested range to editor"
    description: "Sets range editor helpers to midpoint of current fingerprint range ± tolerance"
    mode: single
    sequence:
      - variables:
          ctx: "{{ states('input_text.bt_range_editor_context').split('|') }}"
          tolerance_val: "{{ ctx[3] | int(10) if ctx | length > 3 else 10 }}"
          fp_min: "{{ ctx[4] | float(0) if ctx | length > 4 else 0 }}"
          fp_max: "{{ ctx[5] | float(0) if ctx | length > 5 else 0 }}"
          mid: "{{ ((fp_min + fp_max) / 2) | round | int }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.bt_range_editor_min
        data:
          value: "{{ [mid - tolerance_val, -120] | max }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.bt_range_editor_max
        data:
          value: "{{ [mid + tolerance_val, 0] | min }}"

  bt_beacon_range_editor_apply_percentile:
    alias: "BT: Apply P10/P90 percentile range to editor"
    description: "Sets range editor helpers to P10/P90 from scan history statistics"
    mode: single
    sequence:
      - variables:
          ctx: "{{ states('input_text.bt_range_editor_context').split('|') }}"
          p10: "{{ ctx[6] | int(0) if ctx | length > 6 else 0 }}"
          p90: "{{ ctx[7] | int(0) if ctx | length > 7 else 0 }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.bt_range_editor_min
        data:
          value: "{{ p10 }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.bt_range_editor_max
        data:
          value: "{{ p90 }}"

  bt_beacon_range_editor_save:
    alias: "BT: Save range editor values to fingerprint"
    description: "Reads min/max from helpers and writes directly to fingerprint. Preserves beacon format: min/max entries stay as min/max; mean entries save as rssi=midpoint. Swaps min/max if inverted."
    mode: single
    fields:
      browser_id:
        description: "Browser to close popup on after save"
        default: ""
    sequence:
      - variables:
          ctx: "{{ states('input_text.bt_range_editor_context').split('|') }}"
          location_index: "{{ ctx[0] | int }}"
          mac_upper: "{{ ctx[1] | upper }}"
          new_min_raw: "{{ states('input_number.bt_range_editor_min') | int }}"
          new_max_raw: "{{ states('input_number.bt_range_editor_max') | int }}"
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"

      - variables:
          new_min: "{{ [new_min_raw, new_max_raw] | min }}"
          new_max: "{{ [new_min_raw, new_max_raw] | max }}"

      - variables:
          updated_fingerprints: |
            {%- set ns = namespace(fp_list=[]) -%}
            {%- for fp in current_fingerprints -%}
              {%- if fp.loc | int != location_index -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for m, beacon in fp.beacons.items() -%}
                  {%- if 'min' in beacon -%}
                    {%- set bd = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                  {%- else -%}
                    {%- set bd = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                  {%- endif -%}
                  {%- set ns2.beacons = ns2.beacons | combine({m: bd}) -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
              {%- else -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for m, beacon in fp.beacons.items() -%}
                  {%- if m | upper != mac_upper -%}
                    {%- if 'min' in beacon -%}
                      {%- set bd = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                    {%- else -%}
                      {%- set bd = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                    {%- endif -%}
                    {%- set ns2.beacons = ns2.beacons | combine({m: bd}) -%}
                  {%- else -%}
                    {%- set was_ignored = beacon.get('ignored', false) -%}
                    {%- if 'min' in beacon -%}
                      {%- set bd = {'min': new_min | int, 'max': new_max | int, 'ignored': true} if was_ignored else {'min': new_min | int, 'max': new_max | int} -%}
                    {%- else -%}
                      {%- set mid = ((new_min + new_max) / 2) | round | int -%}
                      {%- set bd = {'rssi': mid, 'ignored': true} if was_ignored else {'rssi': mid} -%}
                    {%- endif -%}
                    {%- set ns2.beacons = ns2.beacons | combine({m: bd}) -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ {'fingerprints': ns.fp_list} }}

      - action: script.write_bt_fingerprints
        data:
          fingerprints_json: "{{ updated_fingerprints }}"

      - action: browser_mod.close_popup
        data:
          browser_id: "{{ browser_id }}"

  bt_beacon_merge:
    description: "Merge a single beacon from the current scan into its fingerprint entry (expand min/max or update running mean)"
    fields:
      location_index:
        description: "Location index (0-based, required)"
        example: "0"
      mac:
        description: "Beacon MAC address (uppercase)"
        example: "DE:E3:0B:7D:6B:0B"
    sequence:
      - variables:
          minmax_mode: "{{ states('input_boolean.bt_fingerprint_minmax_mode') | bool(false) }}"
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          mac_upper: "{{ mac | upper }}"
          scan_devices: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"

      - variables:
          scan_rssi: |
            {%- set ns = namespace(rssi=none) -%}
            {%- for device in scan_devices -%}
              {%- if device.mac | upper == mac_upper -%}
                {%- set ns.rssi = device.rssi -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.rssi }}

      - if:
          - condition: template
            value_template: "{{ scan_rssi is not none }}"
        then:
          - variables:
              updated_fingerprints: |
                {%- set ns = namespace(fp_list=[]) -%}
                {%- for fp in current_fingerprints -%}
                  {%- if fp.loc | int != location_index | int -%}
                    {%- set ns2 = namespace(beacons={}) -%}
                    {%- for m, beacon in fp.beacons.items() -%}
                      {%- if 'min' in beacon -%}
                        {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if beacon.get('ignored', false) else {'min': beacon.min, 'max': beacon.max} -%}
                      {%- else -%}
                        {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if beacon.get('ignored', false) else {'rssi': beacon.rssi} -%}
                      {%- endif -%}
                      {%- set ns2.beacons = ns2.beacons | combine({m: beacon_dict}) -%}
                    {%- endfor -%}
                    {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                  {%- else -%}
                    {%- set ns2 = namespace(beacons={}) -%}
                    {%- for m, beacon in fp.beacons.items() -%}
                      {%- set was_ignored = beacon.get('ignored', false) -%}
                      {%- if m | upper != mac_upper -%}
                        {%- if 'min' in beacon -%}
                          {%- set beacon_dict = {'min': beacon.min, 'max': beacon.max, 'ignored': true} if was_ignored else {'min': beacon.min, 'max': beacon.max} -%}
                        {%- else -%}
                          {%- set beacon_dict = {'rssi': beacon.rssi, 'ignored': true} if was_ignored else {'rssi': beacon.rssi} -%}
                        {%- endif -%}
                        {%- set ns2.beacons = ns2.beacons | combine({m: beacon_dict}) -%}
                      {%- else -%}
                        {%- if 'min' in beacon -%}
                          {%- set new_min = [beacon.min, scan_rssi | int] | min -%}
                          {%- set new_max = [beacon.max, scan_rssi | int] | max -%}
                          {%- set merged = {'min': new_min, 'max': new_max} -%}
                        {%- else -%}
                          {%- set avg_rssi = ((beacon.rssi + scan_rssi | int) / 2) | round | int -%}
                          {%- set merged = {'rssi': avg_rssi} -%}
                        {%- endif -%}
                        {%- if was_ignored -%}
                          {%- set merged = merged | combine({'ignored': true}) -%}
                        {%- endif -%}
                        {%- set ns2.beacons = ns2.beacons | combine({m: merged}) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
                  {%- endif -%}
                {%- endfor -%}
                {{ {'fingerprints': ns.fp_list} }}

          - action: script.write_bt_fingerprints
            data:
              fingerprints_json: "{{ updated_fingerprints }}"

          - action: system_log.write
            data:
              message: "Merged beacon {{ mac_upper }} in location {{ location_index }}, scan_rssi={{ scan_rssi }}, minmax_mode={{ minmax_mode }}"
              level: debug

  bt_beacon_reset_all:
    description: "Reset all beacons for a location. Min/max mode: P10/P90 if ≥10 samples, else midpoint±tolerance. Mean mode: current scan RSSI if present, else unchanged."
    fields:
      location_index:
        description: "Location index (0-based, required)"
        example: "0"
    sequence:
      - variables:
          minmax_mode: "{{ states('input_boolean.bt_fingerprint_minmax_mode') | bool(false) }}"
          tolerance: "{{ states('input_number.bt_location_detection_rssi_tolerance') | int(10) }}"
          current_fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          scan_devices: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"
          all_stats: "{{ state_attr('sensor.bt_merge_statistics', 'statistics') | default([]) }}"

      - variables:
          scan_map: |
            {%- set ns = namespace(map={}) -%}
            {%- for device in scan_devices -%}
              {%- set ns.map = ns.map | combine({device.mac | upper: device.rssi}) -%}
            {%- endfor -%}
            {{ ns.map }}

      - variables:
          updated_fingerprints: |
            {%- set ns = namespace(fp_list=[]) -%}
            {%- set loc_stats_ns = namespace(beacons={}) -%}
            {%- for entry in all_stats -%}
              {%- if entry.loc | int == location_index | int -%}
                {%- set loc_stats_ns.beacons = entry.beacons -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set loc_stats_map = loc_stats_ns.beacons -%}
            {%- for fp in current_fingerprints -%}
              {%- if fp.loc | int != location_index | int -%}
                {%- set ns.fp_list = ns.fp_list + [fp] -%}
              {%- else -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for m, beacon in fp.beacons.items() -%}
                  {%- set mac_upper = m | upper -%}
                  {%- set was_ignored = beacon.get('ignored', false) -%}
                  {%- if minmax_mode -%}
                    {%- set readings = loc_stats_map.get(mac_upper, []) -%}
                    {%- set s_count = readings | length -%}
                    {%- if s_count >= 10 -%}
                      {%- set sorted_vals = readings | map(attribute=0) | list | sort -%}
                      {%- set p10 = sorted_vals[(s_count * 0.1) | int] | int -%}
                      {%- set p90 = sorted_vals[(s_count * 0.9) | int] | int -%}
                      {%- set reset_beacon = {'min': p10, 'max': p90} -%}
                    {%- else -%}
                      {%- set mid = ((beacon.min + beacon.max) / 2) | round | int if 'min' in beacon else beacon.rssi | int -%}
                      {%- set reset_beacon = {'min': mid - tolerance, 'max': mid + tolerance} -%}
                    {%- endif -%}
                  {%- else -%}
                    {# Mean mode: scan RSSI if present, else leave unchanged #}
                    {%- if mac_upper in scan_map -%}
                      {%- set reset_beacon = {'rssi': scan_map[mac_upper] | int} -%}
                    {%- else -%}
                      {%- set reset_beacon = beacon -%}
                    {%- endif -%}
                  {%- endif -%}
                  {%- if was_ignored -%}
                    {%- set reset_beacon = reset_beacon | combine({'ignored': true}) -%}
                  {%- endif -%}
                  {%- set ns2.beacons = ns2.beacons | combine({m: reset_beacon}) -%}
                {%- endfor -%}
                {%- set ns.fp_list = ns.fp_list + [{'loc': fp.loc, 'beacons': ns2.beacons}] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ {'fingerprints': ns.fp_list} }}

      - action: script.write_bt_fingerprints
        data:
          fingerprints_json: "{{ updated_fingerprints }}"

      - action: system_log.write
        data:
          message: "Reset all beacons for location {{ location_index }}, minmax_mode={{ minmax_mode }}"
          level: debug

      - action: script.bt_record_merge_statistics
        data:
          location_index: "{{ location_index }}"

  bt_record_merge_statistics:
    description: "Append current scan RSSI readings for a location to bt_statistics.json (called after capture/merge/reset)"
    fields:
      location_index:
        description: "Location index (0-based, required)"
        example: "0"
    sequence:
      - variables:
          current_stats: "{{ state_attr('sensor.bt_merge_statistics', 'statistics') | default([]) }}"
          raw_scan: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) }}"
          global_ignored: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list }}"
          ts: "{{ now().timestamp() | int }}"

      - variables:
          scan_map: |
            {%- set ns = namespace(map={}) -%}
            {%- for device in raw_scan -%}
              {%- set mac_upper = device.mac | upper -%}
              {%- if mac_upper not in global_ignored -%}
                {%- set ns.map = ns.map | combine({mac_upper: device.rssi}) -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.map }}

      - variables:
          updated_statistics: |
            {%- set ns = namespace(stat_list=[], found=false) -%}
            {%- for entry in current_stats -%}
              {%- if entry.loc | int == location_index | int -%}
                {%- set ns.found = true -%}
                {%- set ns2 = namespace(beacons={}) -%}
                {%- for mac, readings in entry.beacons.items() -%}
                  {%- set mac_upper = mac | upper -%}
                  {%- if mac_upper in scan_map -%}
                    {%- set new_readings = (readings + [[scan_map[mac_upper], ts]])[-50:] -%}
                    {%- set ns2.beacons = ns2.beacons | combine({mac_upper: new_readings}) -%}
                  {%- else -%}
                    {%- set ns2.beacons = ns2.beacons | combine({mac_upper: readings}) -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- for mac_upper, rssi in scan_map.items() -%}
                  {%- if mac_upper not in entry.beacons -%}
                    {%- set ns2.beacons = ns2.beacons | combine({mac_upper: [[rssi, ts]]}) -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns.stat_list = ns.stat_list + [{'loc': location_index | int, 'beacons': ns2.beacons}] -%}
              {%- else -%}
                {%- set ns.stat_list = ns.stat_list + [entry] -%}
              {%- endif -%}
            {%- endfor -%}
            {%- if not ns.found -%}
              {%- set ns2 = namespace(beacons={}) -%}
              {%- for mac_upper, rssi in scan_map.items() -%}
                {%- set ns2.beacons = ns2.beacons | combine({mac_upper: [[rssi, ts]]}) -%}
              {%- endfor -%}
              {%- set ns.stat_list = ns.stat_list + [{'loc': location_index | int, 'beacons': ns2.beacons}] -%}
            {%- endif -%}
            {{ {'statistics': ns.stat_list} }}

      - action: shell_command.bt_statistics_write
        data:
          json_content: "{{ updated_statistics }}"

      - action: system_log.write
        data:
          message: "Recorded merge statistics for location {{ location_index }}: {{ scan_map | length }} beacons from scan"
          level: debug

  report_beacon_status:
    description: "Generate and log beacon status report with per-beacon statistics and warnings"
    sequence:
      - variables:
          locations_list: "{{ state_attr('sensor.bt_location_array', 'locations') | default([]) }}"
          fingerprints: "{{ state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([]) }}"
          global_list: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list }}"
          weak_signal_threshold: "{{ states('input_number.bt_location_detection_weak_signal_threshold') | int(-95) }}"
          tolerance: "{{ states('input_number.bt_location_detection_rssi_tolerance') | int(5) }}"
          all_stats: "{{ state_attr('sensor.bt_merge_statistics', 'statistics') | default([]) }}"
          names_raw: "{{ state_attr('sensor.bt_device_names', 'devices_by_mac') | default('{}') }}"

      - variables:
          validation_report: |
            === Beacon Status Report ===
            {%- set names_map = names_raw | from_json if names_raw is string else names_raw -%}
            {%- set report = namespace(lines=[], loc_warn_list=[]) -%}
            {%- for fp in fingerprints -%}
              {%- set idx = fp.loc -%}
              {%- set location_name = locations_list[idx] if idx >= 0 and idx < locations_list | length else (idx | string) -%}
              {%- set ns = namespace(total=0, active=0, weak=0, locally_ignored=0, warnings=0, beacon_lines=[]) -%}
              {%- set loc_stats = namespace(beacons={}) -%}
              {%- for stat_entry in all_stats -%}
                {%- if stat_entry.loc | int == idx | int -%}
                  {%- set loc_stats.beacons = stat_entry.beacons -%}
                {%- endif -%}
              {%- endfor -%}
              {%- for mac, beacon in fp.beacons.items() -%}
                {%- set mac_upper = mac | upper -%}
                {%- if mac_upper not in global_list -%}
                  {%- set rssi = ((beacon.min + beacon.max) / 2) | int if 'min' in beacon else beacon.rssi -%}
                  {%- set ns.total = ns.total + 1 -%}
                  {%- if beacon.get('ignored', false) -%}
                    {%- set ns.locally_ignored = ns.locally_ignored + 1 -%}
                  {%- else -%}
                    {%- set is_weak = rssi < weak_signal_threshold -%}
                    {%- if is_weak -%}
                      {%- set ns.weak = ns.weak + 1 -%}
                    {%- else -%}
                      {%- set ns.active = ns.active + 1 -%}
                    {%- endif -%}
                    {%- set bname = names_map.get(mac_upper, '?') -%}
                    {%- set fp_display = (beacon.min | string ~ '/' ~ beacon.max | string ~ ' dBm') if 'min' in beacon else (rssi | string ~ ' dBm') -%}
                    {%- set fp_span = ((beacon.max | int(0)) - (beacon.min | int(0))) | abs if 'min' in beacon else 0 -%}
                    {%- set is_wide = fp_span > 2 * tolerance -%}
                    {%- set s_readings = loc_stats.beacons.get(mac_upper, []) -%}
                    {%- set s_count = s_readings | length -%}
                    {%- set ns_rm = namespace(min_gap=0, max_gap=0) -%}
                    {%- if s_count > 0 -%}
                      {# Extract RSSI values (readings are [rssi, timestamp] pairs, oldest first) #}
                      {%- set s_vals = s_readings | map(attribute=0) | list -%}
                      {# Mean #}
                      {%- set s_mean = (s_vals | sum) / s_count -%}
                      {# Standard deviation (population) #}
                      {%- set ns_std = namespace(sq=0) -%}
                      {%- for v in s_vals -%}{%- set ns_std.sq = ns_std.sq + (v - s_mean) ** 2 -%}{%- endfor -%}
                      {%- set s_stddev = ((ns_std.sq / s_count) ** 0.5) | round | int -%}
                      {# Drift: how far the fingerprint value has moved from the observed mean #}
                      {%- set s_drift = (rssi - s_mean) | round | int -%}
                      {%- set s_drift_str = ('+' if s_drift > 0 else '') ~ s_drift -%}
                      {# Time span: days between oldest and newest reading #}
                      {%- set s_span_days = (((s_readings[-1][1] - s_readings[0][1]) / 86400) | round | int) + 1 -%}
                      {%- set s_first_date = s_readings[0][1] | timestamp_custom('%y%m%d', true) -%}
                      {%- set s_last_date = s_readings[-1][1] | timestamp_custom('%y%m%d', true) -%}
                      {# Histogram: count readings per 3 dBm bucket, show non-empty buckets as -69(12) -66(5) #}
                      {%- set s_min = s_vals | min -%}
                      {%- set s_max = s_vals | max -%}
                      {%- set bucket_w = 3 -%}
                      {# Floor-align bucket boundaries to multiples of bucket_w #}
                      {%- set b_start = (s_min // bucket_w) * bucket_w -%}
                      {%- set b_end = (s_max // bucket_w) * bucket_w -%}
                      {# Initialize all buckets to 0 #}
                      {%- set ns_hist = namespace(buckets={}, max_count=0) -%}
                      {%- for b in range(b_start, b_end + bucket_w, bucket_w) -%}
                        {%- set ns_hist.buckets = ns_hist.buckets | combine({b: 0}) -%}
                      {%- endfor -%}
                      {# Count each reading into its bucket #}
                      {%- for v in s_vals -%}
                        {%- set bk = (v // bucket_w) * bucket_w -%}
                        {%- set ns_hist.buckets = ns_hist.buckets | combine({bk: ns_hist.buckets.get(bk, 0) + 1}) -%}
                      {%- endfor -%}
                      {# Find peak count (unused currently, kept for future bar scaling) #}
                      {%- for bk, cnt in ns_hist.buckets.items() -%}
                        {%- if cnt > ns_hist.max_count -%}{%- set ns_hist.max_count = cnt -%}{%- endif -%}
                      {%- endfor -%}
                      {# Build display string: only non-empty buckets, in ascending order #}
                      {%- set ns_hline = namespace(parts=[]) -%}
                      {%- for b in range(b_start, b_end + bucket_w, bucket_w) -%}
                        {%- set cnt = ns_hist.buckets.get(b, 0) -%}
                        {%- if cnt > 0 -%}
                          {%- set ns_hline.parts = ns_hline.parts + [b | string ~ '(' ~ cnt ~ ')'] -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {# Warning thresholds #}
                      {%- set high_sigma = s_stddev > (tolerance / 2) -%}
                      {%- set high_drift = (s_drift | abs) > tolerance -%}
                      {# Flag if fp bounds extend beyond observed stat range #}
                      {%- if 'min' in beacon -%}
                        {%- set ns_rm.min_gap = (s_min | int) - (beacon.min | int) -%}
                        {%- set ns_rm.max_gap = (beacon.max | int) - (s_max | int) -%}
                      {%- endif -%}
                    {%- else -%}
                      {%- set high_sigma = false -%}
                      {%- set high_drift = false -%}
                    {%- endif -%}
                    {%- set has_range_mismatch = ns_rm.min_gap > 0 or ns_rm.max_gap > 0 -%}
                    {%- set b_warnings = (1 if is_weak else 0) + (1 if high_sigma else 0) + (1 if high_drift else 0) + (1 if is_wide else 0) + (1 if has_range_mismatch else 0) -%}
                    {%- set ns.warnings = ns.warnings + b_warnings -%}
                    {%- set warn_tag = '  ' ~ ('⚠' * b_warnings) if b_warnings > 0 else '' -%}
                    {%- set bl = ['  ' ~ mac_upper ~ '  ' ~ bname ~ warn_tag] -%}
                    {%- set bl = bl + ['    Fingerprint: ' ~ fp_display] -%}
                    {%- if s_count > 0 -%}
                      {%- set bl = bl + ['    Variation:     deviation=' ~ s_stddev ~ ' dBm  drift=' ~ s_drift_str ~ ' dBm'] -%}
                      {%- set bl = bl + ['    Distribution:  ' ~ (ns_hline.parts | join('  ')) ~ '  dBm'] -%}
                      {%- set bl = bl + ['    Samples: ' ~ s_count ~ ' samples, ' ~ s_span_days ~ ' days (' ~ s_first_date ~ '-' ~ s_last_date ~ ')'] -%}
                    {%- else -%}
                      {%- set bl = bl + ['    Samples: 0 samples (no statistics yet)'] -%}
                    {%- endif -%}
                    {%- if is_weak -%}
                      {%- set bl = bl + ['    ⚠ weak signal (fingerprint ' ~ rssi ~ ' dBm < threshold ' ~ weak_signal_threshold ~ ' dBm)'] -%}
                    {%- endif -%}
                    {%- if high_sigma -%}
                      {%- set bl = bl + ['    ⚠ high deviation (σ=' ~ s_stddev ~ ' dBm > tol/2=' ~ (tolerance / 2) | int ~ ' dBm)'] -%}
                    {%- endif -%}
                    {%- if high_drift -%}
                      {%- set bl = bl + ['    ⚠ drift (fingerprint=' ~ rssi ~ ' dBm, mean=' ~ (s_mean | round | int) ~ ' dBm, diff=' ~ s_drift_str ~ ' dBm)'] -%}
                    {%- endif -%}
                    {%- if is_wide -%}
                      {%- set bl = bl + ['    ⚠ wide range (span=' ~ fp_span ~ ' dBm > 2×tol=' ~ (2 * tolerance) ~ ' dBm)'] -%}
                    {%- endif -%}
                    {%- if has_range_mismatch -%}
                      {%- set rm_parts = namespace(p=[]) -%}
                      {%- if ns_rm.min_gap > 0 -%}{%- set rm_parts.p = rm_parts.p + ['fp min ' ~ ns_rm.min_gap ~ ' dBm below stat'] -%}{%- endif -%}
                      {%- if ns_rm.max_gap > 0 -%}{%- set rm_parts.p = rm_parts.p + ['fp max ' ~ ns_rm.max_gap ~ ' dBm above stat'] -%}{%- endif -%}
                      {%- set bl = bl + ['    ⚠ range outside stats (' ~ (rm_parts.p | join(', ')) ~ ')'] -%}
                    {%- endif -%}
                    {%- set ns.beacon_lines = ns.beacon_lines + bl + [''] -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
              {%- set loc_summary = location_name | upper ~ ': ' ~ ns.active ~ ' active  (' ~ ns.total ~ ' total, ' ~ ns.weak ~ ' weak, ' ~ ns.locally_ignored ~ ' locally ignored' ~ (', ' ~ ns.warnings ~ ' warning' ~ ('s' if ns.warnings != 1 else '') if ns.warnings > 0 else '') ~ ')' -%}
              {%- set report.loc_warn_list = report.loc_warn_list + [{'loc': location_name | upper, 'w': ns.warnings}] -%}
              {%- set report.lines = report.lines + ['', loc_summary, ''] + ns.beacon_lines -%}
            {%- endfor -%}
            {%- set ns_sum = namespace(warn_parts=[]) -%}
            {%- for item in report.loc_warn_list | sort(attribute='w') | reverse -%}
              {%- set ns_sum.warn_parts = ns_sum.warn_parts + [item.loc ~ '(' ~ item.w ~ ')'] -%}
            {%- endfor -%}
            {%- set summary = ['', '--- Summary ---', 'Warnings:  ' ~ (ns_sum.warn_parts | join('  ')), '---'] -%}
            {{ (summary + report.lines) | join('\n') }}

      - action: system_log.write
        data:
          message: "{{ validation_report }}"
          level: info

  load_bt_fingerprints_from_file:
    description: "Refresh BT fingerprints sensor from file backup"
    sequence:
      # Force sensor to re-read current file contents
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.bt_fingerprint_database_file

  write_bt_fingerprints:
    description: "Write fingerprints JSON string to file and refresh sensor. Single write path for all fingerprint writers."
    fields:
      fingerprints_json:
        description: "Fingerprints as JSON string (already serialized)"
    sequence:
      - action: shell_command.bt_fingerprint_database_write
        data:
          json_content: "{{ fingerprints_json }}"
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.bt_fingerprint_database_file

  clear_bt_fingerprints:
    description: "Clear BT fingerprints database and refresh sensor"
    sequence:
      - action: script.write_bt_fingerprints
        data:
          fingerprints_json:
            fingerprints: []

  clear_bt_statistics:
    description: "Clear all scan history statistics and refresh sensor"
    sequence:
      - action: shell_command.bt_statistics_clear

      - action: system_log.write
        data:
          message: "Cleared BT merge statistics"
          level: debug

automation:
  - alias: 'BT Calibration - Update Confusion Matrix'
    id: bt_confusion_matrix_update
    description: "Recalculate confusion matrix when fingerprints, locations, or thresholds change"
    trigger:
      - platform: state
        entity_id:
          - sensor.bt_fingerprint_database_file
          - sensor.bt_location_array
          - input_number.bt_location_detection_rssi_tolerance
          - input_number.bt_location_detection_weak_signal_threshold
    action:
      - delay: "00:00:05"
      - action: script.generate_confusion_matrix
    mode: restart

  - alias: 'BT Calibration - Capture Fingerprint Button'
    id: bt_calibration_capture_fingerprint
    description: "Capture BT fingerprint when button pressed in calibration UI"
    trigger:
      - trigger: state
        entity_id: input_button.capture_bt_fingerprint
    action:
      - action: script.capture_bt_fingerprint

  - alias: 'BT Fingerprints - Load from File on Startup'
    id: bt_fingerprints_load_on_startup
    description: "Ensure BT fingerprint sensor is refreshed at Home Assistant startup"
    trigger:
      - trigger: homeassistant
        event: start
    action:
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.bt_fingerprint_database_file

  - alias: 'BT Location Scores - Update on Fingerprint or Ignore Changes'
    id: bt_location_scores_update_on_changes
    description: "Automatically run algorithm to update location scores when fingerprints or ignores change"
    trigger:
      - trigger: state
        entity_id:
          - sensor.bt_fingerprint_database_file
          - sensor.bt_ignored_beacons
    # NOTE: Timing issue - sensors may not be ready immediately after YAML reload
    # Condition checks all three sensors are valid to avoid errors during initialization
    condition:
      - condition: template
        value_template: "{{ states('sensor.bt_fingerprint_database_file') is not none and states('sensor.bt_ignored_beacons') is not none and state_attr('sensor.bt_latest_scan_full', 'devices') is not none }}"
    action:
      - action: script.calculate_location_scores

  - alias: 'Phone Charger - BT Location Detection'
    id: phone_charger_bt_location
    description: "Trigger on updated BT scan sensor, analyze filtered signals, detect and store charger location"
    trigger:
      # Trigger on sensor state change (timestamp updates on every webhook post)
      # Pipeline: webhook → sensor.bt_latest_scan_full (filters) → this automation (acts on filtered data)
      # This ensures filtering logic lives in one place only (the sensor), eliminating duplication
      - trigger: state
        entity_id: sensor.bt_latest_scan_full
    condition:
      - condition: template
        value_template: "{{ trigger.to_state is not none and trigger.to_state.state not in ['unknown', 'unavailable'] }}"
    action:
      # Log the already-filtered device data from the sensor
      - action: system_log.write
        data:
          message: |
            BT scan received:
            {%- for device in state_attr('sensor.bt_latest_scan_full', 'devices') | default([]) %}
            {{ device['mac'] }} | {{ (device['rssi'] | string).rjust(5) }} dBm | {{ device['name'] | default('unknown') }}
            {%- endfor %}
          level: info

      # Call location detection script with pre-filtered sensor data
      - action: script.detect_charger_location
        data:
          browser_id: "{{ state_attr('sensor.bt_latest_scan_full', 'browser_id') }}"
          devices: "{{ state_attr('sensor.bt_latest_scan_full', 'devices') }}"

  - alias: 'Phone Charger - Power Disconnect Detection'
    id: phone_charger_power_disconnect
    description: "Receive power-disconnect event from Tasker, clear charger location for specific device"
    trigger:
      - trigger: webhook
        webhook_id: phone_charger_disconnect
        # Triggered by Tasker when phone is removed from charger (power source disconnected)
        # Webhook receives JSON: {"browser_id": "peers_mobil", "event": "power_disconnected"}
    action:
      # Remove only the disconnected device's entry from the location mapping
      - variables:
          current_mapping: "{{ states('input_text.device_charger_locations') | default('{}') | from_json({}) }}"
          transform_pattern: "{{ state_attr('sensor.dashboard_logic_config', 'browser_id_transform_pattern') }}"
          regex_matches: "{{ trigger.json.browser_id | regex_findall(transform_pattern) }}"
          device_id: "{{ regex_matches[0] if regex_matches | length > 0 else trigger.json.browser_id }}"

      - if:
          - "{{ device_id in current_mapping }}"
        then:
          - variables:
              # Build new mapping without the disconnected device (using normalized device_id)
              updated_mapping: "{% set ns = namespace(result={}) %}{% for key, value in current_mapping.items() %}{% if key != device_id %}{% set ns.result = ns.result | combine({key: value}) %}{% endif %}{% endfor %}{{ ns.result }}"
              updated_mapping_json: "{{ updated_mapping | to_json }}"

          - action: input_text.set_value
            target:
              entity_id: input_text.device_charger_locations
            data:
              value: "{{ updated_mapping_json }}"

          # Log location clearing with normalized device_id (debug only, see persistent notifications for details)
          - action: system_log.write
            data:
              message: "Phone charger location cleared for {{ device_id }} (power disconnected)"
              level: debug
        else:
          # Warn if browser_id not found in mapping
          - action: system_log.write
            data:
              message: "Phone charger disconnect: browser_id '{{ trigger.json.browser_id }}' not found in location mapping. Available: {{ current_mapping.keys() | list }}. Check case sensitivity or device configuration."
              level: warning
