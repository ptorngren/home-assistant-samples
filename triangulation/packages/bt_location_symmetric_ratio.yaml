# bt_location_symmetric_ratio.yaml
# Symmetric Ratio Location Detection Algorithm
# Bidirectional beacon matching: (matched/fingerprint) × (matched/scan_valid)
# Eliminates small-fingerprint bias and alien beacon noise without tuning parameters
script:
  bt_location_symmetric_ratio:
    description: "Symmetric Ratio Location Matching: (matched/fingerprint) × (matched/scan_valid)"
    # This generic protocol allows algorithm swapping without orchestrator changes.
    fields:
      scan_context:
        description: "Context for logging (e.g., 'Latest scan' or 'Fingerprint #2 (KÖK)')"
        example: "Latest scan"
      devices:
        description: "Array of BT devices with MAC and RSSI from current scan"
        example: "[{'mac': 'AA:BB:CC:DD:EE:FF', 'rssi': -65}]"
      fingerprints_parsed:
        description: "Parsed fingerprints from database"
        example: "[{'location': 'peer', 'location_idx': 0, 'mac_rssi_str': 'AA:BB:CC:DD:EE:FF=-52,...'}]"
    variables:
      # Context for logging
      scan_context: "{{ scan_context | default('Latest scan') }}"

      # Load global ignored list from sensor attribute (file-backed, unlimited capacity)
      global_ignored_list: "{{ state_attr('sensor.bt_ignored_beacons', 'ignored') | default([]) | map('upper') | list }}"

      # Create a map of current scan MAC -> RSSI for fast lookup (filtered by global ignored)
      current_scan_map: |
        {%- set ns = namespace(map={}) -%}
        {%- for device in devices -%}
          {%- set device_mac = device.mac | upper -%}
          {%- if device_mac not in global_ignored_list -%}
            {%- set ns.map = ns.map | combine({device_mac: device.rssi}) -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.map }}

      # Algorithm parameters
      weak_signal_threshold: "{{ states('input_number.bt_location_detection_weak_signal_threshold') | int }}"
      rssi_tolerance: "{{ states('input_number.bt_location_detection_rssi_tolerance') | int }}"

      # Symmetric ratio denominator: count of beacons in current scan that are active (non-ignored) and known
      # Calculate fresh from fingerprints to avoid sensor stale data race conditions
      scan_valid_count: |
        {%- set ns = namespace(active_beacons=[], count=0) -%}
        {%- set raw_fingerprints = (state_attr('sensor.bt_fingerprint_database_file', 'fingerprints') | default([])) | list -%}
        {%- for entry in raw_fingerprints -%}
          {%- if entry and '|' in entry -%}
            {%- set parts = entry.split('|') -%}
            {%- if parts | length == 2 -%}
              {%- set mac_rssi_str = parts[1] -%}
              {%- for pair in mac_rssi_str.split(',') -%}
                {%- if '=' in pair -%}
                  {%- set mac = pair.split('=')[0] | upper -%}
                  {%- if mac not in ns.active_beacons and mac not in global_ignored_list -%}
                    {%- set ns.active_beacons = ns.active_beacons + [mac] -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
        {%- for device in devices -%}
          {%- set mac = device.mac | upper -%}
          {%- if mac in ns.active_beacons -%}
            {%- set ns.count = ns.count + 1 -%}
          {%- endif -%}
        {%- endfor -%}
        {{ ns.count }}

      # BEACON EXCLUSION FILTER (used in location_scores calculations)
      # Skip beacon if any condition is true:
      #   - fp_rssi == 0 (ghost beacon with no valid reference)
      #   - fp_rssi < weak_signal_threshold (weak/unreliable reference point)
      #   - fp_mac in global_ignored_list (beacon globally ignored as irrelevant)
      #   - pair.endswith(':X') (beacon locally ignored for this location)
      # Keep beacon in total count only if ALL conditions are false

      # Calculate Symmetric Ratio score for each location
      # ALGORITHM: Bidirectional beacon matching (Approach 0: Simplified Symmetric Ratio)
      # Formula: presence_score = (matched / fingerprint_total) × (matched / scan_valid)
      # This naturally penalizes both missing beacons and unexpected beacons without tuning parameters
      location_scores: |
        {%- set ns = namespace(scores={}) -%}
        {%- for fp in fingerprints_parsed -%}
          {%- set location = fp.location -%}
          {%- set mac_rssi_str = fp.mac_rssi_str -%}

          {# Initialize counters for this location #}
          {%- set ns.matched_beacons = 0 -%}
          {%- set ns.total_fingerprint_beacons = 0 -%}

          {# Parse fingerprint beacons and count matches against current scan #}
          {%- for pair in mac_rssi_str.split(',') -%}
            {%- if '=' in pair -%}
              {%- set pair_base = pair.rstrip(':X') -%}
              {%- set kv = pair_base.split('=') -%}
              {%- if kv | length == 2 -%}
                {%- set fp_mac = kv[0] | trim | upper -%}
                {%- set fp_rssi = kv[1] | trim | int(0) -%}

                {# Apply BEACON EXCLUSION FILTER (see definition above) #}
                {%- if fp_rssi == 0 or fp_rssi < weak_signal_threshold or fp_mac in global_ignored_list or pair.endswith(':X') -%}
                  {# Skip excluded beacon #}
                {%- else -%}
                  {# Beacon passed exclusion filters - count toward fingerprint total #}
                  {%- set ns.total_fingerprint_beacons = ns.total_fingerprint_beacons + 1 -%}

                  {# Check if it exists in current scan #}
                  {%- if fp_mac in current_scan_map -%}
                    {%- set current_rssi = current_scan_map[fp_mac] -%}
                    {%- if current_rssi < 0 and current_rssi >= weak_signal_threshold -%}
                      {# Check RSSI tolerance: beacon must be within ±N dBm of fingerprint RSSI #}
                      {%- set rssi_diff = (current_rssi - fp_rssi) | abs -%}
                      {%- if rssi_diff <= rssi_tolerance -%}
                        {# Beacon matched within tolerance - count it #}
                        {%- set ns.matched_beacons = ns.matched_beacons + 1 -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}

          {# Calculate symmetric ratio score #}
          {%- set missing_beacons = ns.total_fingerprint_beacons - ns.matched_beacons -%}
          {%- if ns.total_fingerprint_beacons > 0 and scan_valid_count > 0 -%}
            {# Symmetric ratio: (matched/fingerprint) × (matched/scan_valid) #}
            {%- set fingerprint_recall = (ns.matched_beacons / ns.total_fingerprint_beacons) | round(3) -%}
            {%- set scan_precision = (ns.matched_beacons / scan_valid_count) | round(3) -%}
            {%- set total_score = (fingerprint_recall * scan_precision) | round(3) -%}
          {%- else -%}
            {%- set total_score = 0 -%}
            {%- set fingerprint_recall = 0 -%}
            {%- set scan_precision = 0 -%}
          {%- endif -%}

          {# Store results for this location #}
          {%- set ns.scores = ns.scores | combine({location: {"matched": ns.matched_beacons, "missing": missing_beacons, "total_score": total_score}}) -%}
        {%- endfor -%}
        {{ ns.scores }}

      # Find location with maximum composite score
      best_location_info: |
        {%- if location_scores | length > 0 -%}
          {%- set ns = namespace(best_location=none, best_score=-1) -%}
          {%- for location, metrics in location_scores | dictsort -%}
            {%- if metrics.total_score > ns.best_score -%}
              {%- set ns.best_location = location -%}
              {%- set ns.best_score = metrics.total_score -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set confidence = ns.best_score | round(2) -%}
          {{ {"location": ns.best_location, "score": ns.best_score, "confidence": confidence} }}
        {%- else -%}
          {{ {"location": "unknown", "score": 0.0, "confidence": 0.0} }}
        {%- endif -%}

    sequence:
      # Build the result
      - variables:
          detected_location: "{{ best_location_info.location }}"
          confidence: "{{ best_location_info.confidence | round(2) }}"
          best_score: "{{ best_location_info.score }}"

      # Log algorithm results
      - action: system_log.write
        data:
          message: 'BT Location: {{ detected_location | upper }} (score: {{ best_score | round(3) }}, confidence: {{ "%.0f" | format(confidence * 100) }}%) — {{ scan_context }}'
          level: debug

      # Calculate beacon counts for display
      - variables:
          active_beacons_in_scan: "{{ current_scan_map | length }}"
          known_beacons_in_scan: "{{ scan_valid_count }}"
          unknown_beacons_in_scan: "{{ (current_scan_map | length) - scan_valid_count }}"

      # Return result with beacon counts for dashboard display
      - variables:
          result:
            detected_location: "{{ detected_location }}"
            confidence: "{{ confidence }}"
            score: "{{ best_score }}"
            scores_detail: "{{ location_scores }}"
            active_beacons_in_scan: "{{ active_beacons_in_scan }}"
            known_beacons_in_scan: "{{ known_beacons_in_scan }}"
            unknown_beacons_in_scan: "{{ unknown_beacons_in_scan }}"

      - stop: "Match Ratio complete"
        response_variable: result