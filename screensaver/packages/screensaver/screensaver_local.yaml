# Screensaver Local Implementation Package
# Local/customizable sensors and automations for screensaver dashboard:
# - Environmental sensors (temperature, weather, humidity, wind) - reads local sensors
# - Battery management automation for kitchen tablet
# - BT location detection and fingerprint collection
# Generic components (scripts, webhooks, configuration) are in screensaver.yaml
# ------------------------------------------------------------------

# ------------------------------------------------------------------
# SENSORS
# ------------------------------------------------------------------

# Computed sensors (Template integration)
template:
  - sensor:
      # Compute a representative outdoor temperature based on dual sensors
      # SETUP: Two temperature sensors on opposite sides (East/West)
      # - sensor.garage_framsidan_temperature: Morning/day sun exposure (East)
      # - sensor.relax_baksidan_temperature: Day/evening sun exposure (West)
      #
      # BEHAVIOR: Sensors experience significant temperature differences during:
      # - Morning (sunrise to ~noon): First sensor warmer
      # - Afternoon (noon to sunset): Second sensor warmer
      # - Night/winter: Both sensors read nearly identical
      #
      # DISPLAY LOGIC:
      # - If difference < 2°C: Show single value (average) for clean display
      # - If difference ≥ 2°C: Show "min° | max°" format for awareness of sun exposure
      #
      # This pattern maintains a minimalist display while providing context when meaningful
      - name: "Screensaver Display Temperature"
        unique_id: screensaver_display_temperature
        state: |
          {% set f = states('sensor.garage_framsidan_temperature') | float(none) %}
          {% set b = states('sensor.relax_baksidan_temperature') | float(none) %}
          {% if f is not none and b is not none %}
            {% if (f - b) | abs < 2 %}
              {{ ((f + b) / 2) | round(1) }}
            {% else %}
              {{ [f, b] | min | round(1) }} | {{ [f, b] | max | round(1) }}
            {% endif %}
          {% else %}
            unavailable
          {% endif %}

      # Weather description from forecast entity (mapped to local language)
      - name: "Screensaver Display Weather"
        unique_id: screensaver_display_weather
        state: >
          {% set s = states('weather.forecast_home') %}
          {% set mapper = {
            'clear': 'Klart',
            'clear-night': 'Klart',
            'cloudy': 'Mulet',
            'fog': 'Dimma',
            'hail': 'Hagel',
            'lightning': 'Åska',
            'lightning-rainy': 'Åskregn',
            'overcast': 'Molnigt',
            'partlycloudy': 'Halvklart',
            'partly-cloudy': 'Halvklart',
            'partlysunny': 'Halvsoligt',
            'partly-sunny': 'Halvsoligt',
            'pouring': 'Ösregn',
            'pouring-night': 'Ösregn natt',
            'pouring-day': 'Ösregn dag',
            'rainy': 'Regn',
            'snowy': 'Snö',
            'snowy-rainy': 'Snöblandat regn',
            'sunny': 'Soligt',
            'windy': 'Blåsigt',
            'windy-variant': 'Hård vind',
            'exceptional': 'Varning'
          } %}
          {{ mapper.get(s, s) if s not in ['unknown', 'unavailable'] else 'unavailable' }}

      - name: "Screensaver Display Humidity"
        unique_id: screensaver_display_humidity
        unit_of_measurement: '%'
        state: "{{ states('sensor.relax_baksidan_humidity') }}"

      - name: "Screensaver Display Wind Speed"
        unique_id: screensaver_display_wind_speed
        unit_of_measurement: 'm/s'
        state: >
          {% set w = states('sensor.relax_vindmatare_wind_speed') | float(-1) %}
          {{ (w / 3.6) | round(1) if w > 0.1 else 'unavailable' }}

# ------------------------------------------------------------------
# SCRIPTS
# ------------------------------------------------------------------

# Screensaver tap action scripts for the dashboard
# screensaver_resolve_scenario: Shared logic for resolving browser_id to target scenario (location + time-based)
# screensaver_tap/double_tap/hold: Tap action handlers that call the shared resolver and execute specific actions
script:
  screensaver_resolve_scenario:
    description: "Resolve browser_id to target scenario using device location and time-of-day rules"
    fields:
      browser_id:
        description: "Browser ID from the screensaver tap event"
        example: "peers_mobil_fkb"
    sequence:
      - variables:
          current_hour: "{{ now().hour }}"
          # Transform browser_id to device_id by stripping FKB suffix (e.g., peers_mobil_fkb → peers_mobil)
          # Pattern read from sensor.dashboard_logic_config (single source of truth)
          transform_pattern: "{{ state_attr('sensor.dashboard_logic_config', 'browser_id_transform_pattern') }}"
          regex_matches: "{{ browser_id | regex_findall(transform_pattern) }}"
          device_id: "{{ regex_matches[0] if regex_matches | length > 0 else '' }}"
          charger_location: >
            {% set mapping = states('input_text.device_charger_locations') | from_json %}
            {{ mapping.get(device_id, 'unknown') }}
            
          # Time-based scenario thresholds for mobile
          mobile_is_morning: "{{ current_hour > 6 and current_hour <= 9 }}"
          mobile_is_day: "{{ current_hour > 9 and current_hour <= 22 }}"

          # Time-based scenario thresholds for kitchen tablet (koksplatta)
          kitchen_is_morning: "{{ current_hour > 5 and current_hour <= 10 }}"
          kitchen_is_day: "{{ current_hour > 10 and current_hour <= 17 }}"
          kitchen_is_evening: "{{ current_hour > 17 and current_hour <= 23 }}"
          
          # Static device→scenario mapping for unknown devices
          static_devices:
            p2r-deskp3: peer
          
          # Scenario resolution: device location takes precedence, falls back to time-based or static mapping
          target_scenario: >
            {% if browser_id in ['peers_mobil', 'peers_mobil_fkb'] %}
              {% if charger_location == 'garage' %}
                garage
              {% elif charger_location == 'bastu' %}
                bastu
              {% elif charger_location == 'kök' %}
                {% if kitchen_is_morning %}godmorgon{% elif kitchen_is_day %}matlagning{% else %}middag{% endif %}
              {% elif charger_location == 'peer' %}
                peer
              {% elif charger_location == 'sovrum' %}
                {% if mobile_is_morning %}godmorgon{% elif mobile_is_day %}godnatt{% else %}unknown{% endif %}
              {% elif charger_location not in ['unknown', 'unavailable', None, ''] %}
                {% if mobile_is_morning %}godmorgon{% elif mobile_is_day %}peer{% else %}godnatt{% endif %}
              {% else %}
                unknown
              {% endif %}

            {% elif browser_id in ['koksplatta', 'koksplatta_fkb'] %}
              {% if kitchen_is_morning %}godmorgon{% elif kitchen_is_day %}matlagning{% else %}middag{% endif %}
            {% else %}
              {{ static_devices.get(browser_id, 'unknown') }}
            {% endif %}
      - action: system_log.write
        data:
          message: "screensaver_resolve_scenario: browser_id={{ browser_id }}, device_id={{ device_id }}, charger_location={{ charger_location }}, mobile_is_morning={{ mobile_is_morning }}, mobile_is_day={{ mobile_is_day }}, target_scenario={{ target_scenario | trim }}"
          level: debug
      - variables:
          result:
            target_scenario: "{{ target_scenario | trim }}"
      - stop: "Scenario resolved"
        response_variable: result

  screensaver_tap:
    description: "Toggle scenario via browser_id and location"
    sequence:
      - action: script.screensaver_resolve_scenario
        data:
          browser_id: "{{ browser_id }}"
        response_variable: resolved
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ resolved.target_scenario != 'unknown' }}"
            sequence:
              - action: script.scenario_toggle_mc
                data:
                  scenario: "{{ resolved.target_scenario }}"

  screensaver_double_tap:
    description: "Randomize scenario via browser_id and location IF a scenario is active"
    sequence:
      - action: script.screensaver_resolve_scenario
        data:
          browser_id: "{{ browser_id }}"
        response_variable: resolved
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ resolved.target_scenario != 'unknown' }}"
              - condition: template
                value_template: "{{ states('binary_sensor.scenario_' + resolved.target_scenario) == 'on' }}"
            sequence:
              - action: script.scenario_mixer_mc
                data:
                  scenario: "{{ resolved.target_scenario }}"
                  force_randomize: true
        default: []

  screensaver_hold:
    description: "Screensaver hold - volume control popup via browser_id and location"
    # Long press (hold) shows a browser_mod popup with volume control for the scenario's master zone
    # Popup shows: Volume Down/Up buttons for master zone volume control
    # Only shows popup if master zone is available and powered on
    sequence:
      - action: script.screensaver_resolve_scenario
        data:
          browser_id: "{{ browser_id }}"
        response_variable: resolved
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ resolved.target_scenario != 'unknown' }}"
            sequence:
              - variables:
                  scenario_entity: "binary_sensor.scenario_{{ resolved.target_scenario }}"
                  master_zone: "{{ state_attr(scenario_entity, 'master') }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ master_zone not in [none, 'unknown', 'unavailable'] }}"
                      - condition: template
                        value_template: "{{ states(master_zone) not in ['unavailable', 'unknown'] }}"
                      - condition: template
                        value_template: "{{ states(master_zone) != 'off' }}"
                    sequence:
                      - action: browser_mod.popup
                        data:
                          browser_id: "{{ browser_id }}"
                          title: "Volume - {{ state_attr(master_zone, 'friendly_name') }}"
                          content:
                            type: horizontal-stack
                            cards:
                              - type: button
                                icon: "mdi:minus"
                                tap_action:
                                  action: call-service
                                  service: script.musiccast_adjust_volume
                                  data:
                                    entity_id: "{{ master_zone }}"
                                    direction: "down"
                              - type: button
                                icon: "mdi:plus"
                                tap_action:
                                  action: call-service
                                  service: script.musiccast_adjust_volume
                                  data:
                                    entity_id: "{{ master_zone }}"
                                    direction: "up"

  bt_location_detect_algorithm_proxy:
    description: "Proxy for location detection algorithm - routes to selected algorithm implementation"
    fields:
      devices:
        description: "Array of BT devices from current scan with MAC, name, and RSSI values"
        example: "[{'mac': 'AA:BB:CC:DD:EE:FF', 'name': 'Device Name', 'rssi': -65}, {'mac': '11:22:33:44:55:66', 'name': 'Another Device', 'rssi': -72}]"
      fingerprints_parsed:
        description: "Array of parsed fingerprints from database, one object per location with location name, index, and beacon pairs"
        example: "[{'location': 'peer', 'location_idx': 0, 'mac_rssi_str': 'AA:BB:CC:DD:EE:FF=-65,11:22:33:44:55:66=-72,22:33:44:55:66:77=-80'}, {'location': 'garage', 'location_idx': 1, 'mac_rssi_str': 'AA:BB:CC:DD:EE:FF=-68,33:44:55:66:77:88=-75'}]"
      scan_context:
        description: "Context label for logging and debugging (e.g., 'Latest scan' or 'Fingerprint #2 (KITCHEN)')"
        example: "Latest scan"
    sequence:
      # Call the Match Ratio algorithm (can be changed to similarity_match for different behavior)
      - action: script.bt_location_match_ratio
        data:
          devices: "{{ devices }}"
          fingerprints_parsed: "{{ fingerprints_parsed }}"
          scan_context: "{{ scan_context }}"
        response_variable: algorithm_result

      # Return the algorithm result
      - variables:
          result: "{{ algorithm_result }}"

      - stop: "Algorithm proxy complete"
        response_variable: result

# ------------------------------------------------------------------
# AUTOMATIONS
# ------------------------------------------------------------------
automation:
  - alias: 'Kitchen Tablet Battery Management'
    id: kitchen_tablet_battery_management
    description: Maintain battery charge between 20-80% using Fully Kiosk integration and periodic checks
    triggers:
      - trigger: numeric_state
        entity_id: sensor.koksplatta_fkb_battery
        above: 80
        id: stoppa
      - trigger: numeric_state
        entity_id: sensor.koksplatta_fkb_battery
        below: 20
        id: starta
      - trigger: time_pattern
        minutes: "/5"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: stoppa
              - condition: numeric_state
                entity_id: sensor.koksplatta_fkb_battery
                above: 80
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.pp14_koksplatta
          - conditions:
              - condition: trigger
                id: starta
              - condition: numeric_state
                entity_id: sensor.koksplatta_fkb_battery
                below: 20
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.pp14_koksplatta
    mode: restart

