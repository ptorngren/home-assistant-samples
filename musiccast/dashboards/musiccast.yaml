      - type: markdown
        content: |
          {%- set matched = state_attr('sensor.musiccast_media_players', 'matched') or [] %}
          {%- if matched | length > 0 %}
          **✅ Matched devices** ({{ matched | length }})

          | IP address | Entity |
          |:---|:---|
          {%- for item in matched %}
          | `{{ item.ip }}` | `{{ item.entity }}` |
          {%- endfor %}
          {%- else %}
          *No matched devices*
          {%- endif %}
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              background: none;
              padding-top: 0px !important;
            }
            ha-markdown {
              padding: 12px 16px 12px 16px !important;
            }

      # Unmatched Entities
      - type: markdown
        content: |
          {%- set unmatched = state_attr('sensor.musiccast_media_players', 'unmatched') or [] %}
          {%- if unmatched | length > 0 %}
          **⚠️ Unmatched devices** ({{ unmatched | length }})

          | Entity |
          |:---|
          {%- for item in unmatched %}
          | `{{ item.entity }}` |
          {%- endfor %}
          {%- else %}
          **✅ All devices matched!**
          {%- endif %}
        card_mod:
          style: |
            ha-card {
              border: none;
              box-shadow: none;
              background: none;
              padding-top: 0px !important;
            }
            ha-markdown {
              padding: 12px 16px 12px 16px !important;
            }

  # ------------------------------------------------------
  # VIEW 5: GUIDE
  # ------------------------------------------------------
  - path: guide
    title: Guide
    icon: mdi:help-circle-outline
    cards:

      # --- MAIN VIEW ---
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:play-circle"></ha-icon> Now Playing

          **Top card (Scenarios header):**
          - **Tap:** Unlink all zones and power off.
          - **Status:** Shows active scenario source and master speaker; otherwise number of powered-on zones; "Select scenario" when idle.

          **Scenario buttons:**
          - **Tap:** Activate/deactivate scenario with a random preset.
          - **Double-tap:** Pick a new random preset.
          - **Hold:** Save current volume configuration.
          - **Blue background:** Active scenario (playing now).
          - **Grey background:** Inactive scenario.
          - **🔒 icon:** A preset is locked — it always plays when this scenario starts.

          **Presets (favorites):**
          - **Tap:** Play preset immediately.
          - **Double-tap:** Exclude preset from random playback.
          - **Hold:** Lock preset — always played when scenario activates.
          - **🔒 with blue border:** Locked (always plays).
          - **⊘ with grey background:** Excluded (never randomized).
          - **Blue background:** Currently playing.

      # --- PLAYERS VIEW ---
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:speaker-multiple"></ha-icon> Players

          Shows all MusicCast zones. Tap a zone to link or unlink it to the active scenario's master player for multi-room audio.

          - **Tap:** Link or unlink zone to/from master player.
          - **Double-tap:** Toggle power.
          - **Hold:** Unlink and power off.
          - **White background:** Powered off (standby).
          - **Blue background:** Powered on (active).
          - **Grey background:** Unavailable (not connected).
          - **Blue border:** Master zone.
          - **Blue icon/text:** Linked to master.
          - **Grey icon/text:** Unlinked.

      # --- SETTINGS VIEW ---
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:tune"></ha-icon> Settings

          **Scenarios section:**
          - **Tap header:** Create a new scenario (name, icon, master player).
          - **Tap scenario tile:** Edit name, icon, or master player.
          - **Hold scenario tile:** Delete scenario.

          **Media Players section:**
          - **Tap player:** Show presets for that player.
          - **Double-tap player:** Refresh all presets from device.
          - **Hold player:** Exclude/include player from the active scenario group.

          **Presets list:** Shows all presets for selected players.
          - 📻 Net Radio  •  👤 Spotify Artist  •  🎵 Spotify Playlist

      # --- DISCOVERY VIEW ---
      - type: markdown
        content: |
          ## <ha-icon icon="mdi:radar"></ha-icon> Discovery

          Scans the local network to find MusicCast devices and match them to Home Assistant entities. Run this once after initial setup, or again if you add or replace a device.

          The scan checks a configurable IP range (default: all of 192.168.1.x) and identifies devices by matching their network name against the friendly names registered in HA. Matched devices are shown with their IP address and entity ID.
          
          If any devices appear under Unmatched, they were found on the network but could not be linked to a known entity — check that the device's network name matches its friendly name in HA.

          The scan also immediately refreshes the preset list, so presets in the Settings view are always up to date after a scan.

          **After scanning:** reload YAML (Developer Tools → YAML → Reload all) to apply the updated IP mappings. No restart required.
