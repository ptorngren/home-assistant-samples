          {% if selected_players | length > 0 %}
          *📻 Net Radio  •  👤 Artist  •  🎵 Playlist*
            {% for entity_id in selected_players %}
              {% set presets = all_presets.get(entity_id, []) %}
              {% set ns = namespace(friendly_name=entity_id) %}
              {% for ent in mc_entities %}
                {% if ent.entity_id == entity_id %}{% set ns.friendly_name = ent.friendly_name %}{% endif %}
              {% endfor %}
          ### {{ ns.friendly_name }}
              {% set filtered = presets | rejectattr('text', 'eq', '') | rejectattr('input', 'eq', 'unknown') | list %}
              {% if filtered | length > 0 %}
                {% for preset in filtered %}
          **{{ loop.index }}.** {{ preset.text }} {% if preset.input == 'net_radio' %}📻{% elif 'spotify' in preset.input %}🎵{% else %}🎶{% endif %}
                {% endfor %}
              {% else %}
          *No presets configured*
              {% endif %}
            {% endfor %}
          {% else %}
          *Select one or more players to show presets*
          {% endif %}

